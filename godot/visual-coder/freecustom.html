
<style>
:root {
  --bg:#0d0e10;--bg2:#13151a;--bg3:#1a1d24;--bg4:#21252e;
  --bd:#252a34;--bd2:#2e3540;
  --tx:#dde2ea;--tx2:#7a8799;--tx3:#4a5568;
  --pu:#a78bfa;--pu2:rgba(167,139,250,0.35);--pudim:rgba(167,139,250,0.08);
  --gn:#34d399;--gn2:rgba(52,211,153,0.3);
  --bl:#60a5fa;--am:#fbbf24;--co:#f87171;
  --mono:'JetBrains Mono','Fira Mono',monospace;
  --sans:'Syne','Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;font-size:14px;}
.wrap{max-width:860px;margin:0 auto;padding:16px 16px 80px;}
h1{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--tx2);font-family:var(--mono);margin-bottom:4px;}
.sub-h{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:18px;}

.layout{display:flex;flex-direction:column;gap:12px;}
@media(min-width:640px){.layout{flex-direction:row;align-items:flex-start;}.left{flex:1;min-width:0;}.right{width:320px;flex-shrink:0;}}

.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.card-h{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dp{background:var(--pu);}.dg{background:var(--gn);}.db{background:var(--bl);}.da{background:var(--am);}.dc{background:var(--co);}
.card-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--tx2);font-family:var(--mono);}
.card-b{padding:12px 13px;display:flex;flex-direction:column;gap:9px;}

label{font-size:10px;color:var(--tx3);font-family:var(--mono);display:block;margin-bottom:3px;}
input[type=text],select{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);font-family:var(--mono);font-size:13px;padding:0 10px;height:40px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--pu2);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.preset-btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:7px;color:var(--tx2);font-family:var(--mono);font-size:11px;padding:8px 10px;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.3;}
.preset-btn:hover,.preset-btn.sel{background:var(--pudim);border-color:var(--pu2);color:var(--pu);}
.preset-btn .fn-name{display:block;font-weight:600;color:inherit;}
.preset-btn .fn-hint{display:block;font-size:9px;color:var(--tx3);margin-top:1px;}

.if-block{background:var(--bg3);border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin-bottom:8px;}
.if-head{padding:8px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--bd);}
.if-tag{font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 7px;border-radius:5px;}
.tag-if{background:rgba(96,165,250,0.12);color:var(--bl);border:1px solid rgba(96,165,250,0.25);}
.tag-elif{background:rgba(251,191,36,0.10);color:var(--am);border:1px solid rgba(251,191,36,0.25);}
.tag-else{background:rgba(52,211,153,0.10);color:var(--gn);border:1px solid var(--gn2);}
.if-body{padding:10px 11px;display:flex;flex-direction:column;gap:7px;}
.cond-row{display:grid;grid-template-columns:1fr 72px 1fr;gap:5px;}
.cond-row select,.cond-row input{height:36px;font-size:12px;padding:0 7px;}
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.act-row input,.act-row select{height:36px;font-size:12px;}
.remove-btn{margin-left:auto;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--co);border-radius:5px;font-family:var(--mono);font-size:10px;padding:3px 9px;cursor:pointer;}
.remove-btn:hover{background:rgba(248,113,113,0.16);}

.add-row{display:flex;gap:6px;}
.add-btn{flex:1;height:36px;background:var(--bg3);border:1px solid var(--bd2);border-radius:7px;color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.15s;}
.add-btn:hover{border-color:var(--pu2);color:var(--pu);}

.gen-btn{width:100%;height:48px;background:var(--pudim);border:1px solid var(--pu2);border-radius:10px;color:var(--pu);font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.gen-btn:hover{background:rgba(167,139,250,0.13);}
.gen-btn:active{transform:scale(0.99);}

.out-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;position:sticky;top:12px;}
.out-head{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px;}
.out-tag{font-size:10px;font-family:var(--mono);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:var(--pudim);color:var(--pu);border:1px solid var(--pu2);}
.copy-btn{margin-left:auto;padding:5px 11px;background:var(--bg4);border:1px solid var(--bd2);border-radius:6px;color:var(--tx2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.15s;}
.copy-btn:hover{border-color:var(--bd);}
.copy-btn.ok{color:var(--gn);border-color:var(--gn2);}
.out-code{padding:13px;font-family:var(--mono);font-size:12.5px;line-height:1.85;white-space:pre;overflow-x:auto;min-height:80px;}
.out-code.empty{color:var(--tx3);font-style:italic;font-size:11px;}

.kw{color:#c792ea;}.fn{color:#82aaff;}.str{color:#c3e88d;}.num{color:#f78c6c;}.cmt{color:#546e7a;font-style:italic;}.typ{color:#fbbf24;}.op{color:#89ddff;}
</style>

<div class="wrap">
  <h1>GDScript Function Builder</h1>
  <div class="sub-h">func · presets · if / elif / else · return</div>

  <div class="layout">
    <div class="left">

      <!-- PRESETS -->
      <div class="card">
        <div class="card-h"><div class="dot dp"></div><span class="card-title">Godot Presets</span></div>
        <div class="card-b">
          <div class="preset-grid" id="presets"></div>
        </div>
      </div>

      <!-- SIGNATURE -->
      <div class="card">
        <div class="card-h"><div class="dot dp"></div><span class="card-title">Function Signature</span></div>
        <div class="card-b">
          <div class="row2">
            <div><label>function name</label><input type="text" id="funcName" value="my_function"></div>
            <div><label>return type</label>
              <select id="retType">
                <option value="void">void</option><option>bool</option><option>int</option><option>float</option>
                <option>String</option><option>Vector2</option><option>Vector3</option><option>Dictionary</option><option>Array</option><option>Variant</option>
              </select>
            </div>
          </div>
          <div id="params-area"></div>
          <div style="display:flex;gap:6px;margin-top:2px;">
            <button class="add-btn" onclick="addParam()" id="add-param-btn">+ add parameter</button>
            <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2);cursor:pointer;background:var(--bg3);border:1px solid var(--bd2);border-radius:7px;padding:0 12px;height:36px;font-family:var(--mono);">
              <input type="checkbox" id="useStatic" style="width:auto;height:auto;accent-color:var(--pu);">
              static
            </label>
          </div>
        </div>
      </div>

      <!-- BRANCHES -->
      <div class="card">
        <div class="card-h"><div class="dot db"></div><span class="card-title">Conditions</span></div>
        <div class="card-b">
          <div id="branches"></div>
          <div class="add-row">
            <button class="add-btn" onclick="addBranch('if')">+ if</button>
            <button class="add-btn" onclick="addBranch('elif')">+ elif</button>
            <button class="add-btn" onclick="addBranch('else')">+ else</button>
          </div>
        </div>
      </div>

      <!-- RETURN -->
      <div class="card">
        <div class="card-h"><div class="dot dc"></div><span class="card-title">Final Return</span></div>
        <div class="card-b">
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:var(--mono);">
            <input type="checkbox" id="useReturn" style="width:auto;height:auto;accent-color:var(--pu);">
            add return statement at end
          </label>
          <div id="return-val-wrap" style="display:none;margin-top:4px;">
            <label>return value</label>
            <input type="text" id="returnVal" placeholder='e.g. false or "" or null'>
          </div>
        </div>
      </div>

      <button class="gen-btn" onclick="generate()">▶  Generate GDScript</button>
    </div>

    <div class="right">
      <div class="out-card">
        <div class="out-head">
          <span class="out-tag">Output</span>
          <button class="copy-btn" id="copyBtn" onclick="copyOut()">Copy</button>
        </div>
        <div class="out-code empty" id="output"># press Generate</div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const PRESETS = [
  {name:'_ready',hint:'called on scene load',params:[],ret:'void'},
  {name:'_process',hint:'called every frame',params:[{n:'delta',t:'float'}],ret:'void'},
  {name:'_physics_process',hint:'fixed framerate',params:[{n:'delta',t:'float'}],ret:'void'},
  {name:'_input',hint:'raw input events',params:[{n:'event',t:'InputEvent'}],ret:'void'},
  {name:'_unhandled_input',hint:'unhandled events',params:[{n:'event',t:'InputEvent'}],ret:'void'},
  {name:'_enter_tree',hint:'added to scene tree',params:[],ret:'void'},
  {name:'_exit_tree',hint:'removed from tree',params:[],ret:'void'},
  {name:'_notification',hint:'engine notifications',params:[{n:'what',t:'int'}],ret:'void'},
];

let params = [];
let branches = [];
let paramId = 0;
let branchId = 0;

function renderPresets(){
  const c = $('presets');
  c.innerHTML = PRESETS.map((p,i)=>`
    <button class="preset-btn" id="pre${i}" onclick="applyPreset(${i})">
      <span class="fn-name">${p.name}()</span>
      <span class="fn-hint">${p.hint}</span>
    </button>`).join('');
}

function applyPreset(i){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('pre'+i).classList.add('sel');
  const p = PRESETS[i];
  $('funcName').value = p.name;
  $('retType').value = p.ret;
  params = p.params.map((pr,j)=>({id:paramId++,name:pr.n,type:pr.t,def:''}));
  renderParams();
  generate();
}

function renderParams(){
  const area = $('params-area');
  area.innerHTML = params.map((p,i)=>`
    <div style="display:grid;grid-template-columns:1fr 100px 110px auto;gap:6px;align-items:end;margin-bottom:7px;">
      <div><label>name</label><input type="text" value="${p.name}" oninput="params[${i}].name=this.value" style="height:36px;font-size:12px;"></div>
      <div><label>type</label><select onchange="params[${i}].type=this.value" style="height:36px;font-size:12px;">${typeOpts(p.type)}</select></div>
      <div><label>default</label><input type="text" value="${p.def}" placeholder="optional" oninput="params[${i}].def=this.value" style="height:36px;font-size:12px;"></div>
      <button onclick="removeParam(${i})" style="height:36px;margin-top:17px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--co);border-radius:7px;font-size:12px;cursor:pointer;padding:0 8px;">✕</button>
    </div>`).join('');
  $('add-param-btn').style.display = params.length>=4?'none':'block';
}

function typeOpts(sel='Variant'){
  const opts=['int','float','String','bool','Vector2','Vector3','Dictionary','Array','Node','Object','InputEvent','Variant'];
  return opts.map(o=>`<option${o===sel?' selected':''}>${o}</option>`).join('');
}

function addParam(){
  if(params.length>=4)return;
  params.push({id:paramId++,name:'param'+params.length,type:'Variant',def:''});
  renderParams();
}
function removeParam(i){params.splice(i,1);renderParams();}

function renderBranches(){
  const area = $('branches');
  area.innerHTML = branches.map((b,i)=>{
    const isElse = b.type==='else';
    return `<div class="if-block" id="br${b.id}">
      <div class="if-head">
        <span class="if-tag tag-${b.type}">${b.type}</span>
        ${!isElse?`<span style="font-size:10px;color:var(--tx3);font-family:var(--mono);">condition</span>`:''}
        <button class="remove-btn" onclick="removeBranch(${i})">remove</button>
      </div>
      <div class="if-body">
        ${!isElse?`<div class="cond-row">
          <input type="text" value="${b.left}" placeholder="left side" oninput="branches[${i}].left=this.value" style="height:36px;font-size:12px;padding:0 7px;">
          <select onchange="branches[${i}].op=this.value" style="height:36px;font-size:12px;padding:0 4px;">${opOpts(b.op)}</select>
          <input type="text" value="${b.right}" placeholder="right side" oninput="branches[${i}].right=this.value" style="height:36px;font-size:12px;padding:0 7px;">
        </div>`:''}
        <div><label>body (one line, or leave blank for pass)</label>
        <input type="text" value="${b.body}" placeholder='e.g. die() or return true or health = 0' oninput="branches[${i}].body=this.value" style="height:36px;font-size:12px;"></div>
      </div>
    </div>`;
  }).join('');
}

function opOpts(sel='=='){
  return ['==','!=','>','>=','<','<=','and','or','not','is','in'].map(o=>`<option${o===sel?' selected':''}>${o}</option>`).join('');
}

function addBranch(type){
  branches.push({id:branchId++,type,left:'',op:'==',right:'',body:''});
  renderBranches();
}
function removeBranch(i){branches.splice(i,1);renderBranches();}

$('useReturn').onchange = function(){
  $('return-val-wrap').style.display = this.checked?'block':'none';
};

function generate(){
  const name = $('funcName').value.trim().replace(/\s+/g,'_')||'my_function';
  const ret = $('retType').value;
  const isStatic = $('useStatic').checked;

  const pStr = params.map(p=>{
    let s = `${p.name}: ${p.type}`;
    if(p.def) s += ` = ${p.def}`;
    return s;
  }).join(', ');

  const lines = [];
  lines.push(`${isStatic?'static ':''}func ${name}(${pStr}) -> ${ret}:`);

  if(branches.length===0){
    lines.push('\tpass');
  } else {
    branches.forEach(b=>{
      if(b.type==='else'){
        lines.push('\telse:');
      } else {
        const l = b.left||'condition';
        const r = b.right||'value';
        lines.push(`\t${b.type} ${l} ${b.op} ${r}:`);
      }
      const body = b.body.trim();
      lines.push(`\t\t${body||'pass'}`);
    });
  }

  if($('useReturn').checked){
    const rv = $('returnVal').value.trim();
    lines.push(`\treturn${rv?' '+rv:''}`);
  }

  const code = lines.join('\n');
  const el = $('output');
  el.classList.remove('empty');
  el.innerHTML = highlight(code);
}

function highlight(code){
  const KW=new Set(['func','static','var','if','elif','else','and','or','not','return','true','false','null','pass','is','in','emit_signal','print','super','self','signal','class','extends','const','enum','export','onready','tool','match','for','while','break','continue','await','yield']);
  const TYPE=new Set(['int','float','bool','String','Vector2','Vector3','Dictionary','Array','Node','Object','InputEvent','Variant','void','float','Color','Rect2','Transform2D']);
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function tl(line){
    let out='',i=0;
    while(i<line.length){
      if(line[i]==='#'){out+=`<span class="cmt">${esc(line.slice(i))}</span>`;break;}
      if(line[i]==='"'||line[i]==="'"){
        const q=line[i];let j=i+1;
        while(j<line.length&&line[j]!==q)j++;
        out+=`<span class="str">${esc(line.slice(i,j+1))}</span>`;i=j+1;continue;
      }
      if(/[a-zA-Z_]/.test(line[i])){
        let j=i;while(j<line.length&&/\w/.test(line[j]))j++;
        const w=line.slice(i,j);
        if(KW.has(w))out+=`<span class="kw">${esc(w)}</span>`;
        else if(TYPE.has(w))out+=`<span class="typ">${esc(w)}</span>`;
        else if(j<line.length&&line[j]==='(')out+=`<span class="fn">${esc(w)}</span>`;
        else out+=esc(w);
        i=j;continue;
      }
      if(/\d/.test(line[i])){
        let j=i;while(j<line.length&&/[\d.]/.test(line[j]))j++;
        out+=`<span class="num">${esc(line.slice(i,j))}</span>`;i=j;continue;
      }
      if('->:=!<>'.includes(line[i]))out+=`<span class="op">${esc(line[i])}</span>`;
      else out+=esc(line[i]);
      i++;
    }
    return out;
  }
  return code.split('\n').map(tl).join('\n');
}

function copyOut(){
  const text = $('output').innerText||$('output').textContent;
  if(!text||text.includes('press Generate'))return;
  navigator.clipboard.writeText(text).then(()=>{
    const b=$('copyBtn');b.textContent='Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1600);
  });
}

renderPresets();
renderParams();
renderBranches();
generate();
</script>
