<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GDScript Forge PRO | Smart Visual Coder + API Docs</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080b0f; --bg2:#0d1117; --bg3:#141b22; --bg4:#1c2430;
      --border:#1e2a38; --border2:#253040; --border3:#2e3d50;
      --text:#d4dde8; --text2:#7f96b0; --text3:#4a5f72;
      --green:#39d353; --blue:#58a6ff; --purple:#bc8cff;
      --amber:#e3b341; --red:#f85149; --cyan:#76e3ea;
      --r:8px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.5}
    .workspace{display:flex;flex-direction:column;min-height:100vh}
    @media (min-width:860px){ .workspace{display:grid;grid-template-columns:1fr 1fr;height:100vh;overflow:hidden} }
    .left-panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
    .right-panel{display:flex;flex-direction:column;border-left:1px solid var(--border2)}
    .output-code,.sample-code{white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',monospace;padding:16px;overflow-y:auto}
    .output-code{flex:1;background:var(--bg);max-height:60vh}
    .sample-code{background:var(--bg3);border-bottom:2px solid var(--border2);max-height:40vh}
    .sec{border-bottom:1px solid var(--border)}
    .sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-weight:600;color:var(--text3);text-transform:uppercase}
    .sec-hdr .arrow{margin-left:auto;font-size:9px;transition:transform 0.2s}
    .sec-hdr.open .arrow{transform:rotate(90deg)}
    .sec-body{display:none;padding:12px 14px;gap:10px;flex-direction:column}
    .sec-body.open{display:flex}
    .dot{width:7px;height:7px;border-radius:50%}
    input,select,textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-family:monospace;font-size:12px;width:100%}
    button{background:var(--bg3);border:1px solid var(--border3);border-radius:var(--r);padding:6px 10px;color:var(--text);cursor:pointer}
    button:hover{border-color:var(--blue);color:var(--blue)}
    .btn-primary{background:linear-gradient(135deg,#238636,#196c2e);color:white;border:none;padding:10px;font-weight:700}
    .copy-btn{padding:5px 12px;background:var(--bg4);border:1px solid var(--border2)}
    .add-btn{width:100%;padding:8px;background:var(--bg3);border:1px dashed var(--border3);border-radius:var(--r);margin-top:4px}
    .action-row{display:flex;flex-wrap:wrap;gap:6px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:8px;margin-bottom:8px;align-items:center}
    .cond-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--bg3);padding:5px;border-radius:6px;margin-top:4px}
    .func-tab-bar{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border2);padding:4px 8px;gap:2px}
    .func-tab{background:var(--bg3);padding:5px 12px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;display:inline-flex;gap:6px;align-items:center;border:1px solid var(--border2);border-bottom:none}
    .func-tab.active{background:var(--bg4);color:var(--blue);border-color:var(--blue)}
    .status-bar{font-size:10px;padding:4px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex}
    .kw{color:#ff7b72} .fn{color:#79c0ff} .ty{color:#79c0ff} .str{color:#a5d6ff} .cmt{color:#8b949e} .ann{color:#d2a8ff}
    .empty-hint{color:var(--text3);padding:12px;text-align:center}
    .param-row{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;align-items:center;background:var(--bg4);padding:6px;border-radius:6px}
    .doc-btn{background:var(--bg2);border-color:var(--blue);color:var(--blue);padding:2px 6px;font-size:10px}
    .doc-tooltip{position:fixed;background:#1a2a3a;border-left:3px solid var(--blue);padding:12px;border-radius:8px;max-width:320px;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.5);font-size:11px;display:none}
    .doc-tooltip code{background:var(--bg);padding:2px 4px;border-radius:4px}
    .doc-tooltip.show{display:block}
  </style>
</head>
<body>
<div class="workspace">
  <div class="left-panel">
    <div class="sec"><div class="sec-hdr open"><div class="dot" style="background:var(--green)"></div>Script Header<span class="arrow">▶</span></div>
      <div class="sec-body open"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <input type="text" id="classNameInput" placeholder="class_name (optional)">
        <input type="text" id="extendsInput" list="extendsList" placeholder="extends (required)">
        <select id="toolModeSelect"><option value="">Normal</option><option value="@tool">@tool (Editor)</option></select>
        <datalist id="extendsList"><option>CharacterBody3D</option><option>CharacterBody2D</option><option>Node2D</option><option>Node3D</option><option>Area3D</option><option>Node</option></datalist>
      </div></div>
    </div>
    <div class="sec"><div class="sec-hdr"><div class="dot" style="background:var(--amber)"></div>Declarations & Enums<span class="arrow">▶</span></div>
      <div class="sec-body"><div id="cvarList"></div><button class="add-btn" onclick="addClassVar()">+ Add Declaration</button><hr><button class="add-btn" onclick="openEnumModal()">🏷️ + Add Enum</button><div id="enumList"></div></div>
    </div>
    <div class="func-tab-bar" id="funcTabBar"></div>
    <div id="funcEditor" style="overflow-y:auto;flex:1"></div>
    <div style="padding:12px;display:flex;gap:8px"><button class="btn-primary" style="flex:1" onclick="generateAll()">⚡ Generate GDScript</button></div>
    <div class="status-bar"><span id="funcCount">0 functions</span><span style="flex:1"></span><span id="statusText">Ready</span></div>
  </div>
  <div class="right-panel">
    <div style="padding:10px 14px;display:flex;justify-content:space-between;border-bottom:1px solid var(--border2)"><span>⬡ Generated GDScript</span><button class="copy-btn" onclick="copyCode()">Copy</button></div>
    <div id="outputCode" class="output-code"><span class="cmt"># Press Generate</span></div>
    <div class="sample-code" id="sampleBlock"></div>
  </div>
</div>
<div id="docTooltip" class="doc-tooltip"></div>

<script>
// ============================================
// API REFERENCE DATABASE (GODOT 4)
// ============================================
const API_DOCS = {
    // Movement / Physics
    "move_and_slide": "Moves the body based on `velocity`. Returns if the body moved. Automatically handles slopes and floor detection.\n\n`move_and_slide()`\n\nUse after setting `velocity`.",
    "velocity": "Vector3 property representing movement direction and speed per second.\n\n`velocity = Vector3(x, z, y)`\n\nSet before calling `move_and_slide()`.",
    "is_on_floor": "Returns `true` if the body is on a floor surface.\n\n`if is_on_floor():`\n\nUsed for jump logic.",
    "get_vector": "Input helper: returns Vector2 from 4 actions.\n\n`Input.get_vector(\"left\", \"right\", \"up\", \"down\")`\n\nReturns normalized Vector2.",
    "transform.basis": "The body's local coordinate system basis matrix.\n\n`transform.basis * Vector3(input.x, 0, input.y)`\n\nConverts input to global direction.",
    "move_toward": "Moves a value toward a target by delta.\n\n`move_toward(from, to, delta)`\n\nSmoothly interpolates numbers.",
    
    // Combat / Damage
    "emit": "Emit a signal to connected receivers.\n\n`signal_name.emit(arg1, arg2)`\n\nSignals are decoupled event system.",
    "signal": "Declare a custom signal.\n\n`signal health_depleted(amount)`\n\nConnect using `.connect()` or `@onready` pattern.",
    
    // Node / Scene
    "get_node": "Retrieves a node by path.\n\n`get_node(\"Path/To/Node\")`\n\nShortcut: `$NodeName`",
    "$": "Shorthand for `get_node()`.\n\n`$Camera3D` or `$\"../Player\"`",
    "@onready": "Waits until node is ready before assigning.\n\n`@onready var player = $Player`\n\nPrevents null errors in `_ready()`.",
    "@export": "Exposes variable in Inspector.\n\n`@export var speed: float = 5.0`\n\nEdit values without recompiling.",
    
    // Input
    "_input": "Handler for `InputEvent` (mouse, key, touch).\n\n`func _input(event: InputEvent):`\n\nUse for UI/click handling.",
    "Input.is_action_just_pressed": "Returns true once per frame when action activated.\n\n`Input.is_action_just_pressed(\"jump\")`\n\nUse in `_process()`.",
    "InputEventMouseButton": "Mouse click/release event.\n\n`if event.button_index == MOUSE_BUTTON_LEFT:`",
    
    // Multiplayer
    "@rpc": "Remote Procedure Call decorator.\n\n`@rpc(\"any\", \"unreliable\", 0)`\n\nany=anyone can call, auth=only server.",
    "rpc_id": "Call method on specific peer.\n\n`rpc_id(peer_id, \"method_name\", args)`",
    "multiplayer.multiplayer_peer": "Get the active multiplayer peer.\n\n`get_tree().multiplayer_peer`",
    "ENetMultiplayerPeer": "Godot's built-in P2P/relay class.\n\n`var peer = ENetMultiplayerPeer.new()`",
    
    // Math / Vectors
    "Vector3": "3D vector: x, y, z.\n\n`Vector3(1, 0, 0)` = right, `Vector3(0, 1, 0)` = up.",
    "Vector2": "2D vector: x, y.\n\n`Vector2.ZERO`, `Vector2.ONE`, `Vector2.UP`",
    "lerp": "Linear interpolation.\n\n`lerp(a, b, weight)`\n\nweight 0=a, 1=b, 0.5=middle.",
    "clamp": "Restrict value to range.\n\n`clamp(value, min, max)`",
    
    // Timers / Async
    "await": "Wait for signal or coroutine.\n\n`await get_tree().create_timer(1.0).timeout`\n\nPauses function execution.",
    "create_timer": "Creates a one-shot SceneTreeTimer.\n\n`get_tree().create_timer(seconds)`\n\nUse with `await`.",
    
    // Debug
    "assert": "Stop execution if condition false.\n\n`assert(health > 0, \"Health below zero\")`\n\nUse in debug builds.",
    "print": "Output to console.\n\n`print(\"Player position: \", position)`\n\nAccepts multiple arguments.",
    "push_error": "Log error to console.\n\n`push_error(\"Something broke\")`",
    
    // Signals (built-in)
    "timeout": "Emitted when timer finishes.\n\n`timer.timeout.connect(_on_timer_timeout)`",
    "body_entered": "Area3D signal when body enters.\n\n`func _on_body_entered(body: Node3D):`",
    "area_entered": "Area signal for overlap detection.",
    
    // Animation
    "AnimationPlayer": "Plays animations on property tracks.\n\n`$AnimationPlayer.play(\"run\")`",
    "tween": "Animate properties over time.\n\n`create_tween().tween_property($Sprite, \"modulate\", Color.RED, 1.0)`",
    
    // Match statement
    "match": "Pattern matching like switch on steroids.\n\n`match value:\n    0:\n        print(\"zero\")\n    _:\n        pass`",
    
    // Default catchall
    "default": "Check Godot 4 documentation for details.\n\nDocs: docs.godotengine.org"
};

function getAPIDoc(keyword) {
    if (!keyword) return "📖 No documentation available for empty field.";
    let lower = keyword.toLowerCase();
    for (let [k, v] of Object.entries(API_DOCS)) {
        if (lower.includes(k) || k === lower) return v;
    }
    return `ℹ️ No specific API doc for "${keyword}".\n\nTry: move_and_slide, velocity, get_node, @export, @rpc, match, await\n\nOr check docs.godotengine.org`;
}

function showDocFor(fieldValue, event) {
    let doc = getAPIDoc(fieldValue);
    let tooltip = document.getElementById('docTooltip');
    tooltip.innerHTML = `<strong>📖 API Reference: ${fieldValue || 'context'}</strong><br><br>${doc.replace(/\n/g,'<br>')}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY + 15) + 'px';
    setTimeout(() => { tooltip.classList.add('show'); }, 10);
    // Hide after 5 seconds or on next click
    setTimeout(() => { tooltip.style.display = 'none'; tooltip.classList.remove('show'); }, 5000);
}

// ============================================
// SMART EXPRESSION HELPERS
// ============================================
function smartInfer(value) {
    if (!value) return null;
    if (value.includes("Vector3")) return "Vector3";
    if (value.includes("Vector2")) return "Vector2";
    if (value.includes("get_vector")) return "Vector2";
    if (value.match(/^\d+$/)) return "int";
    if (value.match(/^\d+\.\d+$/)) return "float";
    if (value === "true" || value === "false") return "bool";
    return null;
}

function formatVar(name, value, type) {
    let inferred = smartInfer(value);
    if (!type && inferred) {
        return `var ${name} := ${value}`;
    }
    return `var ${name}${type ? `: ${type}` : ''}${value ? ` = ${value}` : ''}`;
}

// ============================================
// GLOBAL STATE
// ============================================
let classVars = [];
let enums = [];
let functions = [];
let activeFnId = null;
let _nextId = 1;
let _lastGeneratedCode = "";

const uid = () => _nextId++;

const BUILTIN_TYPES = {
    enter_tree: { name:"_enter_tree", params:[], ret:"void" },
    ready: { name:"_ready", params:[], ret:"void" },
    process: { name:"_process", params:[{name:"delta",type:"float"}], ret:"void" },
    physics_process: { name:"_physics_process", params:[{name:"delta",type:"float"}], ret:"void" },
    input: { name:"_input", params:[{name:"event",type:"InputEvent"}], ret:"void" }
};
let builtInAdded = { enter_tree:false, ready:false, process:false, physics_process:false, input:false };

function esc(s){ return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function toggleSec(hdr){ hdr.classList.toggle('open'); let b=hdr.nextElementSibling; if(b)b.classList.toggle('open'); }

// ============================================
// DECLARATIONS (same as before, omitted for brevity but included in full)
// ============================================
function renderClassVars(){
    const el=document.getElementById('cvarList');
    if(!classVars.length){ el.innerHTML='<div class="empty-hint">✨ Add @export, @onready, signal, const</div>'; return; }
    el.innerHTML=classVars.map(c=>`<div style="display:flex;flex-wrap:wrap;gap:6px;background:var(--bg4);margin-bottom:5px;padding:5px">
        <select onchange="updateCV(${c.id},'ann',this.value)" style="width:100px">${['','@export','@onready','const','signal'].map(a=>`<option ${c.ann===a?'selected':''}>${a||'none'}</option>`).join('')}</select>
        <input value="${esc(c.name)}" placeholder="name" onchange="updateCV(${c.id},'name',this.value)" style="flex:1">
        ${c.ann!=='signal'?`<select onchange="updateCV(${c.id},'type',this.value)" style="width:100px"><option value="">(type)</option><option>int</option><option>float</option><option>String</option><option>bool</option><option>Vector3</option><option>Node</option></select>
        <input placeholder="= value" value="${esc(c.val)}" onchange="updateCV(${c.id},'val',this.value)" style="flex:1">`:`<span style="color:var(--text3)">(signal)</span>`}
        <button onclick="removeCV(${c.id})">🗑</button></div>`).join('');
}
function addClassVar(){ classVars.push({id:uid(),ann:'',name:'new_var',type:'',val:''}); renderClassVars(); }
function removeCV(id){ classVars=classVars.filter(c=>c.id!==id); renderClassVars(); }
function updateCV(id,field,val){ let c=classVars.find(c=>c.id===id); if(c) c[field]=val; }

function openEnumModal(){
    let name=prompt("Enum name:"); if(!name) return;
    enums.push({ id:uid(), name, values:[], exportDropdown:false, autoMatch:false, matchFuncName:`handle_${name.toLowerCase()}` });
    editEnum(enums[enums.length-1].id);
}
function renderEnumsUI(){
    const container=document.getElementById('enumList');
    if(!enums.length){ container.innerHTML=''; return; }
    container.innerHTML=enums.map(e=>`<div style="background:var(--bg3);margin-top:8px;padding:8px;border-radius:6px"><strong>${esc(e.name)}</strong> 
        <button onclick="editEnum(${e.id})">✏️</button> <button onclick="removeEnum(${e.id})">🗑</button>
        <div><label><input type="checkbox" ${e.exportDropdown?'checked':''} onchange="toggleEnumExport(${e.id},this.checked)"> @export_enum</label>
        <label><input type="checkbox" ${e.autoMatch?'checked':''} onchange="toggleEnumAutoMatch(${e.id},this.checked)"> Auto-match</label></div>
        <div>${e.values.map(v=>v.name).join(', ')}</div></div>`).join('');
}
function editEnum(id){
    let e=enums.find(e=>e.id===id); if(!e) return;
    let vals=prompt("Values (comma):", e.values.map(v=>v.name).join(','));
    if(vals) e.values=vals.split(',').map((s,i)=>({name:s.trim(),value:i}));
    renderEnumsUI();
}
function removeEnum(id){ enums=enums.filter(e=>e.id!==id); renderEnumsUI(); }
function toggleEnumExport(id,val){ let e=enums.find(e=>e.id===id); if(e) e.exportDropdown=val; }
function toggleEnumAutoMatch(id,val){ let e=enums.find(e=>e.id===id); if(e) e.autoMatch=val; }

function addCustomFunction(){
    let name=prompt("Function name:"); if(!name) return;
    functions.push({ id:uid(), name, isBuiltin:false, returnType:'void', params:[], actions:[], isStatic:false, rpcMode:'none' });
    activeFnId = functions[functions.length-1].id;
    renderTabs(); renderEditor(); updateStatus();
}
function addBuiltinFromSelect(){
    let sel=document.getElementById('builtinSelect'); if(!sel||!sel.value) return;
    let key=sel.value; if(builtInAdded[key]){ alert("Already added"); return; }
    let def=BUILTIN_TYPES[key];
    functions.push({ id:uid(), name:def.name, isBuiltin:true, builtinKey:key, returnType:def.ret, params:def.params.map(p=>({...p,id:uid()})), actions:[], isStatic:false, rpcMode:'none' });
    builtInAdded[key]=true; activeFnId = functions[functions.length-1].id;
    renderTabs(); renderEditor(); updateStatus();
    sel.value='';
}
function removeFunc(id){
    let fn=functions.find(f=>f.id===id);
    if(fn && fn.isBuiltin && fn.builtinKey) builtInAdded[fn.builtinKey]=false;
    functions=functions.filter(f=>f.id!==id);
    if(activeFnId===id) activeFnId=functions.length?functions[0].id:null;
    renderTabs(); renderEditor(); updateStatus();
}
function setActiveFunc(id){ activeFnId=id; renderTabs(); renderEditor(); }
function getActiveFn(){ return functions.find(f=>f.id===activeFnId)||null; }
function updateFn(field,val){ let fn=getActiveFn(); if(fn){ fn[field]=val; if(field==='name') renderTabs(); } }
function addParam(){ let fn=getActiveFn(); if(fn){ fn.params.push({id:uid(),name:`p${fn.params.length+1}`,type:'',defaultValue:''}); renderEditor(); } }
function removeParam(id){ let fn=getActiveFn(); if(fn) fn.params=fn.params.filter(p=>p.id!==id); renderEditor(); }
function updateParam(pid,field,val){ let fn=getActiveFn(); let p=fn?.params.find(p=>p.id===pid); if(p) p[field]=val; }

function addAction(type='pass'){
    let fn=getActiveFn(); if(!fn) return;
    let last=fn.actions[fn.actions.length-1];
    let indent=last?(last.indent||0):0;
    if(last && ['if','while','match','for'].includes(last.type)) indent++;
    
    let newAction = { id:uid(), type, value:'', name:'', object:'', left:'', right:'', op:'+', indent, conditions:[], patterns:[] };
    if(type === 'if' || type === 'while') {
        newAction.conditions = [{ id:uid(), not:false, left:'', cmp:'', right:'', op:'and' }];
    } else if(type === 'match') {
        newAction.patterns = [{ id:uid(), values:['_'], isDefault:true, actions:[] }];
    }
    fn.actions.push(newAction);
    renderEditor(); updateStatus();
}
function removeAction(id){ let fn=getActiveFn(); if(fn) fn.actions=fn.actions.filter(a=>a.id!==id); renderEditor(); }
function updateAction(id,field,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===id); if(a) a[field]=val; renderEditor(); }
function moveAction(id,dir){ let fn=getActiveFn(); let idx=fn?.actions.findIndex(a=>a.id===id); if(idx!==undefined){ let nxt=idx+dir; if(nxt>=0 && nxt<fn.actions.length){ [fn.actions[idx],fn.actions[nxt]]=[fn.actions[nxt],fn.actions[idx]]; renderEditor(); } } }
function changeIndent(id,delta){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===id); if(a){ a.indent=Math.max(0,Math.min(8,(a.indent||0)+delta)); renderEditor(); } }

function buildCondStr(condArray){
    if(!condArray.length) return 'true';
    return condArray.map((c,i)=>{
        let notStr=c.not?'not ':'';
        let cmpStr=c.cmp?` ${c.cmp} ${c.right||'null'}`:'';
        let part = `${notStr}${c.left||'condition'}${cmpStr}`;
        return i===0 ? part : ` ${c.op} ${part}`;
    }).join('');
}
function addCondRow(aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a){ a.conditions.push({id:uid(),not:false,left:'',cmp:'',right:'',op:'and'}); renderEditor(); } }
function removeCondRow(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a) a.conditions=a.conditions.filter(c=>c.id!==cid); renderEditor(); }
function updateCond(aid,cid,field,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let c=a?.conditions.find(c=>c.id===cid); if(c) c[field]=val; renderEditor(); }
function toggleCondNot(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let c=a?.conditions.find(c=>c.id===cid); if(c) c.not=!c.not; renderEditor(); }
function toggleCondOp(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let idx=a?.conditions.findIndex(c=>c.id===cid); if(idx>0){ a.conditions[idx-1].op = a.conditions[idx-1].op==='and'?'or':'and'; renderEditor(); } }

function addMatchPattern(aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a?.type==='match'){ a.patterns.push({id:uid(),values:['new'],isDefault:false,actions:[]}); renderEditor(); } }
function addPatternValue(pid,aid,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let p=a?.patterns.find(p=>p.id===pid); if(p && val.trim()){ p.values=val.split(',').map(v=>v.trim()); renderEditor(); } }
function addPatternAction(pid,aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let p=a?.patterns.find(p=>p.id===pid); if(p){ p.actions.push({id:uid(),type:'pass',value:'',indent:2}); renderEditor(); } }
function removePattern(pid,aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a?.patterns?.length>1){ a.patterns=a.patterns.filter(p=>p.id!==pid); renderEditor(); } }

function genLine(a){
    if(a.type==='raw') return a.value;
    if(a.type==='comment') return `# ${a.value}`;
    if(a.type==='if') return `if ${buildCondStr(a.conditions)}:`;
    if(a.type==='while') return `while ${buildCondStr(a.conditions)}:`;
    if(a.type==='for') return `for ${a.value || 'item in array'}:`;
    if(a.type==='await') return `await ${a.value || 'signal'}`;
    if(a.type==='assert') return `assert(${a.value || 'condition'}, "${a.name || 'message'}")`;
    if(a.type==='var') return formatVar(a.name || 'var_name', a.value || '', a.varType);
    if(a.type==='assign') return `${a.name || 'target'} = ${a.value || 'value'}`;
    if(a.type==='call') return `${a.value || 'function'}()`;
    if(a.type==='method') return `${a.object || 'obj'}.${a.value || 'method'}()`;
    if(a.type==='math') return `${a.left || 'a'} ${a.op || '+'} ${a.right || 'b'}`;
    if(a.type==='return') return a.value ? `return ${a.value}` : 'return';
    if(a.type==='print') return `print(${a.value || ''})`;
    if(a.type==='pass') return 'pass';
    if(a.type==='match'){
        let out = `match ${a.value || 'value'}:\n`;
        for(let p of (a.patterns||[])) {
            out += `    ${p.values.join(', ')}:\n`;
            for(let act of (p.actions||[])) out += `        ${genLine(act)}\n`;
        }
        return out.trimEnd();
    }
    return 'pass';
}

function generateAll(){
    let blocks=[];
    let cn=document.getElementById('classNameInput').value.trim();
    let ex=document.getElementById('extendsInput').value.trim();
    let toolMode=document.getElementById('toolModeSelect').value;
    if(toolMode) blocks.push(toolMode);
    if(cn) blocks.push(`class_name ${cn}`);
    if(ex) blocks.push(`extends ${ex}`);
    else blocks.push(`# WARNING: extends required`);
    blocks.push('');
    
    for(let cv of classVars){
        if(cv.ann==='signal') blocks.push(`signal ${cv.name}`);
        else if(cv.ann==='const') blocks.push(`const ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
        else if(cv.ann==='@export') blocks.push(`@export var ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
        else if(cv.ann==='@onready'){
            if(cv.val && cv.val.startsWith('$')) blocks.push(`@onready var ${cv.name} := ${cv.val}`);
            else blocks.push(`@onready var ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
        } else {
            let useInference = cv.val && (cv.val.includes('get_node') || cv.val.includes('$'));
            if(useInference && !cv.type) blocks.push(`var ${cv.name} := ${cv.val}`);
            else blocks.push(`var ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
        }
    }
    for(let e of enums){
        if(e.exportDropdown) blocks.push(`@export_enum("${e.values.map(v=>v.name).join('", "')}") var ${e.name.toLowerCase()}: int = 0`);
        else blocks.push(`enum ${e.name} { ${e.values.map(v=>v.name).join(', ')} }`);
    }
    if(classVars.length||enums.length) blocks.push('');
    
    for(let fn of functions){
        let params=fn.params.map(p=>`${p.name}${p.type?`: ${p.type}`:''}${p.defaultValue?` = ${p.defaultValue}`:''}`).join(', ');
        let returnStr = (fn.returnType && fn.returnType!=='void') ? ` -> ${fn.returnType}` : '';
        blocks.push(`func ${fn.name}(${params})${returnStr}:`);
        if(!fn.actions.length) blocks.push('\tpass');
        else for(let a of fn.actions){
            let indent='\t'.repeat((a.indent||0)+1);
            let line=genLine(a);
            if(line) blocks.push(`${indent}${line}`);
        }
        blocks.push('');
    }
    _lastGeneratedCode = blocks.join('\n').trim();
    document.getElementById('outputCode').innerHTML = highlight(_lastGeneratedCode);
    updateStatus();
}

function highlight(code){
    let h=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h=h.replace(/(#.*$)/gm,'<span class="cmt">$1</span>');
    h=h.replace(/"[^"]*"/g,'<span class="str">$&</span>');
    h=h.replace(/\b(func|var|const|if|for|while|match|return|pass|enum|signal|class_name|extends|@export|@onready|@tool|await|assert|@rpc)\b/g,'<span class="kw">$1</span>');
    h=h.replace(/@\w+/g,'<span class="ann">$&</span>');
    h=h.replace(/\b(CharacterBody3D|CharacterBody2D|Vector3|Vector2|Node3D|Area3D|AnimationPlayer|int|float|String|bool|void|Node|InputEvent)\b/g,'<span class="ty">$1</span>');
    return h;
}
function copyCode(){ navigator.clipboard.writeText(_lastGeneratedCode); alert("Copied!"); }
function updateStatus(){ document.getElementById('funcCount').innerText = `${functions.length} functions · ${functions.reduce((s,f)=>s+f.actions.length,0)} actions`; }

function renderTabs(){
    let bar=document.getElementById('funcTabBar');
    let opts=''; for(let [key,def] of Object.entries(BUILTIN_TYPES)) if(!builtInAdded[key]) opts+=`<option value="${key}">${def.name}</option>`;
    let html=functions.map(f=>`<div class="func-tab ${f.id===activeFnId?'active':''}" onclick="setActiveFunc(${f.id})">${esc(f.name)}<span onclick="event.stopPropagation();removeFunc(${f.id})" style="margin-left:6px;color:var(--red)">✕</span></div>`).join('');
    bar.innerHTML = html + `<div style="display:inline-flex;gap:4px;margin-left:8px"><select id="builtinSelect"><option value="">➕ Built‑in</option>${opts}</select><button onclick="addBuiltinFromSelect()">Add</button><button onclick="addCustomFunction()">+ Custom</button></div>`;
}

function renderEditor(){
    let fn=getActiveFn();
    let ed=document.getElementById('funcEditor');
    if(!fn){ ed.innerHTML='<div class="empty-hint">Select or add a function</div>'; return; }
    
    let paramsHtml = `<div>${fn.params.map(p => `<div class="param-row">
        <input value="${esc(p.name)}" placeholder="name" onchange="updateParam(${p.id},'name',this.value)" style="flex:1;min-width:120px">
        <select onchange="updateParam(${p.id},'type',this.value)" style="min-width:110px">
            <option value="">type</option><option ${p.type==='int'?'selected':''}>int</option><option ${p.type==='float'?'selected':''}>float</option>
            <option ${p.type==='String'?'selected':''}>String</option><option ${p.type==='bool'?'selected':''}>bool</option><option ${p.type==='Vector3'?'selected':''}>Vector3</option>
        </select>
        <input placeholder="default value" value="${esc(p.defaultValue)}" onchange="updateParam(${p.id},'defaultValue',this.value)" style="flex:0.8;min-width:120px">
        <button onclick="removeParam(${p.id})">🗑</button>
    </div>`).join('')}<button class="add-btn" onclick="addParam()">+ Parameter</button></div>`;
    
    let actionsHtml = fn.actions.map(a => {
        // Helper to add doc button next to relevant inputs
        let docBtn = (fieldValue, inputHtml) => {
            return `<div style="display:inline-flex;align-items:center;gap:4px;">${inputHtml}<button class="doc-btn" onclick="showDocFor('${fieldValue.replace(/'/g, "\\'")}', event)">📖 Doc</button></div>`;
        };
        
        if(a.type==='match') {
            let patternsHtml = (a.patterns||[]).map(p=>`<div style="margin-left:20px;margin-top:5px"><input placeholder="values (comma)" value="${p.values.join(',')}" onchange="addPatternValue(${p.id},${a.id},this.value)" style="width:150px"><button onclick="addPatternAction(${p.id},${a.id})">+act</button><button onclick="removePattern(${p.id},${a.id})">🗑</button><div>${(p.actions||[]).map(act=>`<div>📌 ${genLine(act)} <button onclick="removeAction(${act.id})">✕</button></div>`).join('')}</div></div>`).join('');
            return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button><select onchange="updateAction(${a.id},'type',this.value)"><option>match</option><option>if</option><option>for</option><option>pass</option></select>${docBtn('match', `<input placeholder="expression" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="width:120px">`)}<div><button onclick="changeIndent(${a.id},-1)">◀</button>${a.indent||0}<button onclick="changeIndent(${a.id},1)">▶</button></div><button onclick="addMatchPattern(${a.id})">+Pattern</button><button onclick="removeAction(${a.id})">🗑</button>${patternsHtml}</div>`;
        }
        if(a.type==='if' || a.type==='while') {
            let condHtml = (a.conditions||[]).map((c,i)=>`<div class="cond-row">${i>0?`<button class="cond-op" onclick="toggleCondOp(${a.id},${c.id})">${(a.conditions[i-1].op||'and').toUpperCase()}</button>`:''}<button onclick="toggleCondNot(${a.id},${c.id})" style="background:${c.not?'var(--blue-dim)':'var(--bg2)'}">not</button>${docBtn(c.left, `<input placeholder="left" value="${esc(c.left)}" onchange="updateCond(${a.id},${c.id},'left',this.value)" style="width:100px">`)}<select onchange="updateCond(${a.id},${c.id},'cmp',this.value)" style="min-width:55px"><option value="">cmp</option><option ${c.cmp==='=='?'selected':''} value="==">==</option><option ${c.cmp==='!='?'selected':''} value="!=">!=</option><option ${c.cmp==='<'?'selected':''} value="<">&lt;</option><option ${c.cmp==='>'?'selected':''} value=">">&gt;</option><option ${c.cmp==='<='?'selected':''} value="<=">&lt;=</option><option ${c.cmp==='>='?'selected':''} value=">=">&gt;=</option></select>${docBtn(c.right, `<input placeholder="right" value="${esc(c.right)}" onchange="updateCond(${a.id},${c.id},'right',this.value)" style="width:100px">`)}<button onclick="removeCondRow(${a.id},${c.id})">✕</button></div>`).join('');
            return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button><select onchange="updateAction(${a.id},'type',this.value)"><option>if</option><option>while</option><option>pass</option></select><div><button onclick="changeIndent(${a.id},-1)">◀</button>${a.indent||0}<button onclick="changeIndent(${a.id},1)">▶</button></div><button onclick="addCondRow(${a.id})">+ AND/OR</button><button onclick="removeAction(${a.id})">🗑</button>${condHtml}</div>`;
        }
        
        let inputField = '';
        if(a.type === 'method') {
            inputField = `<div style="display:inline-flex;gap:4px;flex-wrap:wrap;">${docBtn(a.object, `<input placeholder="object" value="${esc(a.object)}" onchange="updateAction(${a.id},'object',this.value)" style="width:100px">`)}${docBtn(a.value, `<input placeholder="method" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="width:120px">`)}</div>`;
        } else if(a.type === 'math') {
            inputField = `<div style="display:inline-flex;gap:4px;flex-wrap:wrap;">${docBtn(a.left, `<input placeholder="left" value="${esc(a.left)}" onchange="updateAction(${a.id},'left',this.value)" style="width:80px">`)}<select onchange="updateAction(${a.id},'op',this.value)" style="width:60px"><option>+</option><option>-</option><option>*</option><option>/</option></select>${docBtn(a.right, `<input placeholder="right" value="${esc(a.right)}" onchange="updateAction(${a.id},'right',this.value)" style="width:80px">`)}</div>`;
        } else if(a.type === 'var') {
            inputField = `<div style="display:inline-flex;gap:4px;flex-wrap:wrap;">${docBtn(a.name, `<input placeholder="var name" value="${esc(a.name)}" onchange="updateAction(${a.id},'name',this.value)" style="width:120px">`)}${docBtn(a.value, `<input placeholder="= value" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1;min-width:150px">`)}</div>`;
        } else if(a.type === 'assign') {
            inputField = `<div style="display:inline-flex;gap:4px;flex-wrap:wrap;">${docBtn(a.name, `<input placeholder="target" value="${esc(a.name)}" onchange="updateAction(${a.id},'name',this.value)" style="width:120px">`)} = ${docBtn(a.value, `<input placeholder="value" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1;min-width:150px">`)}</div>`;
        } else if(a.type === 'call') {
            inputField = docBtn(a.value, `<input placeholder="function name" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1;min-width:150px">`) + `()`;
        } else if(a.type === 'await') {
            inputField = docBtn(a.value, `<input placeholder="signal/timer" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        } else if(a.type === 'assert') {
            inputField = docBtn(a.value, `<input placeholder="condition" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        } else if(a.type === 'return') {
            inputField = docBtn(a.value, `<input placeholder="value (optional)" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        } else if(a.type === 'print') {
            inputField = docBtn(a.value, `<input placeholder="text/variable" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        } else if(a.type === 'raw') {
            inputField = `<input placeholder="raw GDScript" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`;
        } else if(a.type === 'comment') {
            inputField = `<input placeholder="comment text" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`;
        } else if(a.type === 'for') {
            inputField = docBtn(a.value, `<input placeholder="item in array" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        } else {
            inputField = docBtn(a.value, `<input placeholder="value" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)" style="flex:1">`);
        }
        
        return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button>
                <select onchange="updateAction(${a.id},'type',this.value)"><option>pass</option><option>raw</option><option>comment</option><option>var</option><option>assign</option><option>call</option><option>method</option><option>math</option><option>return</option><option>print</option><option>for</option><option>if</option><option>match</option><option>await</option><option>assert</option></select>
                ${inputField}
                <div><button onclick="changeIndent(${a.id},-1)">◀</button>${a.indent||0}<button onclick="changeIndent(${a.id},1)">▶</button></div>
                <button onclick="removeAction(${a.id})">🗑</button></div>`;
    }).join('');
    
    ed.innerHTML = `<div style="padding:12px;background:var(--bg3);border-bottom:1px solid var(--border)">
        <div style="display:flex;gap:12px;flex-wrap:wrap"><label>Name: <input value="${esc(fn.name)}" onchange="updateFn('name',this.value)" style="width:180px"></label>
        <label>Return: <select onchange="updateFn('returnType',this.value)"><option ${fn.returnType==='void'?'selected':''}>void</option><option ${fn.returnType==='int'?'selected':''}>int</option><option ${fn.returnType==='bool'?'selected':''}>bool</option><option ${fn.returnType==='String'?'selected':''}>String</option></select></label></div>
        <hr>${paramsHtml}</div>
        <div style="padding:12px"><div><strong>Actions</strong> 
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('var')">+ Var</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('assign')">+ Assign</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('call')">+ Call</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('method')">+ Method</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('math')">+ Math</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('if')">+ If</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('raw')">+ Raw</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('await')">+ Await</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('assert')">+ Assert</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('for')">+ For</button>
        <button class="add-btn" style="width:auto;display:inline-block;margin:2px" onclick="addAction('comment')">+ Comment</button>
        </div><div style="margin-top:12px">${actionsHtml || '<div class="empty-hint">No actions. Click + to add.</div>'}</div></div>`;
}

const SAMPLE = `# SAMPLE: Player Controller
extends CharacterBody3D

@export var speed: float = 5.0
@export var jump_velocity: float = 4.5
@onready var camera := $Camera3D

var health: int = 100
signal player_died

func _physics_process(delta: float) -> void:
    var input_dir := Input.get_vector("left", "right", "forward", "back")
    var direction := (transform.basis * Vector3(input_dir.x, 0, input_dir.y)).normalized()
    if direction:
        velocity.x = direction.x * speed
        velocity.z = direction.z * speed
    else:
        velocity.x = move_toward(velocity.x, 0, speed)
        velocity.z = move_toward(velocity.z, 0, speed)
    if Input.is_action_just_pressed("jump") and is_on_floor():
        velocity.y = jump_velocity
    move_and_slide()

func take_damage(amount: int) -> void:
    health -= amount
    if health <= 0:
        health = 0
        player_died.emit()`;
document.getElementById('sampleBlock').innerHTML = highlight(SAMPLE);
