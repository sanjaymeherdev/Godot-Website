<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Godot Assets Store | Products from data/products.json</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c12;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #eef2ff;
      padding: 2rem 1.5rem;
      line-height: 1.4;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header section */
    .store-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .store-header h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #ff9a5f, #ff6b35);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
    }

    .store-header p {
      color: #8e9aaf;
      font-size: 1rem;
      max-width: 550px;
      margin: 0 auto;
    }

    /* status + loading */
    .status-area {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid #1f2538;
      padding-bottom: 0.75rem;
    }

    .product-count {
      font-size: 0.85rem;
      background: #1e243b;
      padding: 0.25rem 0.8rem;
      border-radius: 30px;
      color: #b9c3e6;
    }

    .refresh-info {
      font-size: 0.75rem;
      color: #5d6b8f;
    }

    /* grid layout – clean & responsive */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.7rem;
    }

    /* card design – minimal but readable */
    .product-card {
      background: #121520;
      border-radius: 1.2rem;
      border: 1px solid #252c42;
      overflow: hidden;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    .product-card:hover {
      border-color: #ff6b35;
      transform: translateY(-3px);
      box-shadow: 0 12px 25px -12px rgba(255, 107, 53, 0.25);
    }

    /* card image / icon area */
    .card-media {
      background: #0b0e17;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 0;
      border-bottom: 1px solid #1e2538;
      min-height: 130px;
    }

    .media-icon {
      font-size: 3.5rem;
      line-height: 1;
    }

    .media-img {
      max-width: 100%;
      max-height: 100px;
      object-fit: contain;
      border-radius: 8px;
    }

    /* card body */
    .card-body {
      padding: 1.2rem 1.2rem 1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #ffffff;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .product-badge {
      font-size: 0.65rem;
      background: #2a2f47;
      padding: 0.2rem 0.55rem;
      border-radius: 40px;
      font-weight: 500;
      color: #cdd9ff;
      text-transform: uppercase;
    }

    .product-badge.live {
      background: #1f5437;
      color: #9effcf;
    }

    .product-badge.coming {
      background: #5a3e1f;
      color: #ffcd94;
    }

    .product-category {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #ff6b35;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }

    .short-desc {
      font-size: 0.85rem;
      color: #b9c3e6;
      line-height: 1.45;
      margin: 0.5rem 0 0.9rem 0;
      flex: 1;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      border-top: 1px solid #1f2538;
      padding-top: 0.9rem;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff9f6e;
    }

    .price-currency {
      font-size: 0.9rem;
      font-weight: 500;
      color: #cbd5ff;
    }

    .status-tag {
      font-size: 0.7rem;
      background: #1e243b;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      color: #a6b3e0;
    }

    /* error & empty states */
    .error-message {
      background: #1f1825;
      border-left: 5px solid #ff6b35;
      padding: 1.2rem 1.5rem;
      border-radius: 1rem;
      margin: 2rem 0;
      color: #ffb48a;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: #10131f;
      border-radius: 2rem;
      margin-top: 2rem;
    }

    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.8rem;
      padding: 3rem;
      color: #ff9066;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2a2f4e;
      border-top: 3px solid #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      margin-top: 3.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #4c567a;
      border-top: 1px solid #1a1f30;
      padding-top: 1.8rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .products-grid {
        gap: 1rem;
      }
      .product-title {
        font-size: 1rem;
      }
      .price {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="store-header">
    <h1>⚙️ Godot Assets Hub</h1>
    <p>production‑ready systems • bundles • frameworks • plugins</p>
  </div>

  <div class="status-area">
    <div class="product-count" id="productCountBadge">— products</div>
    <div class="refresh-info">📁 data/products.json · live load</div>
  </div>

  <div id="productsContainer">
    <!-- loading indicator -->
    <div class="loading-spinner" id="loadingIndicator">
      <div class="spinner"></div>
      <span>loading assets from JSON...</span>
    </div>
  </div>

  <footer>
    🎮 Godot 4 ready • all products displayed from /data/products.json
  </footer>
</div>

<script>
  // --------------------------------------------------------------
  // ultra simple: fetch JSON from "data/products.json" and render
  // --------------------------------------------------------------
  const productsContainer = document.getElementById('productsContainer');
  const productCountBadge = document.getElementById('productCountBadge');

  // helper: format price based on INR/USD (both stored)
  // we display both: ₹ INR and $ USD for clarity
  function formatPrice(product) {
    const inr = product.price_inr;
    const usd = product.price_usd;
    // if both exist, show both; else fallback
    if (inr !== undefined && usd !== undefined) {
      return `₹${inr}  /  $${usd}`;
    } else if (inr !== undefined) {
      return `₹${inr}`;
    } else if (usd !== undefined) {
      return `$${usd}`;
    }
    return '—';
  }

  // get status label + live/coming class
  function getStatusInfo(product) {
    if (product.live === true) {
      return { text: '✅ LIVE', class: 'live' };
    } else if (product.live === false) {
      return { text: '🔜 COMING SOON', class: 'coming' };
    }
    return { text: 'status unknown', class: '' };
  }

  // get icon or image fallback
  function renderMedia(product) {
    // if image path exists and not empty -> show img
    if (product.image && product.image.trim() !== "") {
      // handle relative path (maybe images/...)
      return `<img class="media-img" src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'media-icon\'>${product.icon || '📦'}</div>';">`;
    } else {
      // otherwise show big icon
      const iconChar = product.icon && product.icon.length > 0 ? product.icon : (product.type === 'bundle' ? '📦' : (product.type === 'framework' ? '🎮' : '📄'));
      return `<div class="media-icon">${iconChar}</div>`;
    }
  }

  // render tags (simple, first 3 tags)
  function renderTags(product) {
    if (!product.tags || product.tags.length === 0) return '';
    const visibleTags = product.tags.slice(0, 3);
    return `<div style="display:flex; flex-wrap:wrap; gap:6px; margin: 6px 0 4px 0;">
              ${visibleTags.map(tag => `<span style="background:#1b2136; padding:2px 8px; border-radius:40px; font-size:0.7rem; color:#b9c6f0;">${tag}</span>`).join('')}
            </div>`;
  }

  // render single product card
  function createProductCard(product) {
    const status = getStatusInfo(product);
    const priceStr = formatPrice(product);
    const shortDesc = product.short_description || product.description?.substring(0, 120) || "No description available.";
    // include includes / bundle items if present (optional)
    let bundleHint = '';
    if (product.type === 'bundle' && product.includes && product.includes.length > 0) {
      const shortList = product.includes.slice(0, 4).join(', ');
      bundleHint = `<div style="font-size:0.7rem; color:#9aa9c7; margin-top: 5px;">📦 includes: ${shortList}${product.includes.length > 4 ? ' …' : ''}</div>`;
    }
    
    return `
      <div class="product-card">
        <div class="card-media">
          ${renderMedia(product)}
        </div>
        <div class="card-body">
          <div class="product-category">${product.category || 'asset'} / ${product.type || 'item'}</div>
          <div class="product-title">
            ${escapeHtml(product.name)}
            <span class="product-badge ${status.class}">${status.text}</span>
          </div>
          ${renderTags(product)}
          <div class="short-desc">
            ${escapeHtml(shortDesc.length > 110 ? shortDesc.substring(0, 110) + '…' : shortDesc)}
          </div>
          ${bundleHint}
          <div class="price-row">
            <div class="price">${priceStr}</div>
            <div class="status-tag">${product.live ? 'available now' : 'pre-order / soon'}</div>
          </div>
        </div>
      </div>
    `;
  }

  // simple escape to avoid injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // render product grid from array
  function renderProducts(productsArray) {
    if (!productsArray || productsArray.length === 0) {
      productsContainer.innerHTML = `<div class="empty-state">
        <div style="font-size: 3rem; margin-bottom: 1rem;">📭</div>
        <h3>No products found</h3>
        <p>JSON file loaded but no items? Check data/products.json structure.</p>
      </div>`;
      productCountBadge.innerText = `0 products`;
      return;
    }

    const validProducts = productsArray.filter(p => p && typeof p === 'object');
    productCountBadge.innerText = `${validProducts.length} products`;

    const gridHtml = `
      <div class="products-grid">
        ${validProducts.map(product => createProductCard(product)).join('')}
      </div>
    `;
    productsContainer.innerHTML = gridHtml;
  }

  // show error message
  function showError(message) {
    productsContainer.innerHTML = `
      <div class="error-message">
        <strong>⚠️ Failed to load products</strong><br>
        ${escapeHtml(message)}<br><br>
        <span style="font-size:0.85rem;">💡 Make sure file exists at: <code style="background:#1e1e2e; padding:2px 5px;">data/products.json</code><br>
        And that it contains a valid JSON array of products.</span>
      </div>
    `;
    productCountBadge.innerText = `error`;
  }

  // main fetch
  async function loadProducts() {
    // show loading spinner initially
    productsContainer.innerHTML = `<div class="loading-spinner" id="loadingIndicator">
      <div class="spinner"></div>
      <span>fetching data/products.json ...</span>
    </div>`;
    
    try {
      const response = await fetch('data/products.json', {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      });
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} — file not found or server error`);
      }
      
      const rawData = await response.json();
      
      // validate: should be array
      let productsList = [];
      if (Array.isArray(rawData)) {
        productsList = rawData;
      } else if (rawData && typeof rawData === 'object' && Array.isArray(rawData.products)) {
        // if by chance nested under "products" key, support it gracefully
        productsList = rawData.products;
      } else if (rawData && typeof rawData === 'object') {
        // not array, but maybe object with numeric keys? fallback
        const possibleArray = Object.values(rawData);
        if (possibleArray.length > 0 && possibleArray[0] && possibleArray[0].id) {
          productsList = possibleArray;
        } else {
          throw new Error('JSON root is not an array of products. Expected format: [ { "id": ..., "name": ... } ]');
        }
      } else {
        throw new Error('Invalid JSON: top-level should be product array');
      }
      
      if (productsList.length === 0) {
        // maybe empty array but valid
        renderProducts([]);
        return;
      }
      
      // optional: sort by id or name to keep consistent order
      productsList.sort((a,b) => (a.id || 0) - (b.id || 0));
      renderProducts(productsList);
      
    } catch (err) {
      console.error('store load error:', err);
      showError(err.message || 'Could not load data/products.json. Verify the path and JSON syntax.');
    }
  }

  // start
  loadProducts();
</script>
</body>
</html>
