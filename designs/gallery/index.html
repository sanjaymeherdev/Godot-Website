<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Design Gallery — Sanjay Meher</title>
<meta name="description" content="Browse designs, select your favorites, and send the list directly on WhatsApp.">
<style>
  :root{
    --bg: #0c0e12;
    --panel: #15181f;
    --panel-2: #1c2029;
    --line: #262b35;
    --text: #eef0f3;
    --muted: #8b909c;
    --accent: #5ee6c8;
    --accent-dim: rgba(94,230,200,0.14);
    --danger: #ff6b6b;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height:100vh;
    padding-bottom: 110px; /* room for sticky bar */
  }

  header{
    padding: 28px 20px 18px;
    text-align:center;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(94,230,200,0.06), transparent);
  }
  header h1{
    margin:0 0 6px;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: -0.02em;
  }
  header h1 span{ color: var(--accent); }
  header p{
    margin:0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  main{
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  #status{
    text-align:center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 0.95rem;
  }
  #status.error{ color: var(--danger); }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .card{
    position:relative;
    background: var(--panel);
    border:1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
  }
  .card:hover{ border-color:#3a4150; transform: translateY(-2px); }
  .card.selected{ border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

  .card .thumb-wrap{
    aspect-ratio: 1/1;
    width:100%;
    overflow:hidden;
    background: var(--panel-2);
  }
  .card img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
  }

  .badge-num{
    position:absolute;
    top:8px; left:8px;
    background: rgba(12,14,18,0.78);
    color: var(--text);
    font-size: 0.75rem;
    font-weight:600;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    pointer-events:none;
  }

  .checkbox-wrap{
    position:absolute;
    top:8px; right:8px;
    z-index:2;
  }
  .checkbox-wrap input{
    width:22px; height:22px;
    cursor:pointer;
    accent-color: var(--accent);
  }

  /* Sticky selection bar */
  #selectbar{
    position:fixed;
    left:0; right:0; bottom:0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 12px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    z-index: 50;
    transform: translateY(100%);
    transition: transform .25s ease;
  }
  #selectbar.show{ transform: translateY(0); }

  #selectbar .count{
    color: var(--muted);
    font-size: 0.9rem;
  }
  #selectbar .count strong{ color: var(--text); }

  .btn{
    border:none;
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 0.92rem;
    font-weight:600;
    cursor:pointer;
    transition: opacity .15s ease, transform .1s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--accent); color:#06231d; }
  .btn-primary:hover{ opacity:0.9; }
  .btn-ghost{
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
  }
  .btn-ghost:hover{ color: var(--text); border-color:#3a4150; }

  /* Lightbox */
  #lightbox{
    position:fixed; inset:0;
    background: rgba(6,7,9,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 100;
    padding: 40px 20px;
  }
  #lightbox.show{ display:flex; }
  #lightbox img{
    max-width:100%;
    max-height:85vh;
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  #lightbox .lb-close{
    position:absolute;
    top:18px; right:22px;
    color: var(--text);
    font-size: 1.8rem;
    cursor:pointer;
    background:none;
    border:none;
    line-height:1;
  }
  #lightbox .lb-caption{
    position:absolute;
    bottom: 24px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 0.8rem;
    padding: 30px 16px 16px;
  }
  footer a{ color: var(--accent); text-decoration:none; }
</style>
</head>
<body>

<header>
  <h1>Design <span>Gallery</span></h1>
  <p>Tap a design to view it full size. Check the ones you like and send me the list on WhatsApp.</p>
</header>

<main>
  <div id="status">Loading designs…</div>
  <div class="grid" id="grid" style="display:none;"></div>
</main>

<div id="selectbar">
  <span class="count"><strong id="selCount">0</strong> selected</span>
  <button class="btn btn-ghost" id="clearBtn">Clear</button>
  <button class="btn btn-primary" id="sendBtn">💬 Send selection on WhatsApp</button>
</div>

<div id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-caption" id="lbCaption"></div>
</div>

<footer>
  Built by <a href="https://cggodotassets.shop" target="_blank" rel="noopener">Sanjay Meher</a>
</footer>

<script>
(function(){
  const OWNER = "sanjaymeherdev";
  const REPO = "Godot-Website";
  const BRANCH = "main";
  const FOLDER_PATH = "designs/gallery";
  const WHATSAPP_NUMBER = "917504704502";
  const IMAGE_EXT = /\.(jpe?g|png|gif|webp|avif|svg)$/i;

  const statusEl = document.getElementById('status');
  const gridEl = document.getElementById('grid');
  const selectbar = document.getElementById('selectbar');
  const selCountEl = document.getElementById('selCount');
  const clearBtn = document.getElementById('clearBtn');
  const sendBtn = document.getElementById('sendBtn');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCaption = document.getElementById('lbCaption');
  const lbClose = document.getElementById('lbClose');

  const selected = new Set();

  function rawUrl(filename){
    return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${FOLDER_PATH}/${encodeURIComponent(filename)}`;
  }

  function updateSelectBar(){
    const n = selected.size;
    selCountEl.textContent = n;
    selectbar.classList.toggle('show', n > 0);
  }

  function toggleSelect(num, cardEl){
    if(selected.has(num)){
      selected.delete(num);
      cardEl.classList.remove('selected');
    } else {
      selected.add(num);
      cardEl.classList.add('selected');
    }
    updateSelectBar();
  }

  function openLightbox(url, num){
    lbImg.src = url;
    lbCaption.textContent = `Design #${num}`;
    lightbox.classList.add('show');
  }
  function closeLightbox(){
    lightbox.classList.remove('show');
    lbImg.src = "";
  }
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e)=>{ if(e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeLightbox(); });

  clearBtn.addEventListener('click', ()=>{
    selected.clear();
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.checkbox-wrap input').forEach(cb => cb.checked = false);
    updateSelectBar();
  });

  sendBtn.addEventListener('click', ()=>{
    if(selected.size === 0) return;
    const nums = Array.from(selected).sort((a,b)=>a-b).join(', ');
    const message = `Hi, I'm interested in designs: ${nums}`;
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  });

  async function loadImages(){
    try{
      const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER_PATH}`;
      const res = await fetch(apiUrl, {
        headers: { 'Accept': 'application/vnd.github+json' }
      });

      if(!res.ok){
        if(res.status === 404){
          throw new Error(`Folder not found. Make sure "${FOLDER_PATH}" exists in the repo.`);
        }
        if(res.status === 403){
          throw new Error('GitHub API rate limit reached. Please try again in a bit.');
        }
        throw new Error(`GitHub API error (${res.status})`);
      }

      const data = await res.json();
      const files = data
        .filter(item => item.type === 'file' && IMAGE_EXT.test(item.name))
        .sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true, sensitivity:'base'}));

      if(files.length === 0){
        statusEl.textContent = 'No designs found yet. Check back soon.';
        return;
      }

      statusEl.style.display = 'none';
      gridEl.style.display = 'grid';

      files.forEach((file, idx) => {
        const num = idx + 1;
        const url = rawUrl(file.name);

        const card = document.createElement('div');
        card.className = 'card';

        const thumbWrap = document.createElement('div');
        thumbWrap.className = 'thumb-wrap';
        const img = document.createElement('img');
        img.src = url;
        img.alt = `Design ${num}`;
        img.loading = 'lazy';
        thumbWrap.appendChild(img);

        const badge = document.createElement('div');
        badge.className = 'badge-num';
        badge.textContent = '#' + num;

        const cbWrap = document.createElement('label');
        cbWrap.className = 'checkbox-wrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleSelect(num, card);
        });
        cbWrap.appendChild(cb);

        card.appendChild(thumbWrap);
        card.appendChild(badge);
        card.appendChild(cbWrap);

        card.addEventListener('click', () => openLightbox(url, num));

        gridEl.appendChild(card);
      });

    } catch(err){
      statusEl.textContent = '⚠️ ' + err.message;
      statusEl.classList.add('error');
    }
  }

  loadImages();
})();
</script>

</body>
</html>
