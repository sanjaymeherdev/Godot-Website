<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store — CGGodotAssets | Godot 4 Systems</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            --dark: #0a0a0a;
            --secondary: #111115;
            --primary: #ff6b35;
            --light: #ffffff;
            background: var(--dark);
            color: var(--light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: var(--primary);
        }

        /* Hero */
        .hero {
            text-align: center;
            background: radial-gradient(circle at center, #2d1b69 0%, var(--dark) 70%);
            padding: 60px 0 40px;
        }
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            color: var(--primary);
        }
        .hero p {
            color: #ccc;
        }

        /* Currency Toggle */
        .currency-toggle-section {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 50px;
            display: inline-flex;
            margin-left: auto;
            margin-right: auto;
        }
        .currency-option {
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .currency-option.active {
            background: var(--primary);
            color: white;
        }
        .currency-option:not(.active) {
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }
        .currency-option:not(.active):hover {
            background: rgba(255,255,255,0.2);
        }

        /* Layout */
        .store-body {
            display: flex;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--secondary);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 80px;
        }
        .sidebar input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--light);
            margin-bottom: 1.5rem;
        }
        .sidebar input::placeholder {
            color: #666;
        }
        .filter-group {
            margin-bottom: 1.5rem;
        }
        .filter-label {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .category-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
        }
        .category-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--light);
        }
        .category-btn.active {
            background: rgba(255,107,53,0.15);
            color: var(--primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2d1b69, var(--dark));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 0.25rem 0.7rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .product-content {
            padding: 1.2rem;
        }
        .product-category {
            color: var(--primary);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .product-title {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary);
        }
        .buy-btn {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .buy-btn:hover {
            background: #e55a2b;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--secondary);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-header h2 {
            color: var(--primary);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--light);
            margin: 1rem 0;
        }
        .modal button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Success Popup */
        .success-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .success-popup.active {
            display: flex;
        }
        .success-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .redeem-code {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 4px;
            color: var(--primary);
            background: #0a0a0a;
            padding: 1rem;
            border-radius: 12px;
            margin: 1rem 0;
            font-family: monospace;
        }
        .copy-btn {
            background: rgba(255,107,53,0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.5rem 0;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            border: 4px solid rgba(255,107,53,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            color: #ff6b35;
        }

        @media (max-width: 768px) {
            .store-body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: static;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <a href="/" class="logo">CGGodotAssets</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/store">Store</a>
        </div>
    </div>
</div>

<section class="hero">
    <div class="container">
        <h1>🎮 CGGodotAssets Store</h1>
        <p>Production-tested systems for Godot 4</p>
        
        <div class="currency-toggle-section">
            <div class="currency-option active" data-currency="INR">🇮🇳 INR (Razorpay)</div>
            <div class="currency-option" data-currency="USD">🇺🇸 USD (PayPal)</div>
        </div>
    </div>
</section>

<div class="store-body">
    <aside class="sidebar">
        <input type="text" id="searchInput" placeholder="🔍 Search products...">
        <div class="filter-group">
            <div class="filter-label">Category</div>
            <button class="category-btn active" data-category="all">All Products</button>
            <button class="category-btn" data-category="Outfit">👗 Outfits</button>
            <button class="category-btn" data-category="Guns">🔫 Guns & Weapons</button>
        </div>
    </aside>

    <main class="main-content">
        <div id="productsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading products...</p>
            </div>
        </div>
    </main>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="emailModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Complete Purchase</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <p id="modalProductInfo" style="margin-bottom: 1rem;"></p>
        <input type="email" id="customerEmail" placeholder="Enter your email" required>
        <button id="payBtn" onclick="processPayment()">Pay Now →</button>
    </div>
</div>

<!-- Success Popup -->
<div class="success-popup" id="successPopup">
    <div class="success-content">
        <h2>🎉 Payment Successful!</h2>
        <p>Your redeem code is:</p>
        <div class="redeem-code" id="redeemCodeDisplay"></div>
        <button class="copy-btn" onclick="copyRedeemCode()">📋 Copy Code</button>
        <p style="margin-top: 1rem; font-size: 0.8rem;">A copy has also been sent to your email.</p>
        <button onclick="closeSuccessPopup()" style="margin-top: 1rem; background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">Close</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============================================================
    // CONFIGURATION - UPDATE THESE!
    // ============================================================
    const SUPABASE_URL = 'https://lgfzoprhyjrmosvigwlb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnZnpvcHJoeWpybW9zdmlnd2xiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU3OTAyNzYsImV4cCI6MjA4MTM2NjI3Nn0.VjksnOtIINpR9ugYSXP2cwvoHsm8YLbs7fr5vkV4Uxg';  // ← REPLACE THIS
    
    const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/gamestore-redeem`;
    const INR_TO_USD_RATE = 85;
    
    let supabaseClient;
    let allProducts = [];
    let currentCurrency = 'INR';
    let currentCategory = 'all';
    let currentSearch = '';
    let currentProduct = null;
    let currentPaymentProviderId = null;
    
    // ============================================================
    // INITIALIZE
    // ============================================================
    async function init() {
        // Check if Supabase is configured
        if (SUPABASE_ANON_KEY === 'YOUR_ANON_KEY_HERE') {
            document.getElementById('productsContainer').innerHTML = `
                <div class="error-message">
                    <h3>⚠️ Configuration Required</h3>
                    <p>Please update SUPABASE_ANON_KEY in the JavaScript section.</p>
                    <p style="margin-top: 1rem; font-size: 0.8rem;">Find your anon key in Supabase Dashboard → Project Settings → API</p>
                </div>
            `;
            return;
        }
        
        try {
            // Initialize Supabase client
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Test connection
            const { error: testError } = await supabaseClient.from('products').select('count', { count: 'exact', head: true });
            if (testError) {
                throw new Error(`Supabase connection failed: ${testError.message}`);
            }
            
            await fetchProducts();
            setupEventListeners();
            checkPaymentReturn();
        } catch (err) {
            console.error('Init error:', err);
            document.getElementById('productsContainer').innerHTML = `
                <div class="error-message">
                    <h3>❌ Failed to Load Products</h3>
                    <p>${err.message}</p>
                    <p style="margin-top: 1rem; font-size: 0.8rem;">Check that your products table exists and has data.</p>
                </div>
            `;
        }
    }
    
    async function fetchProducts() {
        try {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('type', { ascending: true })
                .order('itemname', { ascending: true });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                document.getElementById('productsContainer').innerHTML = `
                    <div class="error-message">
                        <h3>📦 No Products Found</h3>
                        <p>Your products table is empty. Add some products first!</p>
                    </div>
                `;
                return;
            }
            
            allProducts = data;
            renderProducts();
        } catch (err) {
            console.error('Fetch error:', err);
            document.getElementById('productsContainer').innerHTML = `
                <div class="error-message">
                    <h3>❌ Error Loading Products</h3>
                    <p>${err.message}</p>
                </div>
            `;
        }
    }
    
    function renderProducts() {
        let filtered = [...allProducts];
        
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.type === currentCategory);
        }
        if (currentSearch) {
            filtered = filtered.filter(p => 
                p.itemname.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const outfits = filtered.filter(p => p.type === 'Outfit');
        const guns = filtered.filter(p => p.type === 'Guns');
        
        let html = '';
        
        if (outfits.length > 0) {
            html += `<h2 style="margin: 1rem 0 1.5rem 0;">👗 Outfits & Characters</h2><div class="products-grid">`;
            outfits.forEach(p => html += renderProductCard(p));
            html += `</div>`;
        }
        
        if (guns.length > 0) {
            html += `<h2 style="margin: 2rem 0 1.5rem 0;">🔫 Guns & Weapons</h2><div class="products-grid">`;
            guns.forEach(p => html += renderProductCard(p));
            html += `</div>`;
        }
        
        if (filtered.length === 0) {
            html = `<div class="loading"><p>No products match your filters</p></div>`;
        }
        
        document.getElementById('productsContainer').innerHTML = html;
    }
    
    function renderProductCard(product) {
        const displayPrice = currentCurrency === 'INR' 
            ? `₹${product.price}`
            : `$${(product.price / INR_TO_USD_RATE).toFixed(2)}`;
        
        const imageUrl = product.texture || 'https://placehold.co/400x300/2d1b69/ff6b35?text=No+Image';
        const badgeColor = product.type === 'Outfit' ? '#7000f3' : '#e55a2b';
        
        return `
            <div class="product-card">
                <div style="position: relative;">
                    <div class="product-image">
                        <img src="${imageUrl}" alt="${escapeHtml(product.itemname)}" onerror="this.src='https://placehold.co/400x300/2d1b69/ff6b35?text=Image+Error'">
                    </div>
                    <span class="badge" style="background: ${badgeColor};">${product.type}</span>
                </div>
                <div class="product-content">
                    <div class="product-category">${escapeHtml(product.category || 'Godot 4')}</div>
                    <h3 class="product-title">${escapeHtml(product.itemname)}</h3>
                    <div class="product-footer">
                        <div class="product-price">${displayPrice}</div>
                        <button class="buy-btn" onclick="openPurchaseModal('${product.uuid}', '${escapeHtml(product.itemname)}', ${product.price})">Buy →</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============================================================
    // PAYMENT FLOW
    // ============================================================
    function openPurchaseModal(productId, productName, priceInr) {
        currentProduct = { id: productId, name: productName, price: priceInr };
        const displayPrice = currentCurrency === 'INR' ? `₹${priceInr}` : `$${(priceInr / INR_TO_USD_RATE).toFixed(2)}`;
        document.getElementById('modalProductInfo').innerHTML = `<strong>${productName}</strong><br>Amount: ${displayPrice} ${currentCurrency}`;
        document.getElementById('customerEmail').value = '';
        document.getElementById('emailModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('emailModal').classList.remove('active');
        currentProduct = null;
    }
    
    async function processPayment() {
        const email = document.getElementById('customerEmail').value;
        if (!email || !email.includes('@')) {
            alert('Please enter a valid email');
            return;
        }
        
        const payBtn = document.getElementById('payBtn');
        payBtn.textContent = 'Creating order...';
        payBtn.disabled = true;
        
        const amount = currentCurrency === 'INR' 
            ? currentProduct.price 
            : (currentProduct.price / INR_TO_USD_RATE).toFixed(2);
        
        const body = {
            action: 'createPayment',
            provider: currentCurrency === 'INR' ? 'razorpay' : 'paypal',
            email: email,
            amount: amount,
            product_id: currentProduct.id,
            product_name: currentProduct.name,
            callback_url: `${window.location.origin}${window.location.pathname}?success=true`,
            cancel_url: `${window.location.origin}${window.location.pathname}?canceled=true`
        };
        
        try {
            const response = await fetch(EDGE_FUNCTION_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            const data = await response.json();
            
            if (data.success && data.payment_url) {
                // Razorpay
                sessionStorage.setItem('pendingPaymentId', data.payment_provider_id);
                window.location.href = data.payment_url;
            } else if (data.success && data.approval_url) {
                // PayPal
                sessionStorage.setItem('pendingPaymentId', data.payment_provider_id);
                window.location.href = data.approval_url;
            } else {
                alert('Payment creation failed: ' + (data.message || 'Unknown error'));
                payBtn.textContent = 'Pay Now →';
                payBtn.disabled = false;
            }
        } catch (err) {
            alert('Network error: ' + err.message);
            payBtn.textContent = 'Pay Now →';
            payBtn.disabled = false;
        }
    }
    
    async function checkPaymentReturn() {
        const urlParams = new URLSearchParams(window.location.search);
        const success = urlParams.get('success');
        const paymentId = sessionStorage.getItem('pendingPaymentId');
        
        if (success && paymentId) {
            document.getElementById('productsContainer').innerHTML = `<div class="loading"><div class="spinner"></div><p>Verifying payment...</p></div>`;
            
            let attempts = 0;
            const maxAttempts = 30;
            
            const pollInterval = setInterval(async () => {
                attempts++;
                
                try {
                    const response = await fetch(EDGE_FUNCTION_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'pollStatus',
                            payment_provider_id: paymentId
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success && data.status === 'completed' && data.redeem_code) {
                        clearInterval(pollInterval);
                        sessionStorage.removeItem('pendingPaymentId');
                        window.history.replaceState({}, document.title, window.location.pathname);
                        showSuccessPopup(data.redeem_code);
                        fetchProducts();
                    } else if (attempts >= maxAttempts) {
                        clearInterval(pollInterval);
                        alert('Payment is being processed. You will receive an email shortly.');
                        sessionStorage.removeItem('pendingPaymentId');
                        window.history.replaceState({}, document.title, window.location.pathname);
                        fetchProducts();
                    }
                } catch (err) {
                    if (attempts >= maxAttempts) {
                        clearInterval(pollInterval);
                        fetchProducts();
                    }
                }
            }, 1000);
        }
    }
    
    function showSuccessPopup(code) {
        document.getElementById('redeemCodeDisplay').textContent = code;
        document.getElementById('successPopup').classList.add('active');
    }
    
    function closeSuccessPopup() {
        document.getElementById('successPopup').classList.remove('active');
    }
    
    function copyRedeemCode() {
        const code = document.getElementById('redeemCodeDisplay').textContent;
        navigator.clipboard.writeText(code);
        alert('Code copied!');
    }
    
    // ============================================================
    // UI EVENT LISTENERS
    // ============================================================
    function setupEventListeners() {
        // Currency toggle
        document.querySelectorAll('.currency-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.currency-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentCurrency = opt.dataset.currency;
                renderProducts();
            });
        });
        
        // Category filter
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderProducts();
            });
        });
        
        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderProducts();
        });
    }
    
    // Start
    init();
</script>
