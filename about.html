<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanjay — The Builder's Workshop</title>

  <!-- Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0b0e14;
      color: #e4e7ed;
      overflow-x: hidden;
    }

    /* ---- Particle Background ---- */
    #particle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #4facfe;
      border-radius: 50%;
      opacity: 0.4;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ---- Hero ---- */
    #hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 0 20px;
    }

    #hero h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    #hero .sub {
      font-size: 1.8rem;
      font-weight: 300;
      color: #aab;
    }

    #typed-text {
      color: #f5576c;
      font-weight: 600;
    }

    .hero-badge {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 1rem;
      color: #8899bb;
      z-index: 3;
    }

    .hero-badge span {
      color: #4facfe;
      font-weight: 600;
    }

    /* ---- Sections ---- */
    section {
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 3rem;
      text-align: center;
      background: linear-gradient(135deg, #e4e7ed, #8899bb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ---- Skill Flip Cards ---- */
    #skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
      padding: 1rem 0;
    }

    .flip-card {
      background: transparent;
      height: 200px;
      perspective: 800px;
      cursor: default;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .flip-card-front {
      background: rgba(79, 172, 254, 0.06);
      border-color: rgba(79, 172, 254, 0.15);
    }

    .flip-card-front .icon {
      font-size: 2.6rem;
      margin-bottom: 0.6rem;
    }

    .flip-card-front .name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e4e7ed;
      line-height: 1.3;
    }

    .flip-card-back {
      transform: rotateY(180deg);
      background: rgba(20, 25, 35, 0.95);
      border-color: rgba(79, 172, 254, 0.25);
      justify-content: center;
      font-size: 0.75rem;
      color: #aab;
      line-height: 1.5;
      padding: 1rem;
    }

    .flip-card-back .tools {
      font-size: 0.65rem;
      color: #4facfe;
      margin-top: 0.5rem;
      background: rgba(79, 172, 254, 0.1);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      display: inline-block;
    }

    /* ---- Product Orbit ---- */
    #orbit-container {
      position: relative;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 3rem 0;
    }

    .orbit-item {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.65rem;
      text-align: center;
      color: #aab;
      transition: all 0.3s ease;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      will-change: transform;
    }

    .orbit-item:hover {
      transform: scale(1.15) !important;
      border-color: #4facfe;
      background: rgba(79, 172, 254, 0.12);
    }

    .orbit-item .icon {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    /* ---- Counters ---- */
    .counter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 2rem;
      text-align: center;
      margin: 3rem 0;
    }

    .counter-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 2rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .counter-box .number {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .counter-box .label {
      color: #8899bb;
      margin-top: 0.5rem;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 2;
    }

    footer p {
      font-size: 1.4rem;
      color: #aab;
    }

    footer p span.highlight {
      color: #4facfe;
      font-weight: 600;
    }

    footer .credit {
      margin-top: 1rem;
      color: #667;
      font-size: 0.9rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      #hero h1 {
        font-size: 2.8rem;
      }
      #hero .sub {
        font-size: 1.2rem;
      }
      .section-title {
        font-size: 2rem;
      }
      .orbit-item {
        width: 70px;
        height: 70px;
        font-size: 0.55rem;
      }
      .orbit-item .icon {
        font-size: 1.4rem;
      }
      .hero-badge {
        font-size: 0.8rem;
        padding: 0.6rem 1.2rem;
      }
      #skill-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }
      .flip-card {
        height: 170px;
      }
      .flip-card-front .icon {
        font-size: 2rem;
      }
      .flip-card-front .name {
        font-size: 0.75rem;
      }
      .flip-card-back {
        font-size: 0.65rem;
      }
    }

    @media (max-width: 480px) {
      #skill-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 0.8rem;
      }
      .flip-card {
        height: 150px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== PARTICLE BACKGROUND ===== -->
  <div id="particle-bg"></div>

  <!-- ===== HERO ===== -->
  <div id="hero">
    <h1 data-aos="fade-up">The Builder's Workshop</h1>
    <div class="sub" data-aos="fade-up" data-aos-delay="200">
      I'm <span id="typed-text"></span>
    </div>
    <div class="hero-badge" data-aos="fade-up" data-aos-delay="400">
      🛠️ <span>18 skills</span> · 8 products · ₹0 until it works
    </div>
  </div>

  <!-- ===== SKILL CARDS (FLIP) ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">⚡ The Toolbelt</h2>
    <div id="skill-grid" data-aos="fade-up" data-aos-delay="100">
      <!-- Cards injected by JS -->
    </div>
  </section>

  <!-- ===== PRODUCT ORBIT ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">🌀 The Products</h2>
    <div id="orbit-container" data-aos="fade-up" data-aos-delay="200">
      <!-- Injected by JS -->
    </div>
  </section>

  <!-- ===== COUNTERS ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">📊 By the Numbers</h2>
    <div class="counter-grid">
      <div class="counter-box" data-aos="fade-up">
        <div class="number" data-target="8">0</div>
        <div class="label">Products Built</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="100">
        <div class="number" data-target="18">0</div>
        <div class="label">Skills Stacked</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="200">
        <div class="number" data-target="0">0</div>
        <div class="label">₹ Paid Upfront</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="300">
        <div class="number" data-target="100">0</div>
        <div class="label">% Trust Built</div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p data-aos="fade-up">
      “Pay <span class="highlight">after</span> it works. No upfront. <span style="color:#f5576c;">Ever.</span>”
    </p>
    <p class="credit" data-aos="fade-up" data-aos-delay="100">
      👨‍💻 Sanjay Meher · Solo Builder · Self-Funded
    </p>
    <div style="margin-top:2rem;">
      <a href="/tools" style="color:#4facfe;text-decoration:none;border:1px solid rgba(79,172,254,0.2);padding:10px 24px;border-radius:40px;display:inline-block;backdrop-filter:blur(8px);font-size:0.9rem;">
        ← See all tools
      </a>
    </div>
  </footer>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js">
  </script>
  <script>
    // ---- AOS ----
    AOS.init({
      duration: 800,
      once: true
    });

    // ---- TYPED.JS ----
    new Typed('#typed-text', {
      strings: [
        'an Automation Engineer.',
        'an AI Integrator.',
        'a System Architect.',
        'a Full-Stack Builder.',
        'a Solo Founder.'
      ],
      typeSpeed: 60,
      backSpeed: 30,
      loop: true,
      cursorChar: '|'
    });

    // ---- PARTICLES ----
    (function createParticles() {
      const container = document.getElementById('particle-bg');
      const count = 60;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        p.style.animationDuration = (12 + Math.random() * 20) + 's';
        p.style.animationDelay = (Math.random() * 20) + 's';
        p.style.opacity = 0.2 + Math.random() * 0.4;
        container.appendChild(p);
      }
    })();

    // ---- SKILL FLIP CARDS ----
    const skills = [{
      name: 'Video Editing',
      icon: '🎬',
      description: 'Edit like a pro. PR, Capcut, Filmora — fast, clean, story-driven.',
      tools: 'PR · Capcut · Filmora'
    }, {
      name: 'Motion Graphics',
      icon: '✨',
      description: 'Bring ideas to life with dynamic motion. After Effects is my playground.',
      tools: 'After Effects'
    }, {
      name: 'Graphic Design',
      icon: '🎨',
      description: 'Visual identity that sticks. Canva, PS, Corel — all in one.',
      tools: 'Canva · PS · CorelDRAW'
    }, {
      name: 'Digital Marketing',
      icon: '📈',
      description: 'Strategy + execution. Content, SEO, social — growth that works.',
      tools: 'SEO · Social · Content'
    }, {
      name: 'Web Design & Dev',
      icon: '🌐',
      description: 'From WordPress to custom code — sites that load fast and look great.',
      tools: 'WP · Shopify · HTML/CSS'
    }, {
      name: '3D Animation',
      icon: '🧊',
      description: 'Blender is my canvas. Models, animations, and product renders.',
      tools: 'Blender'
    }, {
      name: 'Web Apps',
      icon: '⚛️',
      description: 'Full-stack web apps. React, Next.js, Node — built to scale.',
      tools: 'React · Node · Next.js'
    }, {
      name: 'Android Apps',
      icon: '📱',
      description: 'Native Android apps. Kotlin/Java — smooth, fast, reliable.',
      tools: 'Kotlin · Java'
    }, {
      name: 'Windows Apps',
      icon: '🖥️',
      description: 'Desktop apps for Windows. Electron or native — your choice.',
      tools: 'Electron · .NET'
    }, {
      name: 'Chrome Extensions',
      icon: '🧩',
      description: 'Extensions that extend the web. Side panels, overlays, automation.',
      tools: 'JS · Chrome API'
    }, {
      name: 'Godot Engine',
      icon: '🎮',
      description: 'Games, apps, addons — all in Godot. Lightweight, powerful, open.',
      tools: 'GDScript · Godot 4'
    }, {
      name: 'Backend & APIs',
      icon: '🔗',
      description: 'Auth, REST, WebSockets, DB — the engine behind every app.',
      tools: 'Node · SQL · Auth'
    }, {
      name: 'Automation',
      icon: '⚙️',
      description: 'n8n, APIs, workflows — automate everything, own your data.',
      tools: 'n8n · APIs · Webhooks'
    }, {
      name: 'AI Integration',
      icon: '🤖',
      description: 'LLMs, prompts, orchestration — AI that actually works for you.',
      tools: 'Claude · GPT · DeepSeek'
    }, {
      name: 'System Architecture',
      icon: '🏗️',
      description: 'Scalable, self-hosted systems. Designed to last, built to grow.',
      tools: 'Design · Scalability'
    }, {
      name: 'Self-Hosting',
      icon: '🛡️',
      description: 'Own your data. Self-host on Vercel, Neon, your own servers.',
      tools: 'Vercel · Neon · Docker'
    }, {
      name: 'Product Strategy',
      icon: '📦',
      description: 'From idea to product to pricing. I package solutions, not code.',
      tools: 'Strategy · Launch'
    }, {
      name: 'Payment Integration',
      icon: '💳',
      description: 'Razorpay, UPI, subscriptions — payments that actually work.',
      tools: 'Razorpay · UPI'
    }];

    const grid = document.getElementById('skill-grid');
    skills.forEach(skill => {
      const card = document.createElement('div');
      card.className = 'flip-card';
      card.innerHTML = `
          <div class="flip-card-inner">
            <div class="flip-card-front">
              <div class="icon">${skill.icon}</div>
              <div class="name">${skill.name}</div>
            </div>
            <div class="flip-card-back">
              <div style="font-size:0.9rem;font-weight:500;color:#e4e7ed;margin-bottom:0.4rem;">${skill.name}</div>
              <div>${skill.description}</div>
              <div class="tools">🛠️ ${skill.tools}</div>
            </div>
          </div>
        `;
      grid.appendChild(card);
    });

    // ---- PRODUCT ORBIT ----
    const products = [
      { name: 'SiteSheet', icon: '🌐' },
      { name: 'n8n Setup', icon: '⚙️' },
      { name: 'GOwa API', icon: '💬' },
      { name: 'GMB Tracker', icon: '📍' },
      { name: 'SMBooking', icon: '📅' },
      { name: 'YourMate', icon: '🧑‍🏫' },
      { name: 'ContentPlanner', icon: '✍️' },
      { name: 'PocketAI', icon: '🤖' }
    ];

    const orbit = document.getElementById('orbit-container');
    const radius = Math.min(180, window.innerWidth / 3);
    const items = [];

    products.forEach((p, i) => {
      const angle = (i / products.length) * 2 * Math.PI - Math.PI / 2;
      const el = document.createElement('div');
      el.className = 'orbit-item';
      el.innerHTML = `<span class="icon">${p.icon}</span>${p.name}`;
      orbit.appendChild(el);
      items.push({ el, angle });
    });

    let orbitAngle = 0;

    function animateOrbit() {
      orbitAngle += 0.006;
      items.forEach((item, i) => {
        const a = item.angle + orbitAngle;
        const x = radius * Math.cos(a);
        const y = radius * Math.sin(a);
        item.el.style.transform = `translate(${x}px, ${y}px)`;
      });
      requestAnimationFrame(animateOrbit);
    }
    animateOrbit();

    // ---- COUNTER ----
    function animateCounter(el, target, duration = 1500) {
      const start = 0;
      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(eased * target);
        el.textContent = current;

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = target;
        }
      }
      requestAnimationFrame(update);
    }

    const counterElements = document.querySelectorAll('.number');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const target = parseInt(entry.target.getAttribute('data-target'));
          if (target > 0) {
            animateCounter(entry.target, target);
          } else {
            entry.target.textContent = '0';
          }
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.5 });

    counterElements.forEach(el => observer.observe(el));

    // ---- RESIZE HANDLER ----
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        location.reload();
      }, 300);
    });

    console.log('🚀 The Builder\'s Workshop is live.');
  </script>
</body>
</html>
