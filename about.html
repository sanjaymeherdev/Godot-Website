<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanjay — The Builder's Workshop</title>

  <!-- Only 2 lightweight libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0b0e14;
      color: #e4e7ed;
      overflow-x: hidden;
    }

    /* ---- Particle Background (Pure CSS) ---- */
    #particle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #4facfe;
      border-radius: 50%;
      opacity: 0.4;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ---- Hero ---- */
    #hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 0 20px;
    }

    #hero h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    #hero .sub {
      font-size: 1.8rem;
      font-weight: 300;
      color: #aab;
    }

    #typed-text {
      color: #f5576c;
      font-weight: 600;
    }

    .hero-badge {
      margin-top: 2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 1rem;
      color: #8899bb;
      z-index: 3;
    }

    .hero-badge span {
      color: #4facfe;
      font-weight: 600;
    }

    /* ---- Sections ---- */
    section {
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 3rem;
      text-align: center;
      background: linear-gradient(135deg, #e4e7ed, #8899bb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ---- Skill Cloud ---- */
    #skill-cloud {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      padding: 2rem 0;
    }

    .skill-tag {
      background: rgba(79, 172, 254, 0.08);
      border: 1px solid rgba(79, 172, 254, 0.15);
      padding: 0.6rem 1.6rem;
      border-radius: 40px;
      font-size: 1rem;
      color: #c8d0e0;
      transition: all 0.3s ease;
      cursor: default;
      backdrop-filter: blur(4px);
    }

    .skill-tag:hover {
      background: rgba(79, 172, 254, 0.2);
      transform: scale(1.08) translateY(-4px);
      border-color: #4facfe;
      box-shadow: 0 8px 30px rgba(79, 172, 254, 0.15);
    }

    /* ---- Product Orbit ---- */
    #orbit-container {
      position: relative;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 3rem 0;
    }

    .orbit-item {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.65rem;
      text-align: center;
      color: #aab;
      transition: all 0.3s ease;
      padding: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      will-change: transform;
    }

    .orbit-item:hover {
      transform: scale(1.15) !important;
      border-color: #4facfe;
      background: rgba(79, 172, 254, 0.12);
    }

    .orbit-item .icon {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    /* ---- Counters ---- */
    .counter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 2rem;
      text-align: center;
      margin: 3rem 0;
    }

    .counter-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 2rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .counter-box .number {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f093fb, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .counter-box .label {
      color: #8899bb;
      margin-top: 0.5rem;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 2;
    }

    footer p {
      font-size: 1.4rem;
      color: #aab;
    }

    footer p span.highlight {
      color: #4facfe;
      font-weight: 600;
    }

    footer .credit {
      margin-top: 1rem;
      color: #667;
      font-size: 0.9rem;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      #hero h1 { font-size: 2.8rem; }
      #hero .sub { font-size: 1.2rem; }
      .section-title { font-size: 2rem; }
      .orbit-item { width: 70px; height: 70px; font-size: 0.55rem; }
      .orbit-item .icon { font-size: 1.4rem; }
      .hero-badge { font-size: 0.8rem; padding: 0.6rem 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ===== PARTICLE BACKGROUND (Pure CSS) ===== -->
  <div id="particle-bg"></div>

  <!-- ===== HERO ===== -->
  <div id="hero">
    <h1 data-aos="fade-up">The Builder's Workshop</h1>
    <div class="sub" data-aos="fade-up" data-aos-delay="200">
      I'm <span id="typed-text"></span>
    </div>
    <div class="hero-badge" data-aos="fade-up" data-aos-delay="400">
      🛠️ <span>18 skills</span> · 8 products · ₹0 until it works
    </div>
  </div>

  <!-- ===== SKILL CLOUD ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">⚡ The Toolbelt</h2>
    <div id="skill-cloud" data-aos="fade-up" data-aos-delay="100"></div>
  </section>

  <!-- ===== PRODUCT ORBIT ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">🌀 The Products</h2>
    <div id="orbit-container" data-aos="fade-up" data-aos-delay="200"></div>
  </section>

  <!-- ===== COUNTERS ===== -->
  <section>
    <h2 class="section-title" data-aos="fade-up">📊 By the Numbers</h2>
    <div class="counter-grid">
      <div class="counter-box" data-aos="fade-up">
        <div class="number" data-target="8">0</div>
        <div class="label">Products Built</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="100">
        <div class="number" data-target="18">0</div>
        <div class="label">Skills Stacked</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="200">
        <div class="number" data-target="0">0</div>
        <div class="label">₹ Paid Upfront</div>
      </div>
      <div class="counter-box" data-aos="fade-up" data-aos-delay="300">
        <div class="number" data-target="100">0</div>
        <div class="label">% Trust Built</div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p data-aos="fade-up">
      “Pay <span class="highlight">after</span> it works. No upfront. <span style="color:#f5576c;">Ever.</span>”
    </p>
    <p class="credit" data-aos="fade-up" data-aos-delay="100">
      👨‍💻 Sanjay Meher · Solo Builder · Self-Funded
    </p>
  </footer>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    // ---- AOS ----
    AOS.init({ duration: 800, once: true });

    // ---- TYPED.JS ----
    new Typed('#typed-text', {
      strings: [
        'an Automation Engineer.',
        'an AI Integrator.',
        'a System Architect.',
        'a Full-Stack Builder.',
        'a Solo Founder.'
      ],
      typeSpeed: 60,
      backSpeed: 30,
      loop: true,
      cursorChar: '|'
    });

    // ---- PARTICLES (Pure JS) ----
    (function createParticles() {
      const container = document.getElementById('particle-bg');
      const count = 60;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (2 + Math.random() * 4) + 'px';
        p.style.height = p.style.width;
        p.style.animationDuration = (12 + Math.random() * 20) + 's';
        p.style.animationDelay = (Math.random() * 20) + 's';
        p.style.opacity = 0.2 + Math.random() * 0.4;
        container.appendChild(p);
      }
    })();

    // ---- SKILL CLOUD ----
    const skills = [
      'Video Editing (PR, Capcut, Filmora)',
      'Motion Graphics (AE)',
      'Graphic Design (Canva, PS, CDR)',
      'Digital Marketing',
      'Web Design & Dev (WP, Shopify, Code)',
      '3D Animation (Blender)',
      'Web Apps',
      'Android Apps',
      'Windows Apps',
      'Chrome Extensions',
      'Godot (Games, Apps, Addons)',
      'Backend, Auth, API, Database',
      'Automation Engineering',
      'AI Integration',
      'System Architecture',
      'Self-Hosting / Infrastructure',
      'Product Strategy',
      'Payment Integration'
    ];

    const cloud = document.getElementById('skill-cloud');
    skills.forEach(skill => {
      const tag = document.createElement('span');
      tag.className = 'skill-tag';
      tag.textContent = skill;
      cloud.appendChild(tag);
    });

    // ---- PRODUCT ORBIT ----
    const products = [
      { name: 'SiteSheet', icon: '🌐' },
      { name: 'n8n Setup', icon: '⚙️' },
      { name: 'GOwa API', icon: '💬' },
      { name: 'GMB Tracker', icon: '📍' },
      { name: 'SMBooking', icon: '📅' },
      { name: 'YourMate', icon: '🧑‍🏫' },
      { name: 'ContentPlanner', icon: '✍️' },
      { name: 'PocketAI', icon: '🤖' }
    ];

    const orbit = document.getElementById('orbit-container');
    const radius = Math.min(180, window.innerWidth / 3);
    const items = [];

    products.forEach((p, i) => {
      const angle = (i / products.length) * 2 * Math.PI - Math.PI / 2;
      const el = document.createElement('div');
      el.className = 'orbit-item';
      el.innerHTML = `<span class="icon">${p.icon}</span>${p.name}`;
      orbit.appendChild(el);
      items.push({ el, angle });
    });

    // Animate orbit
    let orbitAngle = 0;
    function animateOrbit() {
      orbitAngle += 0.006;
      items.forEach((item, i) => {
        const a = item.angle + orbitAngle;
        const x = radius * Math.cos(a);
        const y = radius * Math.sin(a);
        item.el.style.transform = `translate(${x}px, ${y}px)`;
      });
      requestAnimationFrame(animateOrbit);
    }
    animateOrbit();

    // ---- COUNTER (No jQuery) ----
    function animateCounter(el, target, duration = 1500) {
      const start = 0;
      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(eased * target);
        el.textContent = current;

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = target;
        }
      }
      requestAnimationFrame(update);
    }

    // Trigger counters when they come into view
    const counterElements = document.querySelectorAll('.number');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const target = parseInt(entry.target.getAttribute('data-target'));
          if (target > 0) {
            animateCounter(entry.target, target);
          } else {
            entry.target.textContent = '0';
          }
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.5 });

    counterElements.forEach(el => observer.observe(el));

    // ---- Handle Resize ----
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        location.reload();
      }, 300);
    });

    console.log('🚀 The Builder\'s Workshop is live.');
  </script>
</body>
</html>
