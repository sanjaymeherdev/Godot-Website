<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sanjay Meher — Edits</title>
<meta name="description" content="A working cut of everything I've edited — Shorts, straight from the timeline.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0e14;
    --surface:#141925;
    --surface-2:#1a2030;
    --line:#252c3d;
    --text:#e4e7ed;
    --muted:#7b879c;
    --accent:#4facfe;
    --accent-2:#f5576c;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  .page-head{
    padding:5rem 1.5rem 3rem;
    max-width:1100px;
    margin:0 auto;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:0.72rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--accent);
    display:flex;
    align-items:center;
    gap:0.5rem;
    margin-bottom:1.25rem;
  }
  .eyebrow::before{
    content:'';
    width:6px;height:6px;border-radius:50%;
    background:var(--accent-2);
    box-shadow:0 0 0 3px rgba(245,87,108,0.18);
  }
  h1{
    font-family:var(--display);
    font-weight:800;
    font-size:clamp(2.2rem, 6vw, 3.6rem);
    line-height:1.05;
    letter-spacing:-0.01em;
    max-width:16ch;
  }
  h1 .accent{color:var(--accent);}
  .page-sub{
    margin-top:1.1rem;
    color:var(--muted);
    font-size:1.02rem;
    max-width:46ch;
    line-height:1.6;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:0.4rem;
    margin-top:1.75rem;
    font-size:0.85rem;
    color:var(--muted);
    border:1px solid var(--line);
    padding:0.5rem 0.9rem;
    border-radius:100px;
    transition:border-color .2s, color .2s;
  }
  .back-link:hover{border-color:var(--accent);color:var(--text);}

  .grid-wrap{
    max-width:1100px;
    margin:0 auto;
    padding:2.75rem 1.5rem 6rem;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:1.1rem;
  }
  .clip{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
    transition:transform .2s ease, border-color .2s ease;
  }
  .clip:hover{transform:translateY(-3px);border-color:#3a4258;}
  .clip:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .clip-thumb{
    aspect-ratio:9/16;
    background:
      radial-gradient(circle at 30% 20%, rgba(79,172,254,0.16), transparent 55%),
      linear-gradient(160deg, var(--surface-2), #0e1320 75%);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .clip-thumb img{
    width:100%;height:100%;object-fit:cover;
    position:absolute; inset:0;
  }
  .play-glyph{
    width:46px;height:46px;
    border-radius:50%;
    background:rgba(11,14,20,0.55);
    border:1px solid rgba(255,255,255,0.18);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    z-index:2;
    transition:transform .2s ease, background .2s ease;
  }
  .clip:hover .play-glyph{transform:scale(1.08);background:rgba(79,172,254,0.35);}
  .play-glyph svg{width:16px;height:16px;fill:var(--text);margin-left:2px;}

  .fmt-tag{
    position:absolute;
    top:0.65rem; left:0.65rem;
    z-index:3;
    font-family:var(--mono);
    font-size:0.62rem;
    letter-spacing:0.08em;
    padding:0.28rem 0.5rem;
    border-radius:5px;
    text-transform:uppercase;
    background:rgba(255,76,76,0.2);
    color:#ff8a8a;
    border:1px solid rgba(255,76,76,0.35);
    backdrop-filter:blur(4px);
  }

  .clip-meta{
    padding:0.85rem 0.95rem 1rem;
  }
  .clip-title{
    font-size:0.9rem;
    font-weight:600;
    line-height:1.3;
    margin-bottom:0.3rem;
  }
  .clip-tags{
    display:flex;
    gap:0.4rem;
    flex-wrap:wrap;
    margin-top:0.5rem;
  }
  .clip-tag{
    font-family:var(--mono);
    font-size:0.62rem;
    color:var(--muted);
    border:1px solid var(--line);
    padding:0.18rem 0.45rem;
    border-radius:4px;
  }

  .state-msg{
    grid-column:1/-1;
    text-align:center;
    padding:4rem 1rem;
    color:var(--muted);
    font-family:var(--mono);
    font-size:0.85rem;
    line-height:1.8;
  }
  .state-msg code{
    color:var(--accent);
    background:var(--surface);
    padding:0.15rem 0.4rem;
    border-radius:4px;
  }

  .lightbox{
    position:fixed; inset:0;
    background:rgba(6,8,12,0.92);
    backdrop-filter:blur(10px);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:2rem 1rem;
  }
  .lightbox.open{display:flex;}
  .lightbox-inner{
    width:100%;
    max-width:420px;
    max-height:90vh;
  }
  .lightbox-frame{
    width:100%;
    aspect-ratio:9/16;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .lightbox-frame iframe{
    width:100%;height:100%;border:0;display:block;
  }
  .lightbox-cap{
    margin-top:1rem;
    text-align:center;
  }
  .lightbox-cap .title{font-weight:600;font-size:0.95rem;}
  .lightbox-cap .sub{color:var(--muted);font-size:0.8rem;margin-top:0.25rem;font-family:var(--mono);}
  .lightbox-close{
    position:absolute;
    top:1.25rem; right:1.25rem;
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text);
    font-size:1.1rem;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    z-index:101;
  }
  .lightbox-open-original{
    display:inline-block;
    margin-top:0.85rem;
    font-family:var(--mono);
    font-size:0.72rem;
    color:var(--accent);
    border-bottom:1px solid transparent;
  }
  .lightbox-open-original:hover{border-color:var(--accent);}

  @media (prefers-reduced-motion: reduce){
    .clip, .play-glyph{transition:none;}
  }

  @media (max-width:560px){
    .page-head{padding:3.5rem 1.25rem 2.25rem;}
    .grid{grid-template-columns:repeat(auto-fill, minmax(150px,1fr));gap:0.75rem;}
  }
</style>
</head>
<body>

  <header class="page-head">
    <div class="eyebrow">Portfolio · Live Cuts</div>
    <h1>Not theory.<br><span class="accent">Real edits, real footage.</span></h1>
    <p class="page-sub">Every cut below is a real YouTube Short, pulled straight from the channel. Click to play.</p>
    <a href="index.html" class="back-link">← Back home</a>
  </header>

  <main class="grid-wrap">
    <div class="grid" id="grid">
      <div class="state-msg">Loading clips…</div>
    </div>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">✕</button>
    <div class="lightbox-inner">
      <div class="lightbox-frame" id="lightboxFrame"></div>
      <div class="lightbox-cap">
        <div class="title" id="lightboxTitle"></div>
        <div class="sub" id="lightboxSub"></div>
        <a class="lightbox-open-original" id="lightboxOriginal" href="#" target="_blank" rel="noopener">Open on YouTube ↗</a>
      </div>
    </div>
  </div>

<script>
/* =========================================================
   Clip data is fetched live from clips.json in this GitHub repo:
   sanjaymeherdev/Godot-Website  →  /sanjaymeher/clips.json

   To add or change clips: edit clips.json directly on GitHub.
   No need to touch this file again.

   clips.json format:
   [
     { "title": "Brand campaign — pacing & colour grade", "url": "https://www.youtube.com/shorts/XXXXXXXXXXX" },
     { "title": "CapCut transitions demo", "id": "XXXXXXXXXXX" }
   ]
   You can use either "url" (full YouTube link) or "id" (just the video ID).
   ========================================================= */
const CLIPS_JSON_URL = "https://raw.githubusercontent.com/sanjaymeherdev/Godot-Website/main/clips.json";

const grid = document.getElementById('grid');
const lightbox = document.getElementById('lightbox');
const lightboxFrame = document.getElementById('lightboxFrame');
const lightboxTitle = document.getElementById('lightboxTitle');
const lightboxSub = document.getElementById('lightboxSub');
const lightboxOriginal = document.getElementById('lightboxOriginal');
const lightboxClose = document.getElementById('lightboxClose');

function youTubeIdFromUrl(url){
  const m = url.match(/(?:shorts\/|v=|youtu\.be\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : null;
}

function playIcon(){
  return `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
}

function normalizeClip(raw){
  const id = raw.id || (raw.url ? youTubeIdFromUrl(raw.url) : null);
  if(!id) return null;
  return {
    id,
    title: raw.title || "Untitled clip",
    url: raw.url || `https://www.youtube.com/shorts/${id}`
  };
}

function renderGrid(clips){
  if(!clips.length){
    grid.innerHTML = `<div class="state-msg">No clips yet. Add some to <code>clips.json</code> in the repo.</div>`;
    return;
  }
  grid.innerHTML = clips.map((clip, i) => `
    <div class="clip" tabindex="0" role="button" data-index="${i}" aria-label="Play ${clip.title}">
      <div class="clip-thumb">
        <span class="fmt-tag">Short</span>
        <img src="https://i.ytimg.com/vi/${clip.id}/hqdefault.jpg" alt="" loading="lazy">
        <div class="play-glyph">${playIcon()}</div>
      </div>
      <div class="clip-meta">
        <div class="clip-title">${clip.title}</div>
        <div class="clip-tags"><span class="clip-tag">YT Short</span></div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.clip').forEach(el => {
    el.addEventListener('click', () => openLightbox(clips[+el.dataset.index]));
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        openLightbox(clips[+el.dataset.index]);
      }
    });
  });
}

function openLightbox(clip){
  lightboxTitle.textContent = clip.title;
  lightboxSub.textContent = 'tap outside or ✕ to close';
  lightboxOriginal.href = clip.url;
  lightboxFrame.innerHTML = `<iframe src="https://www.youtube.com/embed/${clip.id}?autoplay=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  lightbox.classList.remove('open');
  lightboxFrame.innerHTML = '';
  document.body.style.overflow = '';
}

lightboxClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if(e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });

fetch(CLIPS_JSON_URL, { cache: "no-store" })
  .then(res => {
    if(!res.ok) throw new Error('clips.json not found (' + res.status + ')');
    return res.json();
  })
  .then(data => {
    const clips = (Array.isArray(data) ? data : []).map(normalizeClip).filter(Boolean);
    renderGrid(clips);
  })
  .catch(err => {
    grid.innerHTML = `<div class="state-msg">Couldn't load clips.json yet.<br>Add the file at <code>sanjaymeher/clips.json</code> in the repo.<br><br>${err.message}</div>`;
  });
</script>
</body>
</html>
