<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Blast — AutoSend</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Syne',sans-serif;background:#080c10;color:#d0dde8;}
  .auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:1000;}
  .auth-popup{background:#0e1318;border:1px solid #1e2a35;padding:32px;border-radius:20px;width:360px;}
  .auth-popup h2{font-size:24px;margin-bottom:8px;color:#fff;}
  .auth-popup input{width:100%;padding:12px;margin-bottom:12px;background:#080c10;border:1px solid #1e2a35;border-radius:10px;color:#fff;}
  .primary-btn{width:100%;padding:12px;background:#00e5a0;color:#000;border:none;border-radius:10px;font-weight:800;cursor:pointer;}
  .dashboard-wrap{display:none;width:100%;}
  .sidebar{width:240px;background:#0e1318;border-right:1px solid #1e2a35;min-height:100vh;position:fixed;}
  .main{margin-left:240px;padding:20px;}
  .card{background:#131920;border:1px solid #1e2a35;border-radius:16px;padding:20px;margin-bottom:20px;}
  .btn{display:inline-block;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;}
  .btn-primary{background:#00e5a0;color:#000;}
  .btn-secondary{background:transparent;border:1px solid #243040;color:#d0dde8;}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;padding:32px;background:#080c10;border:2px dashed #1e2a35;border-radius:16px;}
  .qr-wrap img{width:200px;border-radius:12px;border:3px solid #00e5a0;}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;}
  .connected{background:#00e5a0;box-shadow:0 0 6px #00e5a0;}
  .disconnected{background:#ff5f7e;}
  .scanning{background:#ffd166;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .nav-item{padding:10px 16px;cursor:pointer;border-radius:10px;margin:4px 0;}
  .nav-item.active{background:rgba(0,229,160,.1);color:#00e5a0;}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:10px;text-align:left;border-bottom:1px solid #1e2a35;}
  .badge{padding:4px 10px;border-radius:20px;font-size:11px;}
  .badge-pending{background:rgba(255,209,102,.15);color:#ffd166;}
  .badge-sent{background:rgba(0,229,160,.15);color:#00e5a0;}
  .progress-bar{height:6px;background:#00e5a0;width:0%;border-radius:10px;}
  .device-name-input {
  width: 100%;
  padding: 12px 16px;
  background: #080c10;
  border: 1px solid #1e2a35;
  border-radius: 10px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.device-name-input:focus {
  outline: none;
  border-color: #00e5a0;
}

.device-name-input::placeholder {
  color: #4a6070;
}

.device-name-label {
  display: block;
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  color: #7a95a8;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.input-group {
  margin-bottom: 20px;
}
  .toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;background:#0e2d1e;color:#00e5a0;z-index:2000;display:none;}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-popup">
    <h2>WA Blast</h2>
    <div style="margin-bottom:20px;color:#7a95a8;">WhatsApp automation</div>
    <input type="text" id="loginEmail" placeholder="Email" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="primary-btn" onclick="doLogin()">Login</button>
    <div style="margin-top:16px;text-align:center;">
      <span style="color:#7a95a8;cursor:pointer;" onclick="showRegister()">Create account</span>
    </div>
  </div>
</div>

<div class="dashboard-wrap" id="dashboardWrap">
  <div class="sidebar">
    <div style="padding:24px;"><h2 style="color:#fff;">Auto<span style="color:#00e5a0;">Send</span></h2></div>
    <div style="padding:0 12px;">
      <div class="nav-item active" data-tab="device">📱 Device</div>
      <div class="nav-item" data-tab="contacts">👥 Contacts</div>
      <div class="nav-item" data-tab="compose">✍️ Compose</div>
      <div class="nav-item" data-tab="send">🚀 Send</div>
      <div class="nav-item" data-tab="settings">⚙️ Settings</div>
    </div>
    <div style="position:absolute;bottom:20px;left:20px;right:20px;">
      <button class="btn btn-secondary" style="width:100%;" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div><span class="status-dot disconnected" id="statusDot"></span><span id="statusText">OFFLINE</span></div>
      <div><span id="userEmail" style="color:#7a95a8;"></span></div>
    </div>

    <!-- Device Tab -->
    <div class="tab-panel active" id="tab-device">
      <div class="card">
        <h3>Link Your Device</h3>
        <div class="qr-wrap" id="qrWrap">
          <div style="font-size:48px;">📱</div>
          <div>Click "Load QR" to start</div>
        </div>
        <div class="input-group">
  <label class="device-name-label">🔐 DEVICE NAME</label>
  <input type="text" id="deviceNameInput" class="device-name-input" placeholder="e.g., my_whatsapp_device_1" autocomplete="off">
</div>

<div style="margin-top:16px;text-align:center;">
  <button class="btn btn-primary" onclick="CreateDevice()">➕ Connect Device</button>
  <button class="btn btn-primary" onclick="loadQR()">📱 Load QR Code</button>
  <button class="btn btn-danger" onclick="disconnectDevice()" id="disconnectBtn" style="display:none;margin-left:10px;">🔌 Unlink Device</button>
</div>
        <div id="qrTimer" style="text-align:center;margin-top:10px;font-size:12px;"></div>
      </div>
    </div>

    <!-- Contacts Tab -->
    <div class="tab-panel" id="tab-contacts">
      <div class="card">
        <h3>Contacts</h3>
        <textarea id="pasteInput" rows="3" placeholder="Name, Phone, Message (one per row)"></textarea>
        <button class="btn btn-secondary" onclick="parsePaste()">Parse & Add</button>
        <button class="btn btn-secondary" onclick="saveContacts()">Save to Sheet</button>
        <button class="btn btn-secondary" onclick="clearContacts()">Clear All</button>
        <div style="margin-top:16px;overflow-x:auto;">
          <table>
            <thead><tr><th>Name</th><th>Phone</th><th>Status</th><th></th></tr></thead>
            <tbody id="contactsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Compose Tab -->
    <div class="tab-panel" id="tab-compose">
      <div class="card">
        <h3>Message Template</h3>
        <textarea id="msgTemplate" rows="4" placeholder="Hi {name}, special offer!"></textarea>
        <button class="btn btn-primary" onclick="saveTemplate()">Save Template</button>
        <button class="btn btn-secondary" onclick="generateVariations()">✨ AI Generate Variations</button>
        <div id="variationsPanel" style="margin-top:12px;display:none;"></div>
      </div>
    </div>

    <!-- Send Tab -->
    <div class="tab-panel" id="tab-send">
      <div class="card">
        <h3>Send Campaign</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
          <div>Sent: <strong id="sentCount">0</strong></div>
          <div>Pending: <strong id="pendingCount">0</strong></div>
          <div>Failed: <strong id="failedCount">0</strong></div>
        </div>
        <div class="progress-bar" id="progressBar" style="width:0%;margin:10px 0;"></div>
        <div id="currentStatus" style="margin:10px 0;">Ready to send</div>
        <div>
          <button class="btn btn-primary" onclick="startSend()">▶ Start</button>
          <button class="btn btn-secondary" onclick="pauseSend()">⏸ Pause</button>
          <button class="btn btn-secondary" onclick="stopSend()">⏹ Stop</button>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-panel" id="tab-settings">
      <div class="card">
        <h3>Settings</h3>
        <label>Hour Limit</label><input type="number" id="hourLimit" value="30">
        <label>Day Limit</label><input type="number" id="dayLimit" value="200">
        <label>Min Gap (seconds)</label><input type="number" id="minGap" value="30">
        <label>Max Gap (seconds)</label><input type="number" id="maxGap" value="90">
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== CONFIG ====================
const EDGE_FN_URL = "https://lgfzoprhyjrmosvigwlb.supabase.co/functions/v1/leadflow";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgVCGqSABYj7CNWHp-PCuwv-VP_jAvFU-biD8qVBfPRPQ7ydZejz-sEFHX9z9T2VQmzw/exec";

let authToken = null;
let deviceId = null;
let contacts = [];
let sendState = 'idle', sendIndex = 0, sendTimer = null;
let todaySent = 0, hourSent = 0;
let variations = [], useVariations = false, variationIndex = 0;
let pollTimer = null, qrTimer = null;

// Create device with custom name
async function CreateDevice() {
  const deviceName = document.getElementById('deviceNameInput').value.trim()
  
  if (!deviceName) {
    showToast('Please enter a device name', true)
    return
  }

  // Validate device name (letters, numbers, underscore, hyphen only)
  const nameRegex = /^[a-zA-Z0-9_-]+$/
  if (!nameRegex.test(deviceName)) {
    showToast('Device name can only contain letters, numbers, underscore and hyphen', true)
    return
  }

  showToast('Creating device...', false)
  
  try {
    const result = await callEdgeFunction('createDevice', { device_name: deviceName })
    
    if (result.success) {
      deviceId = result.device_id
      showToast(`Device "${deviceName}" created successfully`, false)
      
      // Save to Apps Script as well
      const email = localStorage.getItem('user_email')
      if (email) {
        apiGet('linkDevice', { username: email, deviceId: deviceId, deviceName: deviceName }, () => {})
      }
      
      // Update UI
      document.getElementById('disconnectBtn').style.display = 'inline-block'
      document.getElementById('deviceDebug').innerHTML = `<span style="color:#00e5a0;">✅ Device created: ${deviceName} (${deviceId.substring(0, 16)}...)</span>`
      
      // Optionally auto-load QR after device creation
      setTimeout(() => loadQR(), 500)
    } else if (result.already_exists) {
      showToast('Device already exists. Use Unlink first or refresh.', true)
      deviceId = result.device_id
      document.getElementById('disconnectBtn').style.display = 'inline-block'
    } else {
      showToast(result.message || 'Device creation failed', true)
    }
  } catch (err) {
    showToast('Error creating device: ' + err.message, true)
  }
}

// Modified loadQR to use existing deviceId
async function loadQR() {
  const wrap = document.getElementById('qrWrap')
  const debugDiv = document.getElementById('deviceDebug')
  
  if (!deviceId) {
    showToast('Please create a device first using "Connect Device"', true)
    return
  }
  
  wrap.innerHTML = '<div style="font-size:32px;">⏳</div><div>Loading QR code...</div>'
  updateDeviceStatus('scanning')
  
  try {
    const result = await callEdgeFunction('getQR')
    
    if (result.success && result.qr_image_url) {
      wrap.innerHTML = ''
      const img = document.createElement('img')
      img.src = result.qr_image_url
      img.onload = () => {
        wrap.appendChild(img)
        wrap.innerHTML += '<div style="margin-top:12px;">📱 Scan with WhatsApp → Linked Devices</div>'
        startQRCountdown(result.qr_duration || 60)
        startDevicePolling()
      }
      img.onerror = () => {
        wrap.innerHTML = '<div style="font-size:32px;">❌</div><div>QR image failed to load</div>'
      }
    } else {
      wrap.innerHTML = '<div style="font-size:32px;">❌</div><div>' + (result.message || 'Failed to get QR') + '</div>'
    }
  } catch (err) {
    wrap.innerHTML = '<div style="font-size:32px;">❌</div><div>Connection error</div>'
    showToast('Failed to load QR', true)
  }
}

// Modified disconnectDevice to clear deviceId and allow new creation
async function disconnectDevice() {
  if (!confirm('Unlink this device? You will need to create a new device to reconnect.')) return
  
  showToast('Unlinking device...', false)
  
  // Try to logout from GoWA
  if (deviceId) {
    try {
      await fetch(`https://sanjaywa8-5.onrender.com/devices/${deviceId}`, { method: 'DELETE' })
    } catch(e) { console.log('Delete error:', e) }
  }
  
  const result = await callEdgeFunction('unlinkDevice')
  
  if (result.success) {
    deviceId = null
    updateDeviceStatus('disconnected')
    document.getElementById('qrWrap').innerHTML = '<div style="font-size:48px;">📱</div><div>Enter device name and click "Connect Device"</div>'
    document.getElementById('qrTimer').textContent = ''
    document.getElementById('deviceDebug').innerHTML = ''
    document.getElementById('disconnectBtn').style.display = 'none'
    document.getElementById('deviceNameInput').value = ''
    showToast('Device unlinked. You can now create a new device.')
  } else {
    showToast('Failed to unlink', true)
  }
}

// ==================== HELPERS ====================
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#2d1a1a' : '#0e2d1e';
  t.style.color = isError ? '#ff6b6b' : '#00e5a0';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ==================== EDGE FUNCTION CALL (WITH AUTH) ====================
async function callEdgeFunction(action, body = {}) {
  const headers = {
    'Content-Type': 'application/json',
  };
  if (authToken) {
    headers['Authorization'] = `Bearer ${authToken}`;
  }
  
  const response = await fetch(EDGE_FN_URL, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify({ action, ...body })
  });
  
  if (response.status === 401) {
    showToast('Session expired. Please login again.', true);
    logout();
    throw new Error('Unauthorized');
  }
  
  const data = await response.json();
  return data;
}

// ==================== APPS SCRIPT JSONP ====================
function jsonpRequest(params, cb) {
  const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  const timeout = setTimeout(() => {
    if (window[cbName]) { window[cbName] = null; cb({ success: false, message: 'Timeout' }); }
  }, 15000);
  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    cb(data);
  };
  const qs = new URLSearchParams({ ...params, callback: cbName }).toString();
  const script = document.createElement('script');
  script.src = APPS_SCRIPT_URL + '?' + qs;
  document.body.appendChild(script);
  setTimeout(() => script.remove(), 1000);
}

function apiGet(action, data, cb) { jsonpRequest({ action, ...data }, cb); }

// ==================== AUTH ====================
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !password) {
    showToast('Email and password required', true);
    return;
  }
  
  showToast('Logging in...', false);
  
  try {
    const result = await callEdgeFunction('login', { email, password });
    
    if (result.success && result.token) {
      authToken = result.token;
      localStorage.setItem('auth_token', authToken);
      localStorage.setItem('user_email', email);
      
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('dashboardWrap').style.display = 'block';
      document.getElementById('userEmail').textContent = email;
      
      // Load user data from Apps Script
      apiGet('loadClientData', { username: email }, (data) => {
        if (data.success) {
          contacts = data.contacts || [];
          renderContacts();
          if (data.settings) {
            document.getElementById('hourLimit').value = data.settings.hourLimit || 30;
            document.getElementById('dayLimit').value = data.settings.dayLimit || 200;
          }
          if (data.template?.body) document.getElementById('msgTemplate').value = data.template.body;
          if (data.deviceId) {
            deviceId = data.deviceId;
            updateDeviceStatus('connected');
          }
        }
      });
    } else {
      showToast(result.message || 'Login failed', true);
    }
  } catch (err) {
    showToast('Login error: ' + err.message, true);
  }
}

function showRegister() {
  const overlay = document.getElementById('authOverlay');
  overlay.innerHTML = `
    <div class="auth-popup">
      <h2>Create Account</h2>
      <input type="text" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password">
      <input type="text" id="regName" placeholder="Full Name">
      <button class="primary-btn" onclick="doRegister()">Register</button>
      <div style="margin-top:12px;text-align:center;">
        <span style="color:#7a95a8;cursor:pointer;" onclick="resetAuth()">Back to Login</span>
      </div>
    </div>
  `;
}

function resetAuth() { location.reload(); }

async function doRegister() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const full_name = document.getElementById('regName').value;
  
  try {
    const result = await callEdgeFunction('register', { email, password, full_name });
    if (result.success) {
      showToast('Account created! Please login.', false);
      resetAuth();
    } else {
      showToast(result.message, true);
    }
  } catch (err) {
    showToast('Registration error', true);
  }
}

function logout() {
  authToken = null;
  localStorage.removeItem('auth_token');
  localStorage.removeItem('user_email');
  location.reload();
}

// ==================== DEVICE MANAGEMENT ====================

function startDevicePolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const result = await callEdgeFunction('checkDeviceStatus');
      if (result.success && result.is_connected) {
        clearInterval(pollTimer);
        pollTimer = null;
        if (qrTimer) clearInterval(qrTimer);
        updateDeviceStatus('connected');
        document.getElementById('qrWrap').innerHTML = '<div style="font-size:48px;">✅</div><div>Device Connected!</div>';
        showToast('WhatsApp connected!');
      }
    } catch (err) {
      console.log('Polling error:', err);
    }
  }, 3000);
}

function startQRCountdown(seconds) {
  if (qrTimer) clearInterval(qrTimer);
  let s = seconds;
  qrTimer = setInterval(() => {
    s--;
    if (s <= 0) {
      clearInterval(qrTimer);
      document.getElementById('qrTimer').textContent = 'QR expired - refresh';
    } else {
      document.getElementById('qrTimer').textContent = `QR expires in ${s}s`;
    }
  }, 1000);
}


function updateDeviceStatus(status) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (status === 'connected') {
    dot.className = 'status-dot connected';
    text.textContent = 'CONNECTED';
  } else if (status === 'scanning') {
    dot.className = 'status-dot scanning';
    text.textContent = 'SCANNING';
  } else {
    dot.className = 'status-dot disconnected';
    text.textContent = 'OFFLINE';
  }
}

// ==================== CONTACTS ====================
function renderContacts() {
  const tbody = document.getElementById('contactsBody');
  if (!contacts.length) {
    tbody.innerHTML = '<tr><td colspan="4">No contacts</td></tr>';
    document.getElementById('pendingCount').textContent = '0';
    return;
  }
  tbody.innerHTML = contacts.map((c, i) => `
    <tr>
      <td>${escapeHtml(c.name)}</td>
      <td>${c.phone}</td>
      <td><span class="badge badge-${c.status || 'pending'}">${c.status || 'pending'}</span></td>
      <td><button onclick="removeContact(${i})" style="background:none;border:none;color:#ff5f7e;cursor:pointer;">✖</button></td>
    </tr>
  `).join('');
  document.getElementById('sentCount').textContent = contacts.filter(c => c.status === 'sent').length;
  document.getElementById('pendingCount').textContent = contacts.filter(c => c.status === 'pending').length;
  document.getElementById('failedCount').textContent = contacts.filter(c => c.status === 'failed').length;
}

function removeContact(i) { contacts.splice(i, 1); renderContacts(); }

function parsePaste() {
  const raw = document.getElementById('pasteInput').value;
  const lines = raw.split(/\r?\n/);
  let added = 0;
  for (let line of lines) {
    const parts = line.split(/[\t,]/);
    if (parts.length >= 2) {
      let phone = parts[1].replace(/\D/g, '');
      if (phone.length === 10) phone = '91' + phone;
      if (phone.length >= 10) {
        contacts.push({ name: parts[0] || phone, phone: phone, message: parts[2] || '', status: 'pending' });
        added++;
      }
    }
  }
  renderContacts();
  showToast(`Added ${added} contacts`);
  document.getElementById('pasteInput').value = '';
}

function saveContacts() {
  const email = localStorage.getItem('user_email');
  if (!email) return;
  apiGet('saveContactsChunk', { username: email, chunkIndex: 0, totalChunks: 1, chunk: JSON.stringify(contacts) }, () => showToast('Contacts saved'));
}

function clearContacts() { contacts = []; renderContacts(); }

// ==================== SEND ====================
async function startSend() {
  if (!deviceId) { showToast('Link device first', true); switchTab('device'); return; }
  if (!contacts.length) { showToast('No contacts', true); return; }
  sendState = 'running';
  processSend();
}
function pauseSend() { sendState = 'paused'; if (sendTimer) clearTimeout(sendTimer); showToast('Paused'); }
function stopSend() { sendState = 'idle'; sendIndex = 0; if (sendTimer) clearTimeout(sendTimer); updateProgress(); }
async function processSend() {
  if (sendState !== 'running') return;
  if (sendIndex >= contacts.length) { stopSend(); showToast('Campaign complete'); return; }
  
  const c = contacts[sendIndex];
  let msg = (c.message || document.getElementById('msgTemplate').value).replace(/\{name\}/g, c.name);
  if (useVariations && variations.length) {
    msg = variations[variationIndex % variations.length].replace(/\{name\}/g, c.name);
    variationIndex++;
  }
  
  document.getElementById('currentStatus').textContent = `Sending to ${c.name}...`;
  
  try {
    const result = await callEdgeFunction('sendMessage', { phone: c.phone, message: msg });
    c.status = result.success ? 'sent' : 'failed';
  } catch (err) {
    c.status = 'failed';
  }
  
  sendIndex++;
  renderContacts();
  updateProgress();
  
  const minGap = parseInt(document.getElementById('minGap').value) * 1000;
  const maxGap = parseInt(document.getElementById('maxGap').value) * 1000;
  const gap = Math.random() * (maxGap - minGap) + minGap;
  sendTimer = setTimeout(processSend, gap);
}

function updateProgress() {
  const pct = contacts.length ? (sendIndex / contacts.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('currentStatus').textContent = `${sendIndex}/${contacts.length} processed`;
}

// ==================== TEMPLATE & VARIATIONS ====================
function saveTemplate() {
  const email = localStorage.getItem('user_email');
  if (!email) return;
  apiGet('saveTemplate', { username: email, body: document.getElementById('msgTemplate').value }, () => showToast('Template saved'));
}

async function generateVariations() {
  const msg = document.getElementById('msgTemplate').value;
  if (!msg) { showToast('Write a message first', true); return; }
  showToast('Generating variations...', false);
  
  const result = await callEdgeFunction('aiGenerateVariations', { message: msg, count: 5 });
  if (result.success && result.variations) {
    variations = result.variations;
    useVariations = true;
    variationIndex = 0;
    document.getElementById('variationsPanel').innerHTML = `<div class="card">✅ ${variations.length} variations ready<br><button class="btn btn-secondary" onclick="useVariations=false;document.getElementById('variationsPanel').style.display='none';">Disable</button></div>`;
    document.getElementById('variationsPanel').style.display = 'block';
    showToast('Variations ready!');
  } else {
    showToast('AI failed: ' + (result.message || 'Unknown'), true);
  }
}

function saveSettings() {
  const email = localStorage.getItem('user_email');
  if (!email) return;
  apiGet('saveSettings', {
    username: email,
    hourLimit: document.getElementById('hourLimit').value,
    dayLimit: document.getElementById('dayLimit').value,
    minGap: document.getElementById('minGap').value,
    maxGap: document.getElementById('maxGap').value
  }, () => showToast('Settings saved'));
}

// ==================== UI ====================
function switchTab(tabName) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tabName}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
}

document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => switchTab(n.getAttribute('data-tab')));
});

function escapeHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// ==================== INIT ====================
const savedToken = localStorage.getItem('auth_token');
const savedEmail = localStorage.getItem('user_email');
if (savedToken && savedEmail) {
  authToken = savedToken;
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('dashboardWrap').style.display = 'block';
  document.getElementById('userEmail').textContent = savedEmail;
  apiGet('loadClientData', { username: savedEmail }, (data) => {
    if (data.success) {
      contacts = data.contacts || [];
      renderContacts();
      if (data.settings) {
        document.getElementById('hourLimit').value = data.settings.hourLimit || 30;
        document.getElementById('dayLimit').value = data.settings.dayLimit || 200;
      }
      if (data.template?.body) document.getElementById('msgTemplate').value = data.template.body;
      if (data.deviceId) {
        deviceId = data.deviceId;
        updateDeviceStatus('connected');
      }
    }
  });
} else {
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('dashboardWrap').style.display = 'none';
}

window.doLogin = doLogin;
window.doRegister = doRegister;
window.logout = logout;
window.loadQR = loadQR;
window.disconnectDevice = disconnectDevice;
window.parsePaste = parsePaste;
window.saveContacts = saveContacts;
window.clearContacts = clearContacts;
window.removeContact = removeContact;
window.startSend = startSend;
window.pauseSend = pauseSend;
window.stopSend = stopSend;
window.saveTemplate = saveTemplate;
window.generateVariations = generateVariations;
window.saveSettings = saveSettings;
window.showRegister = showRegister;
window.resetAuth = resetAuth;
</script>
