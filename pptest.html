<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal Test — $1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0f;
      color: #f0ede8;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #16161a;
      border: 1px solid #2a2a32;
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 20px; margin-bottom: 6px; }
    .price { color: #ff6b35; font-size: 32px; font-weight: 800; margin-bottom: 28px; }
    label { display: block; font-size: 12px; color: #7a7a8a; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
    input {
      width: 100%;
      background: #0d0d0f;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 15px;
      color: #f0ede8;
      outline: none;
      margin-bottom: 20px;
    }
    input:focus { border-color: #ff6b35; }
    button {
      width: 100%;
      padding: 15px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 13px; color: #ef4444; text-align: center; }
    .msg.info { color: #ffb347; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Touch Kit Pro — Test</h1>
    <div class="price">$1.00</div>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

    <button id="payBtn">Pay with PayPal</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="pptest.js"></script>
</body>
</html>
