<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave a Review — SanjayAIDev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #07080f;
      --surface:  #0f1018;
      --surface2: #181922;
      --border:   #23243a;
      --accent:   #00d9ff;
      --accent2:  #7c3aed;
      --green:    #22c55e;
      --text:     #dde3f0;
      --muted:    #556070;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,217,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,217,255,.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      background: rgba(7,8,15,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem;
      justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      color: var(--accent); text-decoration: none;
      letter-spacing: .08em;
    }
    .nav-back {
      font-family: var(--mono);
      font-size: 11px; color: var(--muted);
      text-decoration: none;
      display: flex; align-items: center; gap: .4rem;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 500px;
      margin-top: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 60px rgba(0,217,255,.04), 0 24px 48px rgba(0,0,0,.4);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 2rem; }

    .card-tag {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .6rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-tag::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: 1.7rem; font-weight: 800;
      line-height: 1.15; color: #fff;
      margin-bottom: .4rem;
    }
    h1 span { color: var(--accent); }

    .card-sub {
      font-size: 13px; color: var(--muted);
      font-family: var(--mono);
    }

    /* ── FORM ── */
    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--display);
      font-size: 14px;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,217,255,.08);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
      font-size: 12px;
    }
    select { cursor: pointer; }
    select option { background: var(--surface2); }

    /* ── STARS ── */
    .stars-wrap {
      display: flex; gap: .35rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }
    .stars-wrap input[type="radio"] { display: none; }
    .stars-wrap label {
      font-size: 1.9rem; cursor: pointer;
      color: var(--border);
      transition: color .15s, transform .15s;
      margin: 0; padding: 0;
      letter-spacing: 0;
      text-transform: none;
    }
    .stars-wrap input:checked ~ label,
    .stars-wrap label:hover,
    .stars-wrap label:hover ~ label {
      color: #f59e0b;
      transform: scale(1.15);
    }

    /* ── SUBMIT ── */
    .btn {
      width: 100%; padding: .85rem 1rem;
      background: var(--accent);
      color: #07080f;
      border: none; border-radius: 8px;
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      margin-top: .5rem;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,217,255,.2); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── STATUS ── */
    .status-msg {
      display: none;
      margin-top: 1rem;
      padding: .85rem 1rem;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      animation: fadeUp .3s ease;
    }
    .status-msg.success {
      display: block;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      color: var(--green);
    }
    .status-msg.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #ef4444;
    }
    .status-msg.loading {
      display: block;
      background: rgba(0,217,255,.06);
      border: 1px solid rgba(0,217,255,.2);
      color: var(--accent);
    }

    /* ── CHAR COUNT ── */
    .char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: .3rem;
    }
    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: #ef4444; }

    /* divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .note {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<nav>
  <a href="https://sanjaymeherdev.netlify.app" class="nav-brand">SANJAYAIDEV</a>
  <a href="https://sanjaymeherdev.netlify.app" class="nav-back">← Back to site</a>
</nav>

<div class="card">
  <div class="card-header">
    <div class="card-tag">Testimonials</div>
    <h1>Leave a <span>Review</span></h1>
    <div class="card-sub">Helps other devs make better decisions.</div>
  </div>

  <form id="reviewForm" novalidate>

    <!-- Name -->
    <div class="field">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="e.g. Rahul Dev" maxlength="50" required autocomplete="off"/>
    </div>

    <!-- Service -->
    <div class="field">
      <label for="service">Product / Service</label>
      <div class="select-wrap">
        <select id="service" required>
          <option value="" disabled selected>Select a product...</option>
          <option value="cgrelay">CGRelay — Multiplayer Relay</option>
          <option value="godotmp">GodotMP Setup</option>
          <option value="godotconnect">GodotConnect — P2P</option>
          <option value="visualcoder">Godot Visual Coder</option>
          <option value="paymentgateway">Payment Gateway</option>
          <option value="assets">Scripts &amp; Assets</option>
        </select>
      </div>
    </div>

    <!-- Stars -->
    <div class="field">
      <label>Rating</label>
      <div class="stars-wrap" id="starsWrap">
        <input type="radio" name="stars" id="s5" value="5"/>
        <label for="s5" title="5 stars">★</label>
        <input type="radio" name="stars" id="s4" value="4"/>
        <label for="s4" title="4 stars">★</label>
        <input type="radio" name="stars" id="s3" value="3"/>
        <label for="s3" title="3 stars">★</label>
        <input type="radio" name="stars" id="s2" value="2"/>
        <label for="s2" title="2 stars">★</label>
        <input type="radio" name="stars" id="s1" value="1"/>
        <label for="s1" title="1 star">★</label>
      </div>
    </div>

    <!-- Message -->
    <div class="field">
      <label for="message">Your Review</label>
      <textarea id="message" placeholder="Tell others what you think — what worked, what impressed you..." maxlength="500" required></textarea>
      <div class="char-count" id="charCount">0 / 500</div>
    </div>

    <hr class="divider"/>

    <button type="submit" class="btn" id="submitBtn">Submit Review →</button>
    <div class="status-msg" id="statusMsg"></div>

    <p class="note" style="margin-top:1rem;">
      Reviews are visible after manual approval.<br/>
      No account needed — just your name and honest feedback.
    </p>
  </form>
</div>

<script>
  // ── REPLACE THIS WITH YOUR APPS SCRIPT WEB APP URL ──
  const SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

  const form       = document.getElementById('reviewForm');
  const submitBtn  = document.getElementById('submitBtn');
  const statusMsg  = document.getElementById('statusMsg');
  const msgInput   = document.getElementById('message');
  const charCount  = document.getElementById('charCount');

  // Char counter
  msgInput.addEventListener('input', () => {
    const len = msgInput.value.length;
    charCount.textContent = `${len} / 500`;
    charCount.className = 'char-count' + (len > 450 ? (len >= 500 ? ' over' : ' warn') : '');
  });

  // Pre-select service from URL param e.g. ?service=cgrelay
  const urlService = new URLSearchParams(window.location.search).get('service');
  if (urlService) {
    const opt = document.querySelector(`#service option[value="${urlService}"]`);
    if (opt) opt.selected = true;
  }

  function showStatus(type, msg) {
    statusMsg.className = 'status-msg ' + type;
    statusMsg.textContent = msg;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const service = document.getElementById('service').value;
    const message = document.getElementById('message').value.trim();
    const stars   = document.querySelector('input[name="stars"]:checked')?.value;

    // Validation
    if (!name)    { showStatus('error', 'Please enter your name.'); return; }
    if (!service) { showStatus('error', 'Please select a product.'); return; }
    if (!stars)   { showStatus('error', 'Please select a star rating.'); return; }
    if (!message) { showStatus('error', 'Please write a short review.'); return; }
    if (message.length < 10) { showStatus('error', 'Review is too short. Write at least 10 characters.'); return; }

    submitBtn.disabled = true;
    showStatus('loading', 'Submitting your review...');

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ name, service, message, stars: Number(stars) })
      });
      const data = await res.json();

      if (data.success) {
        showStatus('success', '✓ Review submitted! It will appear after approval. Thank you!');
        form.reset();
        charCount.textContent = '0 / 500';
      } else {
        showStatus('error', data.error || 'Something went wrong. Please try again.');
      }
    } catch (err) {
      showStatus('error', 'Could not connect. Check your internet and try again.');
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
