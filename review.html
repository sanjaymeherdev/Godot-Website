<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave a Review — SanjayMeherDev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #07080f;
      --surface:  #0f1018;
      --surface2: #181922;
      --border:   #23243a;
      --accent:   #00d9ff;
      --accent2:  #7c3aed;
      --green:    #22c55e;
      --text:     #dde3f0;
      --muted:    #556070;
      --mono:     'JetBrains Mono', monospace;
      --display:  'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,217,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,217,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,217,255,.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      background: rgba(7,8,15,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem;
      justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      color: var(--accent); text-decoration: none;
      letter-spacing: .08em;
    }
    .nav-back {
      font-family: var(--mono);
      font-size: 11px; color: var(--muted);
      text-decoration: none;
      display: flex; align-items: center; gap: .4rem;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 500px;
      margin-top: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 60px rgba(0,217,255,.04), 0 24px 48px rgba(0,0,0,.4);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 2rem; }

    .card-tag {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .6rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-tag::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: 1.7rem; font-weight: 800;
      line-height: 1.15; color: #fff;
      margin-bottom: .4rem;
    }
    h1 span { color: var(--accent); }

    .card-sub {
      font-size: 13px; color: var(--muted);
      font-family: var(--mono);
    }

    /* ── FORM ── */
    .field { margin-bottom: 1.25rem; }

    /* Two-column row */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 420px) {
      .field-row { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--display);
      font-size: 14px;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,217,255,.08);
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    /* ── IMAGE UPLOAD ── */
    .image-upload-wrap {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar-preview {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      transition: border-color .2s;
    }
    .avatar-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .upload-btn-label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .3rem;
      cursor: pointer;
    }
    .upload-btn-label span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .upload-trigger {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: .6rem 1rem;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .upload-trigger:hover {
      border-color: var(--accent);
      background: rgba(0,217,255,.05);
    }
    input[type="file"] { display: none; }
    .upload-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: .2rem;
    }

    /* ── STARS ── */
    .stars-wrap {
      display: flex; gap: .35rem;
      flex-direction: row-reverse;
      justify-content: flex-end;
    }
    .stars-wrap input[type="radio"] { display: none; }
    .stars-wrap label {
      font-size: 1.9rem; cursor: pointer;
      color: var(--border);
      transition: color .15s, transform .15s;
      margin: 0; padding: 0;
      letter-spacing: 0;
      text-transform: none;
    }
    .stars-wrap input:checked ~ label,
    .stars-wrap label:hover,
    .stars-wrap label:hover ~ label {
      color: #f59e0b;
      transform: scale(1.15);
    }

    /* ── SUBMIT ── */
    .btn {
      width: 100%; padding: .85rem 1rem;
      background: var(--accent);
      color: #07080f;
      border: none; border-radius: 8px;
      font-family: var(--mono);
      font-size: 13px; font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      margin-top: .5rem;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,217,255,.2); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── STATUS ── */
    .status-msg {
      display: none;
      margin-top: 1rem;
      padding: .85rem 1rem;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      animation: fadeUp .3s ease;
    }
    .status-msg.success {
      display: block;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
      color: var(--green);
    }
    .status-msg.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #ef4444;
    }
    .status-msg.loading {
      display: block;
      background: rgba(0,217,255,.06);
      border: 1px solid rgba(0,217,255,.2);
      color: var(--accent);
    }

    /* ── CHAR COUNT ── */
    .char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: .3rem;
    }
    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: #ef4444; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .note {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<nav>
  <a href="https://sanjaymeherdev.netlify.app" class="nav-brand">SANJAYAIDEV</a>
  <a href="https://sanjaymeherdev.netlify.app" class="nav-back">← Back to site</a>
</nav>

<div class="card">
  <div class="card-header">
    <div class="card-tag">Testimonials</div>
    <h1>Leave a <span>Review</span></h1>
    <div class="card-sub">Helps other devs make better decisions.</div>
  </div>

  <form id="reviewForm" novalidate>

    <!-- Name + Role (side by side) -->
    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="e.g. Rahul Dev" maxlength="50" required autocomplete="off"/>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="role">Your Role</label>
        <input type="text" id="role" placeholder="e.g. Indie Game Dev" maxlength="50" required autocomplete="off"/>
      </div>
    </div>

    <!-- Profile Image -->
    <div class="field">
      <label>Profile Photo <span style="color:var(--muted);text-transform:none;letter-spacing:0;font-size:10px;">(optional)</span></label>
      <div class="image-upload-wrap">
        <div class="avatar-preview" id="avatarPreview">?</div>
        <div>
          <label for="avatarInput" class="upload-trigger">
            ↑ Choose Image
          </label>
          <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/webp, image/gif"/>
          <div class="upload-hint">JPG, PNG, WEBP — max 2MB. Square crop looks best.</div>
        </div>
      </div>
    </div>

    <!-- What did you use -->
    <div class="field">
      <label for="service">What Did You Use?</label>
      <input type="text" id="service" placeholder="e.g. GOwa WhatsApp API, Godot multiplayer setup..." maxlength="80" required autocomplete="off"/>
    </div>

    <!-- Stars -->
    <div class="field">
      <label>Rating</label>
      <div class="stars-wrap" id="starsWrap">
        <input type="radio" name="stars" id="s5" value="5"/>
        <label for="s5" title="5 stars">★</label>
        <input type="radio" name="stars" id="s4" value="4"/>
        <label for="s4" title="4 stars">★</label>
        <input type="radio" name="stars" id="s3" value="3"/>
        <label for="s3" title="3 stars">★</label>
        <input type="radio" name="stars" id="s2" value="2"/>
        <label for="s2" title="2 stars">★</label>
        <input type="radio" name="stars" id="s1" value="1"/>
        <label for="s1" title="1 star">★</label>
      </div>
    </div>

    <!-- Review Message -->
    <div class="field">
      <label for="message">Your Review</label>
      <textarea id="message" placeholder="Tell others what you think — what worked, what impressed you..." maxlength="500" required></textarea>
      <div class="char-count" id="charCount">0 / 500</div>
    </div>

    <hr class="divider"/>

    <button type="submit" class="btn" id="submitBtn">Submit Review →</button>
    <div class="status-msg" id="statusMsg"></div>

    <p class="note" style="margin-top:1rem;">
      Reviews are visible after manual approval.<br/>
      No account needed — just your name and honest feedback.
    </p>
  </form>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmNZ8_oOKFgWQ-FoXP_LaqsgLncRhYr0EXYZOzSvrTAWk7LZ5eUObmbbP-hiNy0aRVsQ/exec';

  const form       = document.getElementById('reviewForm');
  const submitBtn  = document.getElementById('submitBtn');
  const statusMsg  = document.getElementById('statusMsg');
  const msgInput   = document.getElementById('message');
  const charCount  = document.getElementById('charCount');
  const avatarInput  = document.getElementById('avatarInput');
  const avatarPreview = document.getElementById('avatarPreview');
  const nameInput  = document.getElementById('name');

  let avatarBase64 = null;

  // ── CHAR COUNTER ──
  msgInput.addEventListener('input', () => {
    const len = msgInput.value.length;
    charCount.textContent = `${len} / 500`;
    charCount.className = 'char-count' + (len > 450 ? (len >= 500 ? ' over' : ' warn') : '');
  });

  // ── AVATAR PREVIEW ──
  // Show initials from name as fallback
  nameInput.addEventListener('input', () => {
    if (!avatarBase64) {
      const initials = nameInput.value.trim()
        .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
      avatarPreview.textContent = initials;
    }
  });

  avatarInput.addEventListener('change', () => {
    const file = avatarInput.files[0];
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
      showStatus('error', 'Image too large. Max 2MB.');
      avatarInput.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      avatarBase64 = e.target.result; // full data URL
      avatarPreview.innerHTML = `<img src="${avatarBase64}" alt="preview"/>`;
      avatarPreview.style.borderColor = 'var(--accent)';
    };
    reader.readAsDataURL(file);
  });

  function showStatus(type, msg) {
    statusMsg.className = 'status-msg ' + type;
    statusMsg.textContent = msg;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const role    = document.getElementById('role').value.trim();
    const service = document.getElementById('service').value.trim();
    const message = document.getElementById('message').value.trim();
    const stars   = document.querySelector('input[name="stars"]:checked')?.value;
    const date    = new Date().toISOString(); // auto date

    // Validation
    if (!name)    { showStatus('error', 'Please enter your name.'); return; }
    if (!role)    { showStatus('error', 'Please enter your role.'); return; }
    if (!service) { showStatus('error', 'Please describe what you used.'); return; }
    if (!stars)   { showStatus('error', 'Please select a star rating.'); return; }
    if (!message) { showStatus('error', 'Please write a short review.'); return; }
    if (message.length < 10) { showStatus('error', 'Review is too short. Write at least 10 characters.'); return; }

    submitBtn.disabled = true;
    showStatus('loading', 'Submitting your review...');

    const payload = {
      name,
      role,
      service,
      message,
      stars: Number(stars),
      date,
      image: avatarBase64 || null   // base64 data URL or null
    };

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        showStatus('success', '✓ Review submitted! It will appear after approval. Thank you!');
        form.reset();
        charCount.textContent = '0 / 500';
        avatarBase64 = null;
        avatarPreview.innerHTML = '?';
        avatarPreview.style.borderColor = 'var(--border)';
      } else {
        showStatus('error', data.error || 'Something went wrong. Please try again.');
      }
    } catch (err) {
      showStatus('error', 'Could not connect. Check your internet and try again.');
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
