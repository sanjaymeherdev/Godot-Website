<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GDScript Forge | Modular Visual Coder</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ============================================ */
    /* SECTION 1: CSS VARIABLES & THEME              */
    /* ============================================ */
    :root {
      --bg:#080b0f; --bg2:#0d1117; --bg3:#141b22; --bg4:#1c2430;
      --border:#1e2a38; --border2:#253040; --border3:#2e3d50;
      --text:#d4dde8; --text2:#7f96b0; --text3:#4a5f72;
      --green:#39d353; --green-dim:rgba(57,211,83,0.08);
      --blue:#58a6ff; --blue-dim:rgba(88,166,255,0.08);
      --purple:#bc8cff; --amber:#e3b341; --red:#f85149; --cyan:#76e3ea;
      --r:8px; --r2:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.5;overflow-x:hidden}
    /* ============================================ */
    /* SECTION 2: LAYOUT & RESPONSIVE               */
    /* ============================================ */
    .workspace{display:flex;flex-direction:column;height:auto;min-height:calc(100vh - 52px)}
    @media (min-width:860px){ .workspace{display:grid;grid-template-columns:1fr 1fr;height:calc(100vh - 52px);overflow:hidden} }
    .left-panel{background:var(--bg);width:100%;display:flex;flex-direction:column}
    .right-panel{width:100%;margin-top:16px;border-top:2px solid var(--border2)}
    @media (min-width:860px){ .right-panel{margin-top:0;border-top:none;overflow:hidden;height:100%} }
    .output-code,.sample-code{white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',monospace;padding:16px;overflow-y:auto}
    .output-code{flex:1;background:var(--bg);max-height:60vh}
    .sample-code{background:var(--bg3);border-bottom:2px solid var(--border2);max-height:40vh}
    /* ============================================ */
    /* SECTION 3: FORM & CARD STYLES                */
    /* ============================================ */
    .sec{border-bottom:1px solid var(--border)}
    .sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-weight:600;color:var(--text3);text-transform:uppercase}
    .sec-hdr .arrow{margin-left:auto;font-size:9px;transition:transform 0.2s}
    .sec-hdr.open .arrow{transform:rotate(90deg)}
    .sec-body{display:none;padding:12px 14px;gap:10px;flex-direction:column}
    .sec-body.open{display:flex}
    .dot{width:7px;height:7px;border-radius:50%}
    input,select,textarea{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;color:var(--text);font-family:monospace;font-size:12px;width:100%}
    .badge-opt,.badge-req{font-size:9px;padding:1px 5px;border-radius:10px}
    .badge-req{background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.3);color:var(--red)}
    .add-btn{width:100%;padding:8px;background:var(--bg3);border:1px dashed var(--border3);border-radius:var(--r);cursor:pointer;font-size:11px}
    .add-btn:hover{border-color:var(--blue);color:var(--blue)}
    .btn-primary{background:linear-gradient(135deg,#238636,#196c2e);color:white;border:none;padding:10px;border-radius:var(--r);font-weight:700}
    .copy-btn{padding:5px 12px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer}
    /* ============================================ */
    /* SECTION 4: SYNTAX HIGHLIGHTING               */
    /* ============================================ */
    .kw{color:#ff7b72} .fn{color:#79c0ff} .ty{color:#79c0ff} .str{color:#a5d6ff} .num{color:#79c0ff} .cmt{color:#8b949e;font-style:italic} .ann{color:#ff7b72}
    /* ============================================ */
    /* SECTION 5: ACTION & CONDITION UI             */
    /* ============================================ */
    .action-row{display:flex;flex-wrap:wrap;gap:5px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:6px;margin-bottom:4px}
    .cond-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
    .cond-op{background:var(--bg3);border:1px solid var(--border3);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer}
    .match-builder{background:var(--bg3);border-radius:var(--r);padding:10px;margin:6px 0}
    .pattern-row{background:var(--bg4);margin:5px 0;padding:8px;border-left:3px solid var(--purple)}
    .status-bar{font-size:10px;padding:4px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:10px}
  </style>
</head>
<body>
<div class="workspace">
  <!-- ============================================ -->
  <!-- LEFT PANEL: HEADER, DECLARATIONS, FUNCTIONS  -->
  <!-- ============================================ -->
  <div class="left-panel">
    <div class="sec"><div class="sec-hdr open" onclick="toggleSec(this)"><div class="dot" style="background:var(--green)"></div>Script Header<span class="arrow">▶</span></div>
      <div class="sec-body open"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input type="text" id="classNameInput" placeholder="class_name (optional)">
        <input type="text" id="extendsInput" list="extendsList" placeholder="extends (required)">
        <datalist id="extendsList"><option>CharacterBody3D</option><option>Node2D</option><option>Node3D</option><option>Area3D</option></datalist>
      </div></div>
    </div>
    <div class="sec"><div class="sec-hdr" onclick="toggleSec(this)"><div class="dot" style="background:var(--amber)"></div>Declarations & Enums<span class="arrow">▶</span></div>
      <div class="sec-body"><div id="cvarList" class="param-list"></div><button class="add-btn" onclick="addClassVar()">+ Add Declaration</button><hr><button class="add-btn" onclick="openEnumModal()">🏷️ + Add Enum</button><div id="enumList"></div></div>
    </div>
    <div class="func-tab-bar" id="funcTabBar" style="display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border2);min-height:40px"></div>
    <div id="funcEditor" style="overflow-y:auto;flex:1"></div>
    <div class="bottom-bar" style="padding:12px;display:flex;gap:8px"><button class="btn-primary" style="flex:1" onclick="generateAll()">⚡ Generate GDScript</button></div>
    <div class="status-bar"><div class="status-dot" style="background:var(--green)"></div><span id="statusText">Ready</span><span id="funcCount" style="margin-left:auto">0 functions</span></div>
  </div>
  <!-- ============================================ -->
  <!-- RIGHT PANEL: OUTPUT & EXAMPLE                -->
  <!-- ============================================ -->
  <div class="right-panel"><div class="output-header" style="padding:10px 14px;display:flex;justify-content:space-between"><span>⬡ Generated GDScript</span><div><button class="copy-btn" onclick="copyCode()">Copy All</button></div></div>
  <div id="sampleBlock" class="sample-code"></div><div id="outputCode" class="output-code"><span class="cmt"># Press Generate</span></div></div>
</div>
<script>
// ============================================
// SECTION 1: GLOBAL STATE
// ============================================
let classVars = [];          // declarations
let enums = [];              // {id,name,values:[{name,val}],exportDropdown,autoMatch, matchFuncName}
let functions = [];
let activeFnId = null;
let _nextId = 1;
let _lastGeneratedCode = "";
const uid = () => _nextId++;

// ============================================
// SECTION 2: BUILT-IN FUNCTION RESTRICTIONS
// ============================================
const BUILTIN_TYPES = {
  enter_tree: { name:"_enter_tree", params:[], ret:"void" },
  ready: { name:"_ready", params:[], ret:"void" },
  process: { name:"_process", params:[{name:"delta",type:"float"}], ret:"void" },
  physics_process: { name:"_physics_process", params:[{name:"delta",type:"float"}], ret:"void" },
  input: { name:"_input", params:[{name:"event",type:"InputEvent"}], ret:"void" },
  unhandled_input: { name:"_unhandled_input", params:[{name:"event",type:"InputEvent"}], ret:"void" },
  exit_tree: { name:"_exit_tree", params:[], ret:"void" }
};
let builtInAdded = { enter_tree:false, ready:false, process:false, physics_process:false, input:false, unhandled_input:false, exit_tree:false };

// ============================================
// SECTION 3: HELPER FUNCTIONS
// ============================================
function esc(s){ return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function toggleSec(hdr){ hdr.classList.toggle('open'); let b=hdr.nextElementSibling; if(b)b.classList.toggle('open'); }

// ============================================
// SECTION 4: DECLARATIONS (VAR/SIGNAL/CONST)
// ============================================
function renderClassVars(){
  const el=document.getElementById('cvarList');
  if(!classVars.length){ el.innerHTML='<div class="empty-hint">✨ Add @export, @onready, signal, const</div>'; return; }
  el.innerHTML=classVars.map(c=>`<div class="cvar-item" style="display:flex;gap:6px;flex-wrap:wrap;background:var(--bg4);margin-bottom:5px;padding:5px">
    <select onchange="updateCV(${c.id},'ann',this.value)">${['','@export','@onready','const','signal'].map(a=>`<option ${c.ann===a?'selected':''}>${a||'none'}</option>`).join('')}</select>
    <input value="${esc(c.name)}" placeholder="name" onchange="updateCV(${c.id},'name',this.value)">
    ${c.ann==='signal'?'<span style="color:var(--text3)">(signal — no type/value)</span>':`<select onchange="updateCV(${c.id},'type',this.value)"><option value="">(no type)</option><option>int</option><option>float</option><option>String</option><option>bool</option><option>Vector3</option><option>CharacterBody3D</option><option>Node3D</option><option>Area3D</option><option>AnimationPlayer</option></select>
    <input placeholder="= value" value="${esc(c.val)}" onchange="updateCV(${c.id},'val',this.value)">`}
    <button onclick="removeCV(${c.id})">🗑</button></div>`).join('');
}
function addClassVar(){ classVars.push({id:uid(),ann:'',name:'new_var',type:'',val:''}); renderClassVars(); }
function removeCV(id){ classVars=classVars.filter(c=>c.id!==id); renderClassVars(); }
function updateCV(id,field,val){ let c=classVars.find(c=>c.id===id); if(c) c[field]=val; }

// ============================================
// SECTION 5: ENUM MAKER (MODAL + AUTO MATCH)
// ============================================
function openEnumModal(){
  let name=prompt("Enum name (e.g., WeaponType)");
  if(!name) return;
  let newEnum={ id:uid(), name:name, values:[], exportDropdown:false, autoMatch:false, matchFuncName:`handle_${name.toLowerCase()}` };
  enums.push(newEnum);
  renderEnumsUI();
}
function renderEnumsUI(){
  const container=document.getElementById('enumList');
  if(!enums.length){ container.innerHTML=''; return; }
  container.innerHTML=enums.map(e=>`<div style="background:var(--bg3);margin-top:8px;padding:8px;border-radius:6px"><strong>${esc(e.name)}</strong> 
    <button onclick="editEnum(${e.id})">✏️ Edit</button> <button onclick="removeEnum(${e.id})">🗑</button>
    <div><label><input type="checkbox" ${e.exportDropdown?'checked':''} onchange="toggleEnumExport(${e.id},this.checked)"> @export_enum (dropdown)</label>
    <label><input type="checkbox" ${e.autoMatch?'checked':''} onchange="toggleEnumAutoMatch(${e.id},this.checked)"> Auto‑generate match function</label></div>
    <div>Values: ${e.values.map(v=>v.name).join(', ')}</div></div>`).join('');
}
function editEnum(id){
  let e=enums.find(e=>e.id===id); if(!e) return;
  let vals=prompt("Values (comma separated):", e.values.map(v=>v.name).join(','));
  if(vals) e.values=vals.split(',').map((s,i)=>({name:s.trim(),value:i}));
  renderEnumsUI();
}
function removeEnum(id){ enums=enums.filter(e=>e.id!==id); renderEnumsUI(); }
function toggleEnumExport(id,val){ let e=enums.find(e=>e.id===id); if(e) e.exportDropdown=val; }
function toggleEnumAutoMatch(id,val){ let e=enums.find(e=>e.id===id); if(e){ e.autoMatch=val; if(val && !functions.some(f=>f.name===e.matchFuncName)) addAutoMatchFunction(e); } }
function addAutoMatchFunction(enumDef){
  let id=uid();
  let actions=[];
  for(let v of enumDef.values){
    actions.push({ id:uid(), type:'comment', value:`Case: ${enumDef.name}.${v.name}`, indent:1 });
    actions.push({ id:uid(), type:'pass', indent:1 });
  }
  actions.push({ id:uid(), type:'comment', value:'default:', indent:1 });
  actions.push({ id:uid(), type:'pass', indent:1 });
  let newFn={ id, name:enumDef.matchFuncName, isBuiltin:false, returnType:'void', params:[{name:enumDef.name.toLowerCase(),type:enumDef.name}], actions, isStatic:false, rpcMode:'none' };
  functions.push(newFn);
  activeFnId=id;
  renderTabs(); renderEditor(); updateStatus();
}

// ============================================
// SECTION 6: FUNCTION MANAGEMENT (BUILT-IN + CUSTOM)
// ============================================
function getBuiltInSelectorHtml(){
  let opts='';
  for(let [key,def] of Object.entries(BUILTIN_TYPES)){
    if(!builtInAdded[key]) opts+=`<option value="${key}">${def.name} (built-in)</option>`;
  }
  return `<select id="builtinSelect" style="width:auto;margin-right:6px"><option value="">➕ Built‑in...</option>${opts}</select>`;
}
function addBuiltinFromSelect(){ let sel=document.getElementById('builtinSelect'); if(!sel||!sel.value) return; let key=sel.value; if(builtInAdded[key]){ alert("Already added"); return; }
  let def=BUILTIN_TYPES[key];
  let newFn={ id:uid(), name:def.name, isBuiltin:true, builtinKey:key, returnType:def.ret, params:def.params.map(p=>({...p,id:uid()})), actions:[], isStatic:false, rpcMode:'none' };
  functions.push(newFn); builtInAdded[key]=true; activeFnId=newFn.id; renderTabs(); renderEditor(); updateStatus();
  sel.value='';
}
function addCustomFunction(){
  let name=prompt("Custom function name (e.g., take_damage):","my_func");
  if(!name||!name.match(/^[a-zA-Z_][a-zA-Z0-9_]*$/)){ alert("Invalid function name"); return; }
  let newFn={ id:uid(), name, isBuiltin:false, returnType:'void', params:[], actions:[], isStatic:false, rpcMode:'none' };
  functions.push(newFn); activeFnId=newFn.id; renderTabs(); renderEditor(); updateStatus();
}
function removeFunc(id){
  let fn=functions.find(f=>f.id===id);
  if(fn && fn.isBuiltin && fn.builtinKey) builtInAdded[fn.builtinKey]=false;
  functions=functions.filter(f=>f.id!==id);
  if(activeFnId===id) activeFnId=functions.length?functions[0].id:null;
  renderTabs(); renderEditor(); updateStatus();
}
function setActiveFunc(id){ activeFnId=id; renderTabs(); renderEditor(); }
function getActiveFn(){ return functions.find(f=>f.id===activeFnId)||null; }
function updateFn(field,val){ let fn=getActiveFn(); if(fn){ fn[field]=val; if(field==='name') renderTabs(); } }
function addParam(){ let fn=getActiveFn(); if(fn){ fn.params.push({id:uid(),name:`param${fn.params.length+1}`,type:'',defaultValue:''}); renderEditor(); } }
function removeParam(id){ let fn=getActiveFn(); if(fn) fn.params=fn.params.filter(p=>p.id!==id); renderEditor(); }
function updateParam(pid,field,val){ let fn=getActiveFn(); let p=fn?.params.find(p=>p.id===pid); if(p) p[field]=val; }

// ============================================
// SECTION 7: ACTIONS (IF/MATCH/WHILE/ETC)
// ============================================
function addAction(type='pass'){
  let fn=getActiveFn(); if(!fn) return;
  let last=fn.actions[fn.actions.length-1];
  let indent=last?(last.indent||0):0;
  if(last && ['if','for','while','match'].includes(last.type)) indent++;
  fn.actions.push({id:uid(),type,value:'',name:'',indent,conditions:['if','while'].includes(type)?[{id:uid(),not:false,left:'',cmp:'',right:'',op:'and'}]:[], patterns:type==='match'?[{id:uid(),values:['_'],isDefault:true,actions:[]}]:[] });
  renderEditor(); updateStatus();
}
function removeAction(id){ let fn=getActiveFn(); if(fn) fn.actions=fn.actions.filter(a=>a.id!==id); renderEditor(); updateStatus(); }
function updateAction(id,field,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===id); if(a){ if(field==='type'){ a.type=val; if(val==='match' && !a.patterns) a.patterns=[{id:uid(),values:['_'],isDefault:true,actions:[]}]; } else a[field]=val; renderEditor(); } }
function moveAction(id,dir){ let fn=getActiveFn(); let idx=fn?.actions.findIndex(a=>a.id===id); if(idx!==undefined){ let nxt=idx+dir; if(nxt>=0 && nxt<fn.actions.length){ [fn.actions[idx],fn.actions[nxt]]=[fn.actions[nxt],fn.actions[idx]]; renderEditor(); } } }
function changeIndent(id,delta){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===id); if(a){ a.indent=Math.max(0,Math.min(8,(a.indent||0)+delta)); renderEditor(); } }

// ============================================
// SECTION 8: CONDITION BUILDER (AND/OR/NOT)
// ============================================
function buildCondStr(condArray){
  if(!condArray.length) return 'true';
  return condArray.map((c,i)=>{
    let notStr=c.not?'not ':'';
    let cmpStr=c.cmp?` ${c.cmp} ${c.right||'null'}`:'';
    let part=`${notStr}${c.left||'condition'}${cmpStr}`;
    return i===0?part:` ${c.op} ${part}`;
  }).join('');
}
function addCondRow(aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a){ a.conditions.push({id:uid(),not:false,left:'',cmp:'',right:'',op:'and'}); renderEditor(); } }
function removeCondRow(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a && a.conditions.length>1) a.conditions=a.conditions.filter(c=>c.id!==cid); renderEditor(); }
function updateCond(aid,cid,field,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let c=a?.conditions.find(c=>c.id===cid); if(c) c[field]=val; renderEditor(); }
function toggleCondNot(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let c=a?.conditions.find(c=>c.id===cid); if(c) c.not=!c.not; renderEditor(); }
function toggleCondOp(aid,cid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let idx=a?.conditions.findIndex(c=>c.id===cid); if(idx>0){ a.conditions[idx-1].op=a.conditions[idx-1].op==='and'?'or':'and'; renderEditor(); } }

// ============================================
// SECTION 9: MATCH STATEMENT PATTERN BUILDER
// ============================================
function addMatchPattern(aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a && a.type==='match'){ a.patterns.push({id:uid(),values:['new'],isDefault:false,actions:[]}); renderEditor(); } }
function addPatternValue(pid,aid,val){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let p=a?.patterns.find(p=>p.id===pid); if(p && val.trim()){ p.values=val.split(',').map(v=>v.trim()); renderEditor(); } }
function addPatternAction(pid,aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); let p=a?.patterns.find(p=>p.id===pid); if(p){ p.actions.push({id:uid(),type:'pass',value:'',indent:2}); renderEditor(); } }
function removePattern(pid,aid){ let fn=getActiveFn(); let a=fn?.actions.find(a=>a.id===aid); if(a && a.patterns.length>1){ a.patterns=a.patterns.filter(p=>p.id!==pid); renderEditor(); } }

// ============================================
// SECTION 10: INPUT EVENT WIZARD (QUICK INSERT)
// ============================================
function openInputWizard(){
  let type=prompt("Event type: screen_touch, screen_drag, mouse_button, key_press","key_press");
  if(!type) return;
  let fn=getActiveFn(); if(!fn) return;
  let codeComment=`# INPUT: ${type} handler`;
  fn.actions.push({id:uid(),type:'comment',value:codeComment,indent:0});
  if(type==='key_press'){
    fn.actions.push({id:uid(),type:'raw',value:`if event is InputEventKey and event.pressed and not event.echo:\n    match event.keycode:\n        KEY_W:\n            pass\n        _:\n            pass`,indent:0});
  } else if(type==='screen_touch'){
    fn.actions.push({id:uid(),type:'raw',value:`if event is InputEventScreenTouch:\n    if event.pressed:\n        print("Touch at ", event.position)`,indent:0});
  } else if(type==='mouse_button'){
    fn.actions.push({id:uid(),type:'raw',value:`if event is InputEventMouseButton and event.pressed:\n    if event.button_index == MOUSE_BUTTON_LEFT:\n        print("Left click")`,indent:0});
  } else {
    fn.actions.push({id:uid(),type:'raw',value:`# Custom event: ${type}\npass`,indent:0});
  }
  renderEditor();
}

// ============================================
// SECTION 11: CODE GENERATION ENGINE
// ============================================
function genLine(a){
  if(a.type==='raw') return a.value;
  if(a.type==='comment') return `# ${a.value}`;
  if(a.type==='if') return `if ${buildCondStr(a.conditions)}:`;
  if(a.type==='while') return `while ${buildCondStr(a.conditions)}:`;
  if(a.type==='for') return `for ${a.value || 'item in array'}:`;
  if(a.type==='var') return `var ${a.name || 'var_name'} = ${a.value || 'value'}`;
  if(a.type==='assign') return `${a.name || 'target'} = ${a.value || 'value'}`;
  if(a.type==='return') return a.value?`return ${a.value}`:'return';
  if(a.type==='print') return `print(${a.value || ''})`;
  if(a.type==='pass') return 'pass';
  if(a.type==='match'){
    let out=`match ${a.value || 'value'}:\n`;
    for(let p of (a.patterns||[])){
      let vals=p.values.join(',');
      out+=`    ${vals}:\n`;
      for(let act of (p.actions||[])){
        out+=`        ${genLine(act)}\n`;
      }
    }
    return out;
  }
  return 'pass';
}
function generateAll(){
  let blocks=[];
  let cn=document.getElementById('classNameInput').value.trim();
  let ex=document.getElementById('extendsInput').value.trim();
  if(cn) blocks.push(`class_name ${cn}`);
  if(ex) blocks.push(`extends ${ex}`);
  else blocks.push(`# WARNING: extends required`);
  blocks.push('');
  // Declarations
  for(let cv of classVars){
    if(cv.ann==='signal') blocks.push(`signal ${cv.name}`);
    else if(cv.ann==='const') blocks.push(`const ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
    else if(cv.ann) blocks.push(`${cv.ann}\nvar ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
    else blocks.push(`var ${cv.name}${cv.type?`: ${cv.type}`:''}${cv.val?` = ${cv.val}`:''}`);
  }
  // Enums
  for(let e of enums){
    if(e.exportDropdown){
      let opts=e.values.map(v=>v.name).join('","');
      blocks.push(`@export_enum("${opts}") var ${e.name.toLowerCase()}: int = 0`);
    } else {
      blocks.push(`enum ${e.name} { ${e.values.map(v=>v.name).join(', ')} }`);
    }
    if(e.autoMatch && !functions.some(f=>f.name===e.matchFuncName)) addAutoMatchFunction(e);
  }
  if(classVars.length||enums.length) blocks.push('');
  // Functions
  for(let fn of functions){
    let params=fn.params.map(p=>`${p.name}${p.type?`: ${p.type}`:''}${p.defaultValue?` = ${p.defaultValue}`:''}`).join(', ');
    let ret=fn.returnType&&fn.returnType!=='void'?` -> ${fn.returnType}`:'';
    blocks.push(`func ${fn.name}(${params})${ret}:`);
    if(!fn.actions.length) blocks.push('\tpass');
    else for(let a of fn.actions){
      let indent='\t'.repeat((a.indent||0)+1);
      let line=genLine(a);
      if(line) blocks.push(`${indent}${line}`);
    }
    blocks.push('');
  }
  let final=blocks.join('\n').trim();
  _lastGeneratedCode=final;
  document.getElementById('outputCode').innerHTML=highlight(final);
  updateStatus();
}
function highlight(code){
  let h=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/(#.*$)/gm,'<span class="cmt">$1</span>');
  h=h.replace(/"[^"]*"/g,'<span class="str">$&</span>');
  h=h.replace(/\b(func|var|const|if|for|while|match|return|pass|enum|signal)\b/g,'<span class="kw">$1</span>');
  h=h.replace(/@\w+/g,'<span class="ann">$&</span>');
  h=h.replace(/\b(CharacterBody3D|Vector3|Node3D|Area3D|AnimationPlayer|int|float|String|bool|void)\b/g,'<span class="ty">$1</span>');
  return h;
}
function copyCode(){ navigator.clipboard.writeText(_lastGeneratedCode); alert("Copied!"); }
function updateStatus(){ document.getElementById('funcCount').innerText=`${functions.length} functions · ${functions.reduce((s,f)=>s+f.actions.length,0)} actions`; }

function renderTabs(){
  let bar=document.getElementById('funcTabBar');
  let html=functions.map(f=>`<div class="func-tab ${f.id===activeFnId?'active':''}" onclick="setActiveFunc(${f.id})" style="display:inline-block;padding:6px 12px;cursor:pointer">${esc(f.name)}<span onclick="event.stopPropagation();removeFunc(${f.id})" style="margin-left:6px">✕</span></div>`).join('');
  bar.innerHTML=html+`<div style="display:inline-flex;gap:4px;align-items:center">${getBuiltInSelectorHtml()}<button onclick="addBuiltinFromSelect()" class="add-func-btn" style="background:none;border:none">➕ Add Built‑in</button><button onclick="addCustomFunction()" class="add-func-btn" style="background:none;border:none">➕ Custom</button><button onclick="openInputWizard()" style="background:var(--bg4);border-radius:6px;padding:4px 8px">🎮 Input Wizard</button></div>`;
}
function renderEditor(){
  let fn=getActiveFn();
  let ed=document.getElementById('funcEditor');
  if(!fn){ ed.innerHTML='<div class="empty-hint">Select or add function</div>'; return; }
  let paramsHtml=`<div class="param-list">${fn.params.map(p=>`<div style="display:flex;gap:6px;margin-bottom:4px"><input value="${esc(p.name)}" placeholder="name" onchange="updateParam(${p.id},'name',this.value)"><select onchange="updateParam(${p.id},'type',this.value)"><option value="">(no type)</option><option>int</option><option>float</option><option>String</option><option>bool</option><option>Vector3</option></select><input value="${esc(p.defaultValue)}" placeholder="default" onchange="updateParam(${p.id},'defaultValue',this.value)"><button onclick="removeParam(${p.id})">🗑</button></div>`).join('')}<button class="add-btn" onclick="addParam()">+ Param</button></div>`;
  let actionsHtml=fn.actions.map(a=>{
    if(a.type==='match'){
      let patternsHtml=(a.patterns||[]).map(p=>`<div class="pattern-row"><input placeholder="values (comma)" value="${p.values.join(',')}" onchange="addPatternValue(${p.id},${a.id},this.value)"><button onclick="addPatternAction(${p.id},${a.id})">+ act</button><button onclick="removePattern(${p.id},${a.id})">🗑</button><div style="margin-left:20px">${(p.actions||[]).map(act=>`<div>${genLine(act)} <button onclick="removeAction(${act.id})">✕</button></div>`).join('')}</div></div>`).join('');
      return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button><select onchange="updateAction(${a.id},'type',this.value)"><option>match</option><option>if</option><option>for</option><option>pass</option></select><input placeholder="match expression" value="${esc(a.value)}" onchange="updateAction(${a.id},'value',this.value)"><div class="indent-ctrl"><button onclick="changeIndent(${a.id},-1)">◀</button><span>${a.indent||0}</span><button onclick="changeIndent(${a.id},1)">▶</button></div><button onclick="addMatchPattern(${a.id})">+ Pattern</button><button onclick="removeAction(${a.id})">🗑</button>${patternsHtml}</div>`;
    }
    if(a.type==='if' || a.type==='while'){
      let condHtml=(a.conditions||[]).map((c,i)=>`<div class="cond-row">${i>0?`<button class="cond-op" onclick="toggleCondOp(${a.id},${c.id})">${(a.conditions[i-1].op||'and').toUpperCase()}</button>`:''}<button class="cond-not${c.not?' active':''}" onclick="toggleCondNot(${a.id},${c.id})">not</button><input placeholder="left" value="${esc(c.left)}" onchange="updateCond(${a.id},${c.id},'left',this.value)"><select onchange="updateCond(${a.id},${c.id},'cmp',this.value)"><option value="">cmp</option><option>==</option><option>!=</option><option><</option><option>></option></select><input placeholder="right" value="${esc(c.right)}" onchange="updateCond(${a.id},${c.id},'right',this.value)"><button onclick="removeCondRow(${a.id},${c.id})">✕</button></div>`).join('');
      return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button><select onchange="updateAction(${a.id},'type',this.value)"><option>if</option><option>while</option><option>pass</option></select><div class="indent-ctrl"><button onclick="changeIndent(${a.id},-1)">◀</button><span>${a.indent||0}</span><button onclick="changeIndent(${a.id},1)">▶</button></div><button onclick="addCondRow(${a.id})">+ AND/OR</button><button onclick="removeAction(${a.id})">🗑</button>${condHtml}</div>`;
    }
    return `<div class="action-row"><button onclick="moveAction(${a.id},-1)">▲</button><button onclick="moveAction(${a.id},1)">▼</button><select onchange="updateAction(${a.id},'type',this.value)"><option>pass</option><option>raw</option><option>comment</option><option>var</option><option>assign</option><option>return</option><option>print</option><option>for</option><option>match</option><option>if</option></select><input placeholder="${a.type==='comment'?'comment':a.type==='var'?'name':'value'}" value="${esc(a.type==='var'?a.name:a.value)}" onchange="updateAction(${a.id},'${a.type==='var'?'name':'value'}',this.value)"><div class="indent-ctrl"><button onclick="changeIndent(${a.id},-1)">◀</button><span>${a.indent||0}</span><button onclick="changeIndent(${a.id},1)">▶</button></div><button onclick="removeAction(${a.id})">🗑</button></div>`;
  }).join('');
  ed.innerHTML=`<div class="sec"><div class="sec-hdr open"><div class="dot" style="background:var(--purple)"></div>Signature</div><div class="sec-body open"><div><label>Name: <input value="${esc(fn.name)}" onchange="updateFn('name',this.value)"></label><label>Return: <select onchange="updateFn('returnType',this.value)"><option>void</option><option>int</option><option>bool</option><option>String</option></select></label></div>${paramsHtml}</div></div>
  <div class="sec"><div class="sec-hdr open"><div class="dot" style="background:var(--green)"></div>Actions</div><div class="sec-body open"><div class="action-list">${actionsHtml}</div><div style="display:flex;gap:6px;margin-top:8px"><button class="add-btn" onclick="addAction('pass')">+ Action</button><button class="add-btn" onclick="addAction('raw')">+ Raw</button><button class="add-btn" onclick="addAction('comment')">+ Comment</button></div></div></div>`;
}
