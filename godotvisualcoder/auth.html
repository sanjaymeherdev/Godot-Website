<!DOCTYPE html>
<html>
<head>
    <title>Auth System</title>
    <style>
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .auth-popup {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            max-width: 90%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .auth-popup h2 {
            margin-top: 0;
            color: #333;
        }
        
        .auth-popup input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        .auth-popup button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-popup button:hover {
            background: #45a049;
        }
        
        .toggle-mode {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #4CAF50;
        }
        
        .error-msg {
            color: red;
            font-size: 12px;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        
        .security-question {
            font-size: 14px;
            color: #666;
            margin: 10px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        
        .protected-content {
            display: none;
            padding: 50px;
            text-align: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #cc0000;
        }
        
        .session-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: left;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #666;
        }
        
        .success-msg {
            color: green;
            font-size: 12px;
            margin-top: -5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="protected-content" id="protectedContent">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <div class="session-info" id="sessionInfo"></div>
        <h1>Welcome to Protected Area!</h1>
        <p>You are now logged in and can see this content.</p>
        <p>Your session is active.</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwHZwutK_Zvt3QUhRnrkGm0i3S0hq3SmDtXOKToUlDih14CvrvHKpH9QgPq860lsLxO/exec";
        
        // Session management
        class SessionManager {
            static setSession(userData) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('user_data', JSON.stringify(userData));
                localStorage.setItem('session_start', Date.now().toString());
                console.log('Session saved:', userData); // Debug
            }
            
            static getSession() {
                const userData = localStorage.getItem('user_data');
                console.log('Session retrieved:', userData); // Debug
                
                return {
                    isLoggedIn: localStorage.getItem('isLoggedIn') === 'true',
                    userData: userData ? JSON.parse(userData) : null,
                    sessionStart: localStorage.getItem('session_start')
                };
            }
            
            static clearSession() {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('user_data');
                localStorage.removeItem('session_start');
                console.log('Session cleared'); // Debug
            }
            
            static isSessionValid() {
                const session = this.getSession();
                if (!session.isLoggedIn || !session.userData) return false;
                
                const sessionAge = Date.now() - parseInt(session.sessionStart || '0');
                const maxAge = 24 * 60 * 60 * 1000; // 24 hours
                
                if (sessionAge >= maxAge) {
                    this.clearSession();
                    return false;
                }
                
                return true;
            }
        }
        
        // Submit form using iframe (bypasses CORS)
        function submitForm(action, data, callback) {
            const iframeId = 'iframe_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const formId = 'form_' + Date.now();
            
            // Create iframe
            const iframe = document.createElement('iframe');
            iframe.name = iframeId;
            iframe.id = iframeId;
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Create form
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = API_URL;
            form.target = iframeId;
            form.id = formId;
            form.style.display = 'none';
            
            // Add action
            const actionInput = document.createElement('input');
            actionInput.type = 'hidden';
            actionInput.name = 'action';
            actionInput.value = action;
            form.appendChild(actionInput);
            
            // Add data fields
            for (let key in data) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            
            // Set timeout for iframe load
            const timeout = setTimeout(() => {
                iframe.onload = null;
                cleanup();
                callback({ success: false, message: 'Request timeout' });
            }, 10000);
            
            // Listen for iframe load
            iframe.onload = function() {
                clearTimeout(timeout);
                
                let responseText = null;
                let result = null;
                
                try {
                    // Try to get response from iframe
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const bodyText = iframeDoc.body.innerText || iframeDoc.body.textContent;
                    
                    if (bodyText && bodyText.trim()) {
                        responseText = bodyText.trim();
                        try {
                            result = JSON.parse(responseText);
                        } catch(e) {
                            // Not JSON, use as is
                            result = { success: true, message: responseText, raw: responseText };
                        }
                    } else {
                        result = { success: true, message: 'Action completed' };
                    }
                } catch(e) {
                    // Cross-origin - can't read response, but form submitted
                    console.log('Form submitted (cross-origin)');
                    result = { success: true, message: 'Action completed', data: data };
                }
                
                cleanup();
                callback(result);
            };
            
            function cleanup() {
                setTimeout(() => {
                    if (document.getElementById(formId)) document.getElementById(formId).remove();
                    if (document.getElementById(iframeId)) document.getElementById(iframeId).remove();
                }, 1000);
            }
            
            form.submit();
        }
        
        // API functions
        function register(username, email, password, securityQuestion, securityAnswer, callback) {
            submitForm('register', {
                username: username,
                email: email,
                password: password,
                securityQuestion: securityQuestion,
                securityAnswer: securityAnswer
            }, callback);
        }
        
        function login(username, password, callback) {
            submitForm('login', {
                username: username,
                password: password
            }, function(result) {
                // Make sure we have the username in the result
                if (result.success && !result.username) {
                    result.username = username;
                }
                callback(result);
            });
        }
        
        function getSecurityQuestion(username, callback) {
            submitForm('getSecurityQuestion', { username: username }, callback);
        }
        
        function verifyAnswer(username, answer, callback) {
            submitForm('verifyAnswer', { username: username, answer: answer }, callback);
        }
        
        // Logout function
        function logout() {
            SessionManager.clearSession();
            location.reload();
        }
        
        // Check session on page load
        function checkSession() {
            if (SessionManager.isSessionValid()) {
                const session = SessionManager.getSession();
                const userData = session.userData;
                
                // Display protected content
                document.getElementById('protectedContent').style.display = 'block';
                
                // Show user info
                if (userData && userData.username) {
                    document.getElementById('sessionInfo').innerHTML = `
                        <strong>Logged in as:</strong> ${userData.username}<br>
                        <strong>Email:</strong> ${userData.email || 'Not set'}<br>
                        <strong>Session active</strong><br>
                        <small>Login time: ${new Date(parseInt(session.sessionStart)).toLocaleString()}</small>
                    `;
                } else {
                    document.getElementById('sessionInfo').innerHTML = `
                        <strong>Logged in</strong><br>
                        Session active
                    `;
                }
                return true;
            } else {
                SessionManager.clearSession();
                showAuthPopup();
                return false;
            }
        }
        
        // Popup UI
        function showAuthPopup() {
            const existing = document.querySelector('.auth-overlay');
            if (existing) existing.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'auth-overlay';
            
            let mode = 'login';
            let recoveryMode = false;
            let currentUsername = '';
            
            function renderPopup() {
                if (recoveryMode) {
                    overlay.innerHTML = `
                        <div class="auth-popup">
                            <h2>Account Recovery</h2>
                            <div id="errorMsg" class="error-msg"></div>
                            <div id="loadingMsg" class="loading">Processing...</div>
                            <input type="text" id="recoveryUsername" placeholder="Username" autocomplete="off">
                            <button onclick="window.authActions.requestQuestion()">Get Security Question</button>
                            <div id="questionArea" style="display:none;">
                                <div class="security-question" id="securityQuestion"></div>
                                <input type="text" id="securityAnswer" placeholder="Your answer">
                                <button onclick="window.authActions.verifyRecovery()">Recover Password</button>
                            </div>
                            <div id="passwordResult" style="display:none; margin-top:10px; padding:10px; background:#e8f5e9; border-radius:5px;"></div>
                            <div class="toggle-mode" onclick="window.authActions.backToLogin()">← Back to Login</div>
                        </div>
                    `;
                } else if (mode === 'login') {
                    overlay.innerHTML = `
                        <div class="auth-popup">
                            <h2>Login</h2>
                            <div id="errorMsg" class="error-msg"></div>
                            <div id="loadingMsg" class="loading">Processing...</div>
                            <input type="text" id="username" placeholder="Username" autocomplete="off">
                            <input type="password" id="password" placeholder="Password">
                            <button onclick="window.authActions.doLogin()">Login</button>
                            <div class="toggle-mode" onclick="window.authActions.switchToRegister()">Don't have an account? Register</div>
                            <div class="toggle-mode" onclick="window.authActions.switchToRecovery()">Forgot Password?</div>
                        </div>
                    `;
                } else {
                    overlay.innerHTML = `
                        <div class="auth-popup">
                            <h2>Register</h2>
                            <div id="errorMsg" class="error-msg"></div>
                            <div id="loadingMsg" class="loading">Processing...</div>
                            <input type="text" id="regUsername" placeholder="Username" autocomplete="off">
                            <input type="email" id="regEmail" placeholder="Email">
                            <input type="password" id="regPassword" placeholder="Password">
                            <input type="text" id="regQuestion" placeholder="Security Question (e.g., Favorite color?)">
                            <input type="text" id="regAnswer" placeholder="Security Answer">
                            <button onclick="window.authActions.doRegister()">Register</button>
                            <div class="toggle-mode" onclick="window.authActions.switchToLogin()">Already have an account? Login</div>
                        </div>
                    `;
                }
            }
            
            window.authActions = {
                doLogin() {
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const errorDiv = document.getElementById('errorMsg');
                    const loadingDiv = document.getElementById('loadingMsg');
                    
                    if (!username || !password) {
                        errorDiv.textContent = 'Username and password required';
                        return;
                    }
                    
                    loadingDiv.style.display = 'block';
                    errorDiv.textContent = '';
                    
                    login(username, password, function(result) {
                        loadingDiv.style.display = 'none';
                        
                        if (result.success) {
                            // Save to session
                            SessionManager.setSession({
                                username: result.username || username,
                                email: result.email || '',
                                lastLogin: result.lastLogin || new Date().toISOString()
                            });
                            overlay.remove();
                            location.reload();
                        } else {
                            errorDiv.textContent = result.message || 'Login failed';
                        }
                    });
                },
                
                doRegister() {
                    const username = document.getElementById('regUsername').value;
                    const email = document.getElementById('regEmail').value;
                    const password = document.getElementById('regPassword').value;
                    const question = document.getElementById('regQuestion').value;
                    const answer = document.getElementById('regAnswer').value;
                    const errorDiv = document.getElementById('errorMsg');
                    const loadingDiv = document.getElementById('loadingMsg');
                    
                    if (!username || !email || !password || !question || !answer) {
                        errorDiv.textContent = 'All fields required';
                        return;
                    }
                    
                    loadingDiv.style.display = 'block';
                    errorDiv.textContent = '';
                    
                    register(username, email, password, question, answer, function(result) {
                        loadingDiv.style.display = 'none';
                        
                        if (result.success) {
                            errorDiv.className = 'success-msg';
                            errorDiv.textContent = 'Registration successful! Please login.';
                            setTimeout(() => {
                                mode = 'login';
                                recoveryMode = false;
                                renderPopup();
                            }, 2000);
                        } else {
                            errorDiv.textContent = result.message || 'Registration failed';
                        }
                    });
                },
                
                switchToRegister() {
                    mode = 'register';
                    recoveryMode = false;
                    renderPopup();
                },
                
                switchToLogin() {
                    mode = 'login';
                    recoveryMode = false;
                    renderPopup();
                },
                
                switchToRecovery() {
                    recoveryMode = true;
                    mode = null;
                    renderPopup();
                },
                
                backToLogin() {
                    recoveryMode = false;
                    mode = 'login';
                    renderPopup();
                },
                
                requestQuestion() {
                    const username = document.getElementById('recoveryUsername').value;
                    const errorDiv = document.getElementById('errorMsg');
                    const loadingDiv = document.getElementById('loadingMsg');
                    
                    if (!username) {
                        errorDiv.textContent = 'Enter username';
                        return;
                    }
                    
                    loadingDiv.style.display = 'block';
                    errorDiv.textContent = '';
                    
                    getSecurityQuestion(username, function(result) {
                        loadingDiv.style.display = 'none';
                        
                        if (result.success) {
                            document.getElementById('questionArea').style.display = 'block';
                            document.getElementById('securityQuestion').textContent = 'Question: ' + result.question;
                            currentUsername = username;
                            errorDiv.textContent = '';
                        } else {
                            errorDiv.textContent = result.message || 'User not found';
                        }
                    });
                },
                
                verifyRecovery() {
                    const answer = document.getElementById('securityAnswer').value;
                    const errorDiv = document.getElementById('errorMsg');
                    const loadingDiv = document.getElementById('loadingMsg');
                    const resultDiv = document.getElementById('passwordResult');
                    
                    if (!answer) {
                        errorDiv.textContent = 'Enter answer';
                        return;
                    }
                    
                    loadingDiv.style.display = 'block';
                    errorDiv.textContent = '';
                    
                    verifyAnswer(currentUsername, answer, function(result) {
                        loadingDiv.style.display = 'none';
                        
                        if (result.success) {
                            resultDiv.style.display = 'block';
                            resultDiv.innerHTML = `<strong>Your password is:</strong> ${result.password}<br><br>Please login with this password.`;
                            errorDiv.textContent = '';
                        } else {
                            errorDiv.textContent = result.message || 'Incorrect answer';
                        }
                    });
                }
            };
            
            renderPopup();
            document.body.appendChild(overlay);
        }
        
        // Initialize on page load
        window.onload = function() {
            checkSession();
        };
    </script>
</body>
</html>
