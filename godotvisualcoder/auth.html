<!DOCTYPE html>
<html>
<head>
    <title>Auth System</title>
    <style>
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .auth-popup {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            max-width: 90%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .auth-popup h2 {
            margin-top: 0;
            color: #333;
        }
        
        .auth-popup input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        .auth-popup button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-popup button:hover {
            background: #45a049;
        }
        
        .toggle-mode {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #4CAF50;
        }
        
        .error-msg {
            color: red;
            font-size: 12px;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        
        .security-question {
            font-size: 14px;
            color: #666;
            margin: 10px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 5px;
        }
        
        .protected-content {
            display: none;
            padding: 50px;
            text-align: center;
            background: #f0f0f0;
            min-height: 100vh;
        }
        
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .session-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

            static getSession() {
                return {

                    userData: JSON.parse(localStorage.getItem('user_data') || 'null'),
                    sessionStart: localStorage.getItem('session_start')
                };
            }
            
            static clearSession() {
                localStorage.removeItem('session_id');
                localStorage.removeItem('user_data');
                localStorage.removeItem('session_start');
            }
            
            static isSessionValid() {
                const session = this.getSession();
                if (!session.sessionId) return false;
                const sessionAge = Date.now() - parseInt(session.sessionStart || '0');
                const maxAge = 24 * 60 * 60 * 1000;
                return sessionAge < maxAge;
            }
        }

        // Better approach: Use hidden iframe form submit (works with no-cors)
        function submitForm(action, data, callback) {
            const iframe = document.createElement('iframe');

            // Add action field

            actionField.value = action;

            // Add data fields
            for (let key in data) {
                const field = document.createElement('input');
                field.type = 'hidden';
                field.name = key;
                field.value = data[key];
                form.appendChild(field);
            }
            
            document.body.appendChild(form);
            
            // Listen for iframe load
            iframe.onload = function() {
                try {
                    // Try to read response from iframe
                    let responseText = iframe.contentDocument?.body?.innerText || iframe.contentWindow?.document?.body?.innerText;
                    
                    if (responseText) {
                        try {
                            const result = JSON.parse(responseText);
                            callback(result);
                        } catch(e) {
                            callback({ success: false, message: 'Invalid response' });
                        }
                    } else {
                        callback({ success: true, message: 'Action completed' });
                    }
                } catch(e) {
                    console.log('Cross-origin iframe read blocked, but form submitted');
                    callback({ success: true, message: 'Submitted successfully' });
                }
                
                // Cleanup
                setTimeout(() => {
                    document.body.removeChild(form);
                    document.body.removeChild(iframe);
                }, 1000);
            };
            
            form.submit();
        }
