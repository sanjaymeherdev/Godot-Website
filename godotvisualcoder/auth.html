<!DOCTYPE html>
<html>
<head>
  <title>Auth System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e2;
      min-height: 100vh;
    }

    /* ── Overlay ── */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    /* ── Card ── */
    .auth-popup {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      padding: 36px 32px;
      border-radius: 14px;
      width: 380px;
      max-width: 92vw;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .auth-popup h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    /* ── Inputs ── */
    .auth-popup input {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 12px;
      background: #0f0f18;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      color: #e2e2e2;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-popup input:focus {
      border-color: #6c63ff;
    }

    .auth-popup input::placeholder { color: #555; }

    /* ── Button ── */
    .auth-popup button.primary-btn {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s, transform 0.1s;
    }

    .auth-popup button.primary-btn:hover  { background: #574fd6; }
    .auth-popup button.primary-btn:active { transform: scale(0.98); }
    .auth-popup button.primary-btn:disabled {
      background: #3a3a55;
      cursor: not-allowed;
    }

    /* ── Toggle links ── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .toggle-link {
      font-size: 13px;
      color: #6c63ff;
      cursor: pointer;
      user-select: none;
    }

    .toggle-link:hover { text-decoration: underline; }

    /* ── Messages ── */
    .msg {
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 7px;
      margin-bottom: 14px;
      display: none;
    }

    .msg.error   { background: #2d1a1a; color: #ff6b6b; border: 1px solid #5c2020; display: block; }
    .msg.success { background: #1a2d1a; color: #6bff8a; border: 1px solid #205c29; display: block; }
    .msg.loading { background: #1a1a2d; color: #8a8aff; border: 1px solid #20205c; display: block; }

    /* ── Security question box ── */
    .security-question {
      font-size: 13px;
      color: #aaa;
      padding: 10px 12px;
      background: #0f0f18;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    /* ── Password recovery result ── */
    .password-result {
      font-size: 13px;
      padding: 12px;
      background: #1a2d1a;
      border: 1px solid #205c29;
      border-radius: 8px;
      color: #6bff8a;
      margin-top: 12px;
      display: none;
    }

    /* ── Protected area ── */
    .protected-content {
      display: none;
      min-height: 100vh;
      padding: 80px 40px 40px;
      text-align: center;
    }

    .protected-content h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .protected-content p { color: #888; font-size: 15px; }

    /* ── Session info card ── */
    .session-info {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #1a1a24;
      border: 1px solid #2e2e42;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.7;
      color: #bbb;
      text-align: left;
    }

    .session-info strong { color: #fff; }

    /* ── Logout button ── */
    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: #2d1a1a;
      color: #ff6b6b;
      border: 1px solid #5c2020;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .logout-btn:hover { background: #3d2020; }
  </style>
</head>
<body>

  <!-- Protected content shown after login -->
  <div class="protected-content" id="protectedContent">
    <button class="logout-btn" onclick="logout()">Logout</button>
    <div class="session-info" id="sessionInfo"></div>
    <h1>Welcome to the Protected Area!</h1>
    <p>You are logged in and your session is active.</p>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────────────────────
    // ✅ Replace this with your deployed Apps Script URL
    const API_URL = "https://script.google.com/macros/s/AKfycbw8UjXezsaFFgOYdjvm3oH9uWfUrKz_6BZMccg6TD-_8Ksd2mM7V65l1PWSQj5HqJpd/exec";

    // ── Session Manager ───────────────────────────────────────────────────────
    const SessionManager = {
      set(userData) {
        localStorage.setItem('auth_logged_in', 'true');
        localStorage.setItem('auth_user',      JSON.stringify(userData));
        localStorage.setItem('auth_started',   Date.now().toString());
      },
      get() {
        const raw = localStorage.getItem('auth_user');
        return {
          isLoggedIn:   localStorage.getItem('auth_logged_in') === 'true',
          userData:     raw ? JSON.parse(raw) : null,
          sessionStart: localStorage.getItem('auth_started')
        };
      },
      clear() {
        ['auth_logged_in', 'auth_user', 'auth_started'].forEach(k => localStorage.removeItem(k));
      },
      isValid() {
        const s = this.get();
        if (!s.isLoggedIn || !s.userData) return false;
        const age    = Date.now() - parseInt(s.sessionStart || '0');
        const maxAge = 24 * 60 * 60 * 1000; // 24 h
        if (age >= maxAge) { this.clear(); return false; }
        return true;
      }
    };

    // ── JSONP request — the only truly CORS-safe way from Netlify → Apps Script ─
    // All params go in the GET query string. Apps Script doGet wraps the JSON
    // response in the callback function name, which the injected <script> tag calls.
    function jsonpRequest(params, callback) {
      const cbName = '__gs_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      const scriptId = cbName + '_script';

      // Timeout guard
      const timer = setTimeout(() => {
        cleanup();
        callback({ success: false, message: 'Request timed out. Please try again.' });
      }, 15000);

      // Global callback that Apps Script will call
      window[cbName] = function (data) {
        clearTimeout(timer);
        cleanup();
        callback(data);
      };

      function cleanup() {
        delete window[cbName];
        document.getElementById(scriptId)?.remove();
      }

      // Build query string
      const qs = Object.entries({ ...params, callback: cbName })
        .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
        .join('&');

      const script = Object.assign(document.createElement('script'), {
        id: scriptId,
        src: API_URL + '?' + qs
      });

      script.onerror = function () {
        clearTimeout(timer);
        cleanup();
        callback({ success: false, message: 'Network error — could not reach server.' });
      };

      document.body.appendChild(script);
    }

    // ── API helpers ───────────────────────────────────────────────────────────
    function apiRegister(u, e, p, q, a, cb) {
      jsonpRequest({ action: 'register', username: u, email: e, password: p, securityQuestion: q, securityAnswer: a }, cb);
    }

    function apiLogin(u, p, cb) {
      jsonpRequest({ action: 'login', username: u, password: p }, function (res) {
        if (res.success && !res.username) res.username = u;
        cb(res);
      });
    }

    function apiGetQuestion(u, cb) { jsonpRequest({ action: 'getSecurityQuestion', username: u }, cb); }
    function apiVerifyAnswer(u, a, cb) { jsonpRequest({ action: 'verifyAnswer', username: u, answer: a }, cb); }

    // ── Logout ────────────────────────────────────────────────────────────────
    function logout() {
      SessionManager.clear();
      location.reload();
    }

    // ── Session check ─────────────────────────────────────────────────────────
    function checkSession() {
      if (SessionManager.isValid()) {
        const { userData, sessionStart } = SessionManager.get();
        document.getElementById('protectedContent').style.display = 'block';
        document.getElementById('sessionInfo').innerHTML = `
          <strong>Logged in as:</strong> ${userData.username}<br>
          <strong>Email:</strong> ${userData.email || '—'}<br>
          <small>Since: ${new Date(parseInt(sessionStart)).toLocaleString()}</small>
        `;
        return true;
      }
      SessionManager.clear();
      showAuthPopup();
      return false;
    }

    // ── Auth popup ────────────────────────────────────────────────────────────
    function showAuthPopup() {
      document.querySelector('.auth-overlay')?.remove();

      const overlay = document.createElement('div');
      overlay.className = 'auth-overlay';
      document.body.appendChild(overlay);

      let mode          = 'login';  // 'login' | 'register' | 'recovery'
      let recoveryUser  = '';

      function msg(el, type, text) {
        el.className = 'msg ' + type;
        el.textContent = text;
      }

      function setLoading(btn, loadEl, on) {
        btn.disabled = on;
        btn.textContent = on ? 'Please wait…' : btn.dataset.label;
        loadEl.className = on ? 'msg loading' : 'msg';
        if (on) loadEl.textContent = 'Talking to the server…';
      }

      function render() {
        if (mode === 'login') {
          overlay.innerHTML = `
            <div class="auth-popup">
              <h2>Sign In</h2>
              <div class="msg" id="msgBox"></div>
              <input type="text"     id="username" placeholder="Username" autocomplete="off">
              <input type="password" id="password" placeholder="Password">
              <button class="primary-btn" id="loginBtn" data-label="Sign In" onclick="actions.login()">Sign In</button>
              <div class="toggle-row">
                <span class="toggle-link" onclick="actions.go('register')">Create account</span>
                <span class="toggle-link" onclick="actions.go('recovery')">Forgot password?</span>
              </div>
            </div>`;

        } else if (mode === 'register') {
          overlay.innerHTML = `
            <div class="auth-popup">
              <h2>Create Account</h2>
              <div class="msg" id="msgBox"></div>
              <input type="text"     id="regUser"     placeholder="Username" autocomplete="off">
              <input type="email"    id="regEmail"    placeholder="Email">
              <input type="password" id="regPass"     placeholder="Password">
              <input type="text"     id="regQuestion" placeholder="Security question (e.g. Favourite colour?)">
              <input type="text"     id="regAnswer"   placeholder="Security answer">
              <button class="primary-btn" id="regBtn" data-label="Register" onclick="actions.register()">Register</button>
              <div class="toggle-row">
                <span class="toggle-link" onclick="actions.go('login')">← Back to login</span>
              </div>
            </div>`;

        } else { // recovery
          overlay.innerHTML = `
            <div class="auth-popup">
              <h2>Account Recovery</h2>
              <div class="msg" id="msgBox"></div>
              <input type="text" id="recUser" placeholder="Username" autocomplete="off">
              <button class="primary-btn" id="qBtn" data-label="Get Security Question" onclick="actions.getQuestion()">Get Security Question</button>
              <div id="answerSection" style="display:none; margin-top:12px;">
                <div class="security-question" id="sqText"></div>
                <input type="text" id="recAnswer" placeholder="Your answer">
                <button class="primary-btn" id="verifyBtn" data-label="Verify & Recover" onclick="actions.verify()">Verify &amp; Recover</button>
              </div>
              <div class="password-result" id="pwResult"></div>
              <div class="toggle-row">
                <span class="toggle-link" onclick="actions.go('login')">← Back to login</span>
              </div>
            </div>`;
        }
      }

      window.actions = {
        go(m) { mode = m; recoveryUser = ''; render(); },

        login() {
          const u   = document.getElementById('username').value.trim();
          const p   = document.getElementById('password').value.trim();
          const box = document.getElementById('msgBox');
          const btn = document.getElementById('loginBtn');
          if (!u || !p) return msg(box, 'error', 'Username and password are required.');
          setLoading(btn, box, true);
          apiLogin(u, p, function (res) {
            setLoading(btn, box, false);
            if (res.success) {
              SessionManager.set({ username: res.username || u, email: res.email || '', lastLogin: res.lastLogin || new Date().toISOString() });
              overlay.remove();
              location.reload();
            } else {
              msg(box, 'error', res.message || 'Login failed. Please try again.');
            }
          });
        },

        register() {
          const u  = document.getElementById('regUser').value.trim();
          const e  = document.getElementById('regEmail').value.trim();
          const p  = document.getElementById('regPass').value.trim();
          const q  = document.getElementById('regQuestion').value.trim();
          const a  = document.getElementById('regAnswer').value.trim();
          const box = document.getElementById('msgBox');
          const btn = document.getElementById('regBtn');
          if (!u || !e || !p || !q || !a) return msg(box, 'error', 'All fields are required.');
          setLoading(btn, box, true);
          apiRegister(u, e, p, q, a, function (res) {
            setLoading(btn, box, false);
            if (res.success) {
              msg(box, 'success', 'Registered! Redirecting to login…');
              setTimeout(() => actions.go('login'), 2000);
            } else {
              msg(box, 'error', res.message || 'Registration failed.');
            }
          });
        },

        getQuestion() {
          const u   = document.getElementById('recUser').value.trim();
          const box = document.getElementById('msgBox');
          const btn = document.getElementById('qBtn');
          if (!u) return msg(box, 'error', 'Enter your username.');
          setLoading(btn, box, true);
          apiGetQuestion(u, function (res) {
            setLoading(btn, box, false);
            if (res.success) {
              recoveryUser = u;
              document.getElementById('sqText').textContent = 'Q: ' + res.question;
              document.getElementById('answerSection').style.display = 'block';
              box.className = 'msg';
            } else {
              msg(box, 'error', res.message || 'User not found.');
            }
          });
        },

        verify() {
          const a   = document.getElementById('recAnswer').value.trim();
          const box = document.getElementById('msgBox');
          const btn = document.getElementById('verifyBtn');
          const pw  = document.getElementById('pwResult');
          if (!a) return msg(box, 'error', 'Enter your answer.');
          setLoading(btn, box, true);
          apiVerifyAnswer(recoveryUser, a, function (res) {
            setLoading(btn, box, false);
            if (res.success) {
              box.className = 'msg';
              pw.style.display = 'block';
              pw.innerHTML = `<strong>Your password:</strong> ${res.password}<br><small>Please log in and change it soon.</small>`;
            } else {
              msg(box, 'error', res.message || 'Incorrect answer.');
            }
          });
        }
      };

      render();
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    window.onload = checkSession;
  </script>
</body>
</html>
