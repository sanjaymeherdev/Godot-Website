<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CGRelay — Authenticating...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #080810;
    color: #f0eff5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.2rem;
  }
  .logo {
    font-family: monospace;
    font-size: 1rem;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid #1f1f35;
    border-top-color: #ff6b35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #msg {
    font-size: 0.875rem;
    color: #6b6b8a;
    font-family: monospace;
  }
  .error-box {
    color: #ef4444;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    padding: 1rem 1.5rem;
    border-radius: 8px;
    text-align: center;
    max-width: 400px;
    font-size: 0.875rem;
    display: none;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="logo">CGRELAY</div>
<div class="spinner" id="spinner"></div>
<p id="msg">Verifying your account...</p>
<div class="error-box" id="errorBox"></div>

<script>
  const SUPABASE_URL = 'https://lgfzoprhyjrmosvigwlb.supabase.co'
  const EDGE_AUTH_URL = `${SUPABASE_URL}/functions/v1/cgrelay-auth`
  const SITE_URL = 'https://sanjaymeherdev.netlify.app'

  async function handleCallback() {
    try {
      // Supabase puts session in URL hash after OAuth
      // Format: #access_token=xxx&token_type=bearer&...
      const hash = window.location.hash.substring(1)
      const params = new URLSearchParams(hash)
      const accessToken = params.get('access_token')
      const errorDesc = params.get('error_description')

      if (errorDesc) {
        showError('Google sign-in failed: ' + errorDesc)
        redirect('/cgrelay/auth?error=invalid_session', 2000)
        return
      }

      if (!accessToken) {
        showError('No session found. Redirecting...')
        redirect('/cgrelay/auth?error=no_session', 2000)
        return
      }

      setMsg('Checking your account...')

      // Call edge function with token
      const res = await fetch(EDGE_AUTH_URL, {
        method: 'GET',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        }
      })

      const data = await res.json()

      if (data.redirect) {
        window.location.href = SITE_URL + data.redirect
        return
      }

      // Unexpected response
      showError('Unexpected response from server. Redirecting...')
      redirect('/cgrelay/auth?error=server_error', 2000)

    } catch (err) {
      console.error('Callback error:', err)
      showError('Something went wrong. Redirecting...')
      redirect('/cgrelay/auth?error=server_error', 2000)
    }
  }

  function setMsg(msg) {
    document.getElementById('msg').textContent = msg
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none'
    document.getElementById('msg').style.display = 'none'
    const box = document.getElementById('errorBox')
    box.textContent = '❌ ' + msg
    box.style.display = 'block'
  }

  function redirect(path, delay) {
    setTimeout(() => {
      window.location.href = SITE_URL + path
    }, delay)
  }

  handleCallback()
</script>

</body>
</html>
