<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Store</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #252535;
    --accent: #ff6b35;
    --accent2: #ff9a5c;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #22c55e;
    --owned: #10b981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text);
    text-decoration: none;
  }
  .logo span { color: var(--accent); }

  .user-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .user-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Login wall ── */
  #loginWall {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 360px;
    text-align: center;
  }
  .login-box h2 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }
  .login-box p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }
  .login-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    margin-bottom: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box .btn-primary {
    width: 100%;
    margin-top: 0.5rem;
  }
  .login-error {
    color: #f87171;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    min-height: 20px;
  }

  /* ── Main layout ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 0.75rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Category label ── */
  .category-section { margin-bottom: 2.5rem; }
  .category-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .category-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Grid ── */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  /* ── Item card ── */
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }
  .item-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255, 107, 53, 0.4);
    box-shadow: 0 8px 24px rgba(255, 107, 53, 0.1);
  }
  .item-card.owned {
    border-color: rgba(16, 185, 129, 0.4);
  }

  .item-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--muted);
  }
  .item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .item-body {
    padding: 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .item-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .item-price {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 700;
  }

  .item-status {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .item-status.owned-text {
    color: var(--owned);
    font-weight: 600;
  }

  .item-actions {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: auto;
  }

  .redeem-row {
    display: flex;
    gap: 0.3rem;
  }
  .redeem-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.4rem 0.5rem;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .redeem-input:focus { border-color: var(--accent); }
  .redeem-input::placeholder { text-transform: none; color: var(--muted); }

  /* ── Buttons ── */
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 0.55rem 1rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-redeem {
    background: rgba(255,107,53,0.12);
    color: var(--accent);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 5px;
    padding: 0.4rem 0.6rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-redeem:hover { background: rgba(255,107,53,0.22); }

  .btn-buy {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #e55a2b);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 0.55rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-buy:hover { opacity: 0.9; }
  .btn-buy:active { transform: scale(0.97); }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Loading / empty ── */
  .loading-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal (buy flow) ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    transform: translateY(16px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h3 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
  }
  .modal-item-name {
    color: var(--accent);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 1.25rem;
  }
  .modal-price {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 1.25rem;
  }
  .modal-price span {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 400;
  }
  .modal-note {
    font-size: 0.82rem;
    color: var(--muted);
    background: rgba(255,107,53,0.06);
    border: 1px solid rgba(255,107,53,0.15);
    border-radius: 8px;
    padding: 0.75rem;
    margin-bottom: 1.25rem;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
  }
  .btn-cancel {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.75rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text); }
  .btn-confirm {
    flex: 2;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.5rem;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 400;
    transition: transform 0.3s ease, opacity 0.3s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success { border-color: rgba(34,197,94,0.4); color: var(--success); }
  .toast.error { border-color: rgba(248,113,113,0.4); color: #f87171; }
  .toast.info { border-color: rgba(255,107,53,0.4); color: var(--accent); }

  @media (max-width: 600px) {
    main { padding: 1rem; }
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .header-inner { padding: 0; }
  }
</style>
</head>
<body>

<!-- ── CONFIG — edit these ── -->
<script>
  const SUPABASE_URL  = "YOUR_SUPABASE_URL";
  const SUPABASE_KEY  = "YOUR_SUPABASE_ANON_KEY";
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7bq4ofCsMT9vUzCPNJN0aHdy3XZNT70USQb_oPrtI39YB3y_05Nj7TJHpUocvdVVC/exec";

  const CATEGORIES = {
    Outfit: ["Shirt","Pant","Cap","Mask","Shoe","Parachute"],
    Guns:   ["AKM","M4","UMP","M60","Sniper"]
  };

  const CATEGORY_ICONS = {
    Shirt:"👕", Pant:"👖", Cap:"🧢", Mask:"😷",
    Shoe:"👟", Parachute:"🪂",
    AKM:"🔫", M4:"🔫", UMP:"🔫", M60:"🔫", Sniper:"🎯"
  };
</script>

<!-- ── Login wall ── -->
<div id="loginWall">
  <div class="login-box">
    <h2>🎮 GAME STORE</h2>
    <p>Enter your in-game username to continue</p>
    <input type="text" id="loginInput" placeholder="Your username" maxlength="32" autocomplete="off">
    <button class="btn-primary" onclick="doLogin()">Enter Store</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <div class="header-inner">
    <a class="logo" href="#">GAME<span>STORE</span></a>
    <div class="user-info">
      <div class="user-dot"></div>
      <span id="headerUsername">—</span>
    </div>
  </div>
</header>

<!-- ── Main ── -->
<main id="storeMain" style="display:none;">

  <!-- Tabs -->
  <div class="tabs" id="tabBar"></div>

  <!-- Panels -->
  <div id="tabPanels"></div>

</main>

<!-- ── Buy modal ── -->
<div class="modal-overlay" id="buyModal">
  <div class="modal">
    <h3>Confirm Purchase</h3>
    <div class="modal-item-name" id="modalItemName">—</div>
    <div class="modal-price" id="modalPrice">—</div>
    <div class="modal-note">
      💡 After payment a <strong>6-character redeem code</strong> will be shown on screen.<br>
      Enter it in the game store to unlock your item instantly.
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary btn-confirm" id="modalConfirmBtn" onclick="confirmPurchase()">Pay with Razorpay</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let currentUsername = "";
let allProducts = [];
let ownedItems = new Set();
let pendingPurchase = null;

// ── Login ──
function doLogin() {
  const val = document.getElementById("loginInput").value.trim();
  if (!val) {
    document.getElementById("loginError").textContent = "Please enter your username";
    return;
  }
  currentUsername = val.toLowerCase().replace(/[^a-z0-9_]/g, "_");
  document.getElementById("loginWall").style.display = "none";
  document.getElementById("storeMain").style.display = "block";
  document.getElementById("headerUsername").textContent = currentUsername;
  initStore();
}

document.getElementById("loginInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

// ── Init ──
async function initStore() {
  buildTabs();
  buildPanels();
  showLoading();
  await Promise.all([fetchProducts(), fetchOwned()]);
  renderProducts();
}

// ── Tabs ──
function buildTabs() {
  const bar = document.getElementById("tabBar");
  Object.keys(CATEGORIES).forEach((type, i) => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i === 0 ? " active" : "");
    btn.textContent = type;
    btn.dataset.type = type;
    btn.onclick = () => switchTab(type);
    bar.appendChild(btn);
  });
}

function buildPanels() {
  const panels = document.getElementById("tabPanels");
  Object.entries(CATEGORIES).forEach(([type, cats], i) => {
    const panel = document.createElement("div");
    panel.className = "tab-panel" + (i === 0 ? " active" : "");
    panel.id = "panel_" + type;
    cats.forEach(cat => {
      const section = document.createElement("div");
      section.className = "category-section";
      section.id = "section_" + type + "_" + cat;
      section.innerHTML = `
        <div class="category-title">${CATEGORY_ICONS[cat] || "🎮"} ${cat}</div>
        <div class="items-grid" id="grid_${type}_${cat}">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>`;
      panel.appendChild(section);
    });
    panels.appendChild(panel);
  });
}

function switchTab(type) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.type === type));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "panel_" + type));
}

function showLoading() {
  Object.entries(CATEGORIES).forEach(([type, cats]) => {
    cats.forEach(cat => {
      const grid = document.getElementById("grid_" + type + "_" + cat);
      if (grid) grid.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
    });
  });
}

// ── Fetch products ──
async function fetchProducts() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/products?select=*`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
    );
    allProducts = await res.json();
  } catch(e) {
    console.error("Products fetch failed", e);
    allProducts = [];
  }
}

// ── Fetch owned items ──
async function fetchOwned() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/user_purchases?username=eq.${encodeURIComponent(currentUsername)}&is_redeemed=eq.true&select=item_id`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
    );
    const data = await res.json();
    ownedItems = new Set(data.map(d => d.item_id));
  } catch(e) {
    console.error("Owned fetch failed", e);
    ownedItems = new Set();
  }
}

// ── Render ──
function renderProducts() {
  // Clear grids
  Object.entries(CATEGORIES).forEach(([type, cats]) => {
    cats.forEach(cat => {
      const grid = document.getElementById("grid_" + type + "_" + cat);
      if (grid) grid.innerHTML = "";
    });
  });

  // Populate
  allProducts.forEach(p => {
    const grid = document.getElementById("grid_" + p.type + "_" + p.category);
    if (!grid) return;
    grid.appendChild(buildCard(p));
  });

  // Empty states
  Object.entries(CATEGORIES).forEach(([type, cats]) => {
    cats.forEach(cat => {
      const grid = document.getElementById("grid_" + type + "_" + cat);
      if (grid && grid.children.length === 0) {
        grid.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;padding:0.5rem 0;">No items yet</p>';
      }
    });
  });
}

function buildCard(p) {
  const owned = ownedItems.has(p.itemid);
  const card = document.createElement("div");
  card.className = "item-card" + (owned ? " owned" : "");
  card.dataset.itemid = p.itemid;

  card.innerHTML = `
    <div class="item-thumb" id="thumb_${p.itemid}">🎮</div>
    <div class="item-body">
      <div class="item-name">${p.itemname}</div>
      <div class="item-price">₹${p.price}</div>
      <div class="item-actions">
        ${owned
          ? `<div class="item-status owned-text">✅ OWNED</div>`
          : `
            <div class="redeem-row">
              <input class="redeem-input" id="code_${p.itemid}" maxlength="6" placeholder="Redeem code" />
              <button class="btn-redeem" onclick="redeemCode('${p.itemid}','${p.itemname}')">✓</button>
            </div>
            <button class="btn-buy" onclick="openBuyModal('${p.itemid}','${p.itemname}',${p.price})">
              Buy ₹${p.price}
            </button>
            <div class="item-status" id="status_${p.itemid}"></div>
          `
        }
      </div>
    </div>`;

  // Load preview image
  if (p.texture) {
    loadThumb(p.itemid, p.texture);
  }

  return card;
}

function loadThumb(itemid, url) {
  const el = document.getElementById("thumb_" + itemid);
  if (!el) return;
  const img = document.createElement("img");
  img.onload = () => { el.innerHTML = ""; el.appendChild(img); };
  img.onerror = () => {};
  img.src = url;
}

// ── Redeem ──
async function redeemCode(itemId, itemName) {
  const input = document.getElementById("code_" + itemId);
  const statusEl = document.getElementById("status_" + itemId);
  const code = input.value.trim().toUpperCase();

  if (!code || code.length !== 6) {
    setStatus(statusEl, "Enter 6-character code", "var(--accent)");
    return;
  }

  setStatus(statusEl, "Validating...", "var(--muted)");

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/validate_and_redeem_code`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ p_username: currentUsername, p_redeem_code: code, p_item_id: itemId })
    });

    const data = await res.json();

    if (data.success) {
      if (data.already_redeemed) {
        setStatus(statusEl, "Already redeemed", "#f59e0b");
      } else {
        markOwned(itemId);
        showToast("✅ " + itemName + " unlocked!", "success");
      }
    } else {
      setStatus(statusEl, data.message || "Invalid code", "#f87171");
    }
  } catch(e) {
    setStatus(statusEl, "Network error", "#f87171");
  }

  input.value = "";
}

function markOwned(itemId) {
  ownedItems.add(itemId);
  const card = document.querySelector(`[data-itemid="${itemId}"]`);
  if (!card) return;
  card.classList.add("owned");
  const actions = card.querySelector(".item-actions");
  if (actions) actions.innerHTML = `<div class="item-status owned-text">✅ OWNED</div>`;
}

function setStatus(el, msg, color) {
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
}

// ── Buy flow ──
function openBuyModal(itemId, itemName, price) {
  pendingPurchase = { itemId, itemName, price };
  document.getElementById("modalItemName").textContent = itemName;
  document.getElementById("modalPrice").innerHTML = `₹${price} <span>one-time</span>`;
  document.getElementById("buyModal").classList.add("open");
}

function closeModal() {
  document.getElementById("buyModal").classList.remove("open");
  pendingPurchase = null;
}

async function confirmPurchase() {
  if (!pendingPurchase) return;
  const btn = document.getElementById("modalConfirmBtn");
  btn.disabled = true;
  btn.textContent = "Creating payment...";

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "createPaymentLink",
        itemId: pendingPurchase.itemId,
        itemName: pendingPurchase.itemName,
        amount: pendingPurchase.price,
        username: currentUsername
      })
    });

    const data = await res.json();

    if (data.success && data.paymentLinkUrl) {
      closeModal();
      showToast("Opening payment page...", "info");
      window.open(data.paymentLinkUrl, "_blank");
      // Poll for completion after user pays
      startPollOwnership(pendingPurchase?.itemId);
    } else {
      showToast(data.message || "Payment link failed", "error");
    }
  } catch(e) {
    showToast("Network error. Try again.", "error");
  }

  btn.disabled = false;
  btn.textContent = "Pay with Razorpay";
}

// ── Poll after payment (check if item got redeemed via webhook) ──
function startPollOwnership(itemId) {
  if (!itemId) return;
  let attempts = 0;
  const timer = setInterval(async () => {
    attempts++;
    if (attempts > 20) { clearInterval(timer); return; } // stop after ~60s

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/user_purchases?username=eq.${encodeURIComponent(currentUsername)}&item_id=eq.${encodeURIComponent(itemId)}&select=item_id`,
        { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
      );
      const data = await res.json();
      if (data && data.length > 0) {
        clearInterval(timer);
        markOwned(itemId);
        showToast("🎉 Payment confirmed! Check your code.", "success");
      }
    } catch(e) {}
  }, 3000);
}

// ── Toast ──
function showToast(msg, type = "info") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type + " show";
  setTimeout(() => t.classList.remove("show"), 3500);
}

// ── Close modal on overlay click ──
document.getElementById("buyModal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
