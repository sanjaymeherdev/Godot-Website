<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Razorpay Gateway Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 560px; }

    .header { margin-bottom: 32px; }
    .header h1 {
      font-size: 13px; letter-spacing: 4px;
      text-transform: uppercase; color: #555; margin-bottom: 6px;
    }
    .header h2 {
      font-size: 28px; font-weight: 700;
      color: #fff; letter-spacing: -0.5px;
    }
    .header h2 span { color: #2d8cf0; }

    .card {
      background: #111; border: 1px solid #222;
      border-radius: 12px; padding: 28px; margin-bottom: 16px;
    }
    .card-title {
      font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: #444; margin-bottom: 20px;
    }

    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: #555; margin-bottom: 7px;
    }
    input, select {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 10px 14px; color: #e8e8e8;
      font-family: 'Courier New', monospace; font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #2d8cf0; }
    select option { background: #111; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%; padding: 13px; background: #2d8cf0; color: #fff;
      border: none; border-radius: 6px; font-family: 'Courier New', monospace;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, opacity 0.2s; margin-top: 4px;
    }
    .btn:hover { background: #1a7de0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: #1a1a1a; border: 1px solid #2a2a2a; margin-top: 10px;
    }
    .btn-secondary:hover { background: #222; }

    .log {
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 16px; font-size: 12px; line-height: 1.7;
      min-height: 80px; max-height: 280px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .log-line { margin-bottom: 2px; }
    .log-line.info  { color: #888; }
    .log-line.ok    { color: #3ecf8e; }
    .log-line.err   { color: #ff4444; }
    .log-line.warn  { color: #f5a623; }
    .log-line.data  { color: #2d8cf0; }

    .status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      background: #1a1a1a; color: #555; border: 1px solid #2a2a2a;
      margin-left: 8px; vertical-align: middle;
    }
    .status-pill.pending    { color: #f5a623; border-color: #f5a62340; }
    .status-pill.processing { color: #2d8cf0; border-color: #2d8cf040; }
    .status-pill.completed  { color: #3ecf8e; border-color: #3ecf8e40; }
    .status-pill.failed     { color: #ff4444; border-color: #ff444440; }

    .link-id-display {
      font-size: 11px; color: #555; margin-top: 8px; word-break: break-all;
    }
    .link-id-display span { color: #2d8cf0; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Supabase Edge Function</h1>
    <h2>Razorpay <span>Gateway Tester</span></h2>
  </div>

  <!-- CREATE PAYMENT LINK -->
  <div class="card">
    <div class="card-title">01 — Create Payment Link</div>

    <div class="row">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" value="test@example.com" />
      </div>
      <div class="field">
        <label>Amount (INR)</label>
        <input id="amount" type="number" value="99" step="1" min="1" />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="asset_purchase">asset_purchase</option>
          <option value="subscription">subscription</option>
          <option value="cgrelay_tier1">cgrelay_tier1</option>
          <option value="custom">custom</option>
        </select>
      </div>
      <div class="field">
        <label>Currency</label>
        <select id="currency">
          <option value="INR">INR</option>
          <option value="USD">USD</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <input id="description" type="text" value="Purchased Asset ID 1" />
    </div>

    <div class="field">
      <label>Metadata (JSON)</label>
      <input id="metadata" type="text" value='{"asset_id": "1", "user_id": "abc123"}' />
    </div>

    <button class="btn" onclick="createPaymentLink()">Create Payment Link →</button>

    <div class="link-id-display" id="linkIdDisplay" style="display:none">
      Link ID: <span id="linkIdSpan"></span>
      <span class="status-pill pending" id="statusPill">pending</span>
    </div>
  </div>

  <!-- POLL -->
  <div class="card">
    <div class="card-title">02 — Poll Status</div>

    <div class="field">
      <label>Payment Link ID</label>
      <input id="linkId" type="text" placeholder="auto-filled after create" />
    </div>

    <button class="btn btn-secondary" onclick="pollStatus()">Poll Status</button>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-title">Log</div>
    <div class="log" id="log"><span class="log-line info">Ready. Create a payment link to begin.</span>
</div>
    <button class="btn btn-secondary" onclick="clearLog()">Clear Log</button>
  </div>

</div>

<script>
  const FN_URL = 'https://lgfzoprhyjrmosvigwlb.supabase.co/functions/v1/razorpay-payment'

  function log(msg, type = 'info') {
    const el   = document.getElementById('log')
    const line = document.createElement('div')
    line.className  = `log-line ${type}`
    const ts        = new Date().toLocaleTimeString()
    line.textContent = `[${ts}] ${msg}`
    el.appendChild(line)
    el.scrollTop = el.scrollHeight
  }

  function clearLog() { document.getElementById('log').innerHTML = '' }

  function setStatus(status) {
    const pill = document.getElementById('statusPill')
    if (!pill) return
    pill.textContent = status
    pill.className   = `status-pill ${status}`
  }

  async function call(body) {
    const res = await fetch(FN_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    })
    return res.json()
  }

  async function createPaymentLink() {
    let metadata = {}
    try {
      metadata = JSON.parse(document.getElementById('metadata').value || '{}')
    } catch {
      log('Invalid metadata JSON', 'err')
      return
    }

    const base = window.location.origin + window.location.pathname
    const body = {
      action:       'createPaymentLink',
      email:        document.getElementById('email').value,
      amount:       document.getElementById('amount').value,
      currency:     document.getElementById('currency').value,
      type:         document.getElementById('type').value,
      description:  document.getElementById('description').value,
      metadata,
      callback_url: base + '?payment=success',
      cancel_url:   base + '?payment=cancel'
    }

    log('Creating Razorpay payment link...', 'info')
    log('Body: ' + JSON.stringify(body, null, 2), 'data')

    try {
      const data = await call(body)
      log('Response: ' + JSON.stringify(data, null, 2), data.success ? 'ok' : 'err')

      if (data.success) {
        document.getElementById('linkId').value      = data.razorpay_payment_link_id
        document.getElementById('linkIdSpan').textContent = data.razorpay_payment_link_id
        document.getElementById('linkIdDisplay').style.display = 'block'
        setStatus('pending')

        log('✅ Payment link created: ' + data.razorpay_payment_link_id, 'ok')
        log('Redirecting to Razorpay...', 'warn')

        // Redirect in same tab — Razorpay will redirect back via callback_url
        window.location.href = data.payment_url
      }
    } catch (err) {
      log('Fetch error: ' + err.message, 'err')
    }
  }

  async function pollStatus() {
    const linkId = document.getElementById('linkId').value.trim()
    if (!linkId) { log('Payment Link ID is required', 'err'); return }

    log('Polling status for: ' + linkId, 'info')

    try {
      const data = await call({ action: 'pollStatus', razorpay_payment_link_id: linkId })
      log('Response: ' + JSON.stringify(data, null, 2), data.success ? 'ok' : 'warn')

      if (data.status) setStatus(data.status)

      if (data.success && data.status === 'completed') {
        log('✅ Payment ID: ' + data.razorpay_payment_id, 'ok')
        log('Type: ' + data.type, 'ok')
        log('Metadata: ' + JSON.stringify(data.metadata), 'ok')
      }
    } catch (err) {
      log('Fetch error: ' + err.message, 'err')
    }
  }

  // ── Auto-run on page load after Razorpay redirect ──────────────
  window.addEventListener('DOMContentLoaded', () => {
    const params      = new URLSearchParams(window.location.search)
    const payment     = params.get('payment')
    const razorpayKey = params.get('razorpay_payment_link_id') // Razorpay appends this to callback_url

    if (payment === 'success' && razorpayKey) {
      document.getElementById('linkId').value            = razorpayKey
      document.getElementById('linkIdSpan').textContent  = razorpayKey
      document.getElementById('linkIdDisplay').style.display = 'block'
      setStatus('pending')

      log('↩ Returned from Razorpay. Link ID: ' + razorpayKey, 'warn')
      log('Auto-polling status...', 'info')

      // Auto-poll — webhook should have already processed it
      pollStatus()

      window.history.replaceState({}, '', window.location.pathname)

    } else if (payment === 'cancel') {
      log('⚠ Payment cancelled by user', 'warn')
      window.history.replaceState({}, '', window.location.pathname)
    }
  })
</script>
</body>
</html>
