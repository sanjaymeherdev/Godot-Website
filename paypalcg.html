<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayPal Gateway Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 6px;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .header h2 span {
      color: #0070f3;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 7px;
    }

    input, select {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 14px;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #0070f3;
    }

    select option {
      background: #111;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }

    .btn:hover { background: #0060d3; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      margin-top: 10px;
    }

    .btn-secondary:hover { background: #222; }

    .log {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.7;
      min-height: 80px;
      max-height: 280px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line { margin-bottom: 2px; }
    .log-line.info  { color: #888; }
    .log-line.ok    { color: #3ecf8e; }
    .log-line.err   { color: #ff4444; }
    .log-line.warn  { color: #f5a623; }
    .log-line.data  { color: #0070f3; }

    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #1a1a1a;
      color: #555;
      border: 1px solid #2a2a2a;
      margin-left: 8px;
      vertical-align: middle;
    }

    .status-pill.pending    { color: #f5a623; border-color: #f5a62340; }
    .status-pill.capturing  { color: #0070f3; border-color: #0070f340; }
    .status-pill.completed  { color: #3ecf8e; border-color: #3ecf8e40; }
    .status-pill.failed     { color: #ff4444; border-color: #ff444440; }

    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 20px 0;
    }

    .order-id-display {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      word-break: break-all;
    }

    .order-id-display span { color: #0070f3; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Supabase Edge Function</h1>
    <h2>PayPal <span>Gateway Tester</span></h2>
  </div>

  <!-- CREATE ORDER -->
  <div class="card">
    <div class="card-title">01 — Create Order</div>

    <div class="row">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" value="test@example.com" />
      </div>
      <div class="field">
        <label>Amount (USD)</label>
        <input id="amount" type="number" value="9.99" step="0.01" min="0.01" />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="asset_purchase">asset_purchase</option>
          <option value="subscription">subscription</option>
          <option value="cgrelay_tier1">cgrelay_tier1</option>
          <option value="custom">custom</option>
        </select>
      </div>
      <div class="field">
        <label>Currency</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <input id="description" type="text" value="Purchased Asset ID 1" />
    </div>

    <div class="field">
      <label>Metadata (JSON)</label>
      <input id="metadata" type="text" value='{"asset_id": "1", "user_id": "abc123"}' />
    </div>

    <button class="btn" onclick="createOrder()">Create PayPal Order →</button>

    <div class="order-id-display" id="orderIdDisplay" style="display:none">
      Order ID: <span id="orderIdSpan"></span>
      <span class="status-pill pending" id="statusPill">pending</span>
    </div>
  </div>

  <!-- CAPTURE / POLL -->
  <div class="card">
    <div class="card-title">02 — Capture & Poll</div>

    <div class="field">
      <label>PayPal Order ID</label>
      <input id="orderId" type="text" placeholder="auto-filled after create" />
    </div>

    <button class="btn btn-secondary" onclick="captureOrder()">Capture Order (return_url flow)</button>
    <button class="btn btn-secondary" onclick="pollStatus()">Poll Status</button>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-title">Log</div>
    <div class="log" id="log"><span class="log-line info">Ready. Fill in config and create an order.</span>
</div>
    <button class="btn btn-secondary" onclick="clearLog()">Clear Log</button>
  </div>

</div>

<script>
  const FN_URL = 'https://lgfzoprhyjrmosvigwlb.supabase.co/functions/v1/paypal-payment'

  function log(msg, type = 'info') {
    const el = document.getElementById('log')
    const line = document.createElement('div')
    line.className = `log-line ${type}`
    const ts = new Date().toLocaleTimeString()
    line.textContent = `[${ts}] ${msg}`
    el.appendChild(line)
    el.scrollTop = el.scrollHeight
  }

  function clearLog() {
    document.getElementById('log').innerHTML = ''
  }

  function setStatus(status) {
    const pill = document.getElementById('statusPill')
    if (!pill) return
    pill.textContent = status
    pill.className = `status-pill ${status}`
  }

  async function call(body) {
    const res = await fetch(FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    return res.json()
  }

  async function createOrder() {
    let metadata = {}
    try {
      metadata = JSON.parse(document.getElementById('metadata').value || '{}')
    } catch {
      log('Invalid metadata JSON', 'err')
      return
    }

    // Build return_url without any existing query params to keep it clean
    const base = window.location.origin + window.location.pathname
    const body = {
      action:      'createOrder',
      email:       document.getElementById('email').value,
      amount:      document.getElementById('amount').value,
      currency:    document.getElementById('currency').value,
      type:        document.getElementById('type').value,
      description: document.getElementById('description').value,
      metadata,
      return_url:  base + '?payment=success',
      cancel_url:  base + '?payment=cancel'
    }

    log('Creating PayPal order...', 'info')
    log('Body: ' + JSON.stringify(body, null, 2), 'data')

    try {
      const data = await call(body)
      log('Response: ' + JSON.stringify(data, null, 2), data.success ? 'ok' : 'err')

      if (data.success) {
        document.getElementById('orderId').value = data.paypal_order_id
        document.getElementById('orderIdSpan').textContent = data.paypal_order_id
        document.getElementById('orderIdDisplay').style.display = 'block'
        setStatus('pending')
        log('✅ Order created: ' + data.paypal_order_id, 'ok')
        log('Redirecting to PayPal...', 'warn')
        log('Use your sandbox buyer account to approve', 'warn')
        // Redirect in same tab so return_url brings us back here
        window.location.href = data.approval_url
      }
    } catch (err) {
      log('Fetch error: ' + err.message, 'err')
    }
  }

  async function captureOrder() {
    const orderId = document.getElementById('orderId').value.trim()
    if (!orderId) { log('Order ID is required', 'err'); return }

    log('Capturing order: ' + orderId, 'info')
    setStatus('capturing')

    try {
      const data = await call({ action: 'captureOrder', paypal_order_id: orderId })
      log('Response: ' + JSON.stringify(data, null, 2), data.success ? 'ok' : 'err')

      if (data.success) {
        setStatus('completed')
        log('✅ Captured! Capture ID: ' + data.paypal_capture_id, 'ok')
        log('Type: ' + data.type, 'ok')
        log('Metadata: ' + JSON.stringify(data.metadata), 'ok')
      } else {
        setStatus(data.status || 'failed')
        log(data.message || 'Capture failed', 'err')
      }
    } catch (err) {
      log('Fetch error: ' + err.message, 'err')
    }
  }

  async function pollStatus() {
    const orderId = document.getElementById('orderId').value.trim()
    if (!orderId) { log('Order ID is required', 'err'); return }

    log('Polling status for: ' + orderId, 'info')

    try {
      const data = await call({ action: 'pollStatus', paypal_order_id: orderId })
      log('Response: ' + JSON.stringify(data, null, 2), data.success ? 'ok' : 'warn')
      if (data.status) setStatus(data.status)
    } catch (err) {
      log('Fetch error: ' + err.message, 'err')
    }
  }

  // ── Auto-run on page load ──────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const params  = new URLSearchParams(window.location.search)
    const token   = params.get('token')   // PayPal appends ?token=ORDER_ID to return_url
    const payment = params.get('payment') // our own flag

    if (token && payment === 'success') {
      // Show the order ID
      document.getElementById('orderId').value = token
      document.getElementById('orderIdDisplay').style.display = 'block'
      document.getElementById('orderIdSpan').textContent = token
      setStatus('pending')

      log('↩ Returned from PayPal. Order: ' + token, 'warn')
      log('Auto-capturing...', 'info')

      // Auto-capture immediately — no click needed
      document.getElementById('orderId').value = token
      captureOrder()

      // Clean URL so refresh doesn't re-trigger
      window.history.replaceState({}, '', window.location.pathname)

    } else if (payment === 'cancel') {
      log('⚠ Payment cancelled by user', 'warn')
      window.history.replaceState({}, '', window.location.pathname)
    }
  })
</script>
</body>
</html>
